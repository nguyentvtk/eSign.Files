/* ══════════════════════════════════════════════════════════════════════════════

(function ensureLoginVisibleASAP() {
  // Chạy ngay khi DOM có thể truy cập (interactive hoặc complete)
  function _showLogin() {
    try {
      var login = document.getElementById('app-login');
      var dash  = document.getElementById('app-dashboard');
      if (login && (!login.style.display || login.style.display === 'none')) {
        login.style.display = 'flex';
      }
      if (dash && !dash.style.display) {
        dash.style.display = 'none';
      }
    } catch (_) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _showLogin);
  } else {
    _showLogin();
  }
})();

/**
 * Fallback khẩn cấp: hiện màn login khi dashboard chưa từng được show.
 * KHÔNG gọi nếu dashboard đang hiện (tránh reset gây màn trắng).
 *
 * Lưu ý: kiểm tra cả class .is-active VÀ inline style để xác định dashboard thật sự hiện.
 * Trước đây chỉ check style.display='block' → false positive khi lỗi xảy ra giữa
 * 2 lần goDashboard() (style đã set nhưng UI không render kịp).
 */
function _emergencyShowLogin() {
  try {
    var login = document.getElementById('app-login');
    var dash  = document.getElementById('app-dashboard');

    // Dashboard "thật sự hiện" = có class .is-active VÀ getBoundingClientRect không rỗng
    var dashIsVisible = false;
    if (dash) {
      var hasActiveClass = dash.classList.contains('is-active');
      var rect = dash.getBoundingClientRect();
      dashIsVisible = hasActiveClass && rect.width > 0 && rect.height > 0;
    }

    if (!dashIsVisible && login) {
      if (dash) {
        dash.classList.remove('is-active');
        dash.style.setProperty('display', 'none', 'important');
      }
      login.classList.remove('is-hidden');
      login.style.setProperty('display', 'flex', 'important');
      console.warn('[eSign] Emergency fallback: showing login screen');
    }
  } catch (err) {
    console.error('[eSign] _emergencyShowLogin failed:', err && err.message);
  }
}

const CFG = {

  SIDEBAR_KEY     : 'esign_sidebar',         // trạng thái sidebar

/* ─── SESSION STATE ────────────────────────────────────────────────────────── */
/**
 * Quản lý session token + thông tin user trong bộ nhớ (không lưu token
 * trong biến global lộ liễu — truy cập qua Session.getToken()).
 *
 * Sơ đồ luồng lưu trữ:
 *   Đăng nhập + "Ghi nhớ" → localStorage  (còn sau khi đóng/mở browser)
 *   Đăng nhập không "Ghi nhớ" → sessionStorage (xóa khi đóng tab)
 */
const Session = (() => {
  let _data = null; // { token, user, expiresAt, storage: 'local'|'session' }

  const _parse = raw => {
    try { return raw ? JSON.parse(raw) : null; } catch { return null; }
  };

  return {
    /** Đọc session từ storage khi khởi động. Trả về true nếu hợp lệ. */
    load() {
      // Ưu tiên localStorage (ghi nhớ đăng nhập), rồi sessionStorage
      let raw = localStorage.getItem(CFG.LS_KEY);
      let src = 'local';
      if (!raw) { raw = sessionStorage.getItem(CFG.LS_KEY); src = 'session'; }

      const parsed = _parse(raw);
      if (!parsed?.token || !parsed?.expiresAt) return false;
      if (new Date(parsed.expiresAt) <= new Date()) { this.clear(); return false; }

      _data = { ...parsed, storage: src };
      return true;
    },

    /**
     * Lưu session sau đăng nhập thành công.
     * @param {Object}  result     - Response từ hàm login() GAS
     * @param {boolean} remember   - Tick "Ghi nhớ đăng nhập"
     */
    save(result, remember) {
      const src = remember ? 'local' : 'session';
      _data = { token: result.token, user: result.user, expiresAt: result.expiresAt, storage: src };
      const store = remember ? localStorage : sessionStorage;
      store.setItem(CFG.LS_KEY, JSON.stringify(_data));
    },

    /** Xóa toàn bộ dấu vết session. */
    clear() {
      _data = null;
      localStorage.removeItem(CFG.LS_KEY);
      sessionStorage.removeItem(CFG.LS_KEY);
    },

    /** Cập nhật token mới (sau refresh). */
    refresh(token, expiresAt) {
      if (!_data) return;
      _data.token = token;
      _data.expiresAt = expiresAt;
      const store = _data.storage === 'local' ? localStorage : sessionStorage;
      store.setItem(CFG.LS_KEY, JSON.stringify(_data));
    },

    getToken()  { return _data?.token     ?? null; },
    getUser()   { return _data?.user      ?? null; },
    getExpiry() { return _data?.expiresAt ?? null; },
    isValid()   { return !!(_data?.token); },
  };
})();


/* ─── GAS BRIDGE ──────────────────────────────────────────────────────────── */
/**
 * Bọc google.script.run trong Promise.
 * Tự động fallback về Mock khi chạy offline.
 */
const GAS = {
  call(fnName, ...args) {
    if (!CFG.USE_GAS) return Mock.call(fnName, ...args);
    return new Promise((resolve, reject) => {
      const runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(e => reject(new Error(e.message ?? 'Lỗi hệ thống.')));
      if (typeof runner[fnName] !== 'function') {
        return reject(new Error(`Hàm "${fnName}" không tồn tại trên server.`));
      }
      runner[fnName](...args);
    });
  },
};

  const mkExpiry = () => new Date(Date.now() + 3_600_000).toISOString();

  return {
    call(fn, ...args) { return delay(this[fn]?.(...args) ?? null); },

    // [FIX B-01] _db là mutable store cho CRUD mock — khởi tạo từ bản sao của USERS
    _db: { users: USERS.map(u => ({ ...u })) },

        (searchEmail && (u['Email']||'').toLowerCase() === searchEmail)
      );
      if (idx < 0) return { success:false, error:'Không tìm thấy nhân viên.' };
      const old = this._db.users[idx];
      this._db.users[idx] = { ...old, ...payload, 'Mật khẩu': payload['Mật khẩu'] || old['Mật khẩu'] };
      return { success:true, data:{ rowIndex: old._rowIndex }, error:null };

/* ─── PERMISSION ENGINE ────────────────────────────────────────────────────── */
/**
 * PermissionEngine — trái tim của hệ thống phân quyền phía client.
 *
 * Luồng hoạt động:
 *   1. load()          → fetch config từ GAS (hoặc cache sessionStorage)
 *   2. checkPermission()  → tra cứu ma trận quyền
 *   3. applyToSidebar() → ẩn/hiện menu theo vai trò user
 *   4. guardPage()     → chặn truy cập trực tiếp tới page không có quyền
 *
 * Cấu trúc _matrix (sau khi load()):
 * {
 *   "Bảng điều khiển": { "Admin": true,  "Quản lý": true,  "Người dùng": true  },
 *   "Quản lý người dùng": { "Admin": true, "Quản lý": false, "Người dùng": false },
 *   ...
 * }
 *
 * Quy tắc hiển thị sidebar:
 *   TRUE  → nav-link hiện bình thường
 *   FALSE → nav-link ẩn hoàn toàn (perm-hidden)
 *   Thiếu entry trong matrix → coi là FALSE (deny-by-default)
 */
const PermissionEngine = (() => {
  /** Ma trận quyền: { [featureName]: { [roleName]: boolean } } */
  let _matrix = null;

  /** Timestamp lần cuối load để biết khi nào cần refresh cache */
  let _loadedAt = 0;

  /* ── Helpers nội bộ ─────────────────────────────────────────────────────── */

  /**
   * Chuẩn hóa tên vai trò để so sánh an toàn.
   * "admin" → "Admin", "người dùng" → "Người dùng", v.v.
   * Dùng Map ánh xạ cứng thay vì logic phức tạp.
   */
  const ROLE_MAP = {
    'admin'       : 'Admin',
    'quản lý'     : 'Quản lý',
    'quan ly'     : 'Quản lý',
    'người dùng'  : 'Người dùng',
    'nguoi dung'  : 'Người dùng',
    'user'        : 'Người dùng',
  };

  function _normalizeRole(role) {
    if (!role) return null;
    const lower = role.trim().toLowerCase();
    return ROLE_MAP[lower] ?? role.trim(); // Giữ nguyên nếu không có trong map
  }

  /**
   * Xây dựng _matrix từ mảng records của sheet Phan_Quyen.
   * Record shape: { 'Nội dung': string, 'Admin': bool, 'Quản lý': bool, 'Người dùng': bool }
   */
  function _buildMatrix(records) {
    const matrix = {};
    records.forEach(row => {
      const feature = (row['Nội dung'] || '').trim();
      if (!feature) return;
      matrix[feature] = {
        'Admin'      : row['Admin']       === true || row['Admin']       === 'TRUE',
        'Quản lý'    : row['Quản lý']     === true || row['Quản lý']     === 'TRUE',
        'Người dùng' : row['Người dùng']  === true || row['Người dùng']  === 'TRUE',
      };
    });
    return matrix;
  }

  /** Lưu matrix vào sessionStorage kèm timestamp. */
  function _saveCache(matrix) {
    try {
      sessionStorage.setItem(CFG.PERM_KEY, JSON.stringify({
        matrix,
        loadedAt: Date.now(),
      }));
    } catch (_) { /* sessionStorage đầy hoặc bị chặn — bỏ qua */ }
  }

  /** Đọc cache từ sessionStorage. Trả về null nếu hết hạn hoặc không có. */
  function _readCache() {
    try {
      const raw = sessionStorage.getItem(CFG.PERM_KEY);
      if (!raw) return null;
      const { matrix, loadedAt } = JSON.parse(raw);
      if (Date.now() - loadedAt > CFG.PERM_TTL_MS) return null; // hết hạn
      return { matrix, loadedAt };
    } catch (_) { return null; }
  }

  /* ── Public API ─────────────────────────────────────────────────────────── */
  return {
    /**
     * Tải cấu hình phân quyền từ backend (hoặc cache sessionStorage).
     *
     * Thứ tự ưu tiên:
     *   1. Cache sessionStorage còn hạn → dùng ngay (không gọi GAS)
     *   2. Gọi GAS getPhanQuyenConfig() → build matrix → lưu cache
     *
     * @returns {Promise<boolean>} true nếu load thành công
     */
    async load() {
      // 1. Thử đọc cache trước
      const cached = _readCache();
      if (cached) {
        _matrix   = cached.matrix;
        _loadedAt = cached.loadedAt;
        console.info('[Perm] Dùng cache phân quyền:', Object.keys(_matrix).length, 'tính năng.');
        return true;
      }

      // 2. Hiện loading overlay
      document.getElementById('perm-loading').classList.add('visible');

      try {
        const res = await GAS.call('getPhanQuyenConfig');

        if (!res.success || !Array.isArray(res.data)) {
          console.error('[Perm] Backend trả về lỗi:', res.error);
          return false;
        }

        _matrix   = _buildMatrix(res.data);
        _loadedAt = Date.now();
        _saveCache(_matrix);

        console.info('[Perm] Load thành công:', Object.keys(_matrix).length, 'tính năng từ Sheets.');
        return true;

      } catch (err) {
        console.error('[Perm] Lỗi fetch getPhanQuyenConfig:', err.message);
        return false;
      } finally {
        document.getElementById('perm-loading').classList.remove('visible');
      }
    },

    /**
     * ★ HÀM KIỂM TRA QUYỀN CHÍNH ★
     *
     * @param {string} userRole    - Vai trò của user ("Admin", "Quản lý", "Người dùng")
     * @param {string} featureName - Tên tính năng khớp với cột "Nội dung" trong sheet
     * @returns {boolean}  true = được phép, false = không được phép
     *
     * Ví dụ:
     *   checkPermission("Admin", "Quản lý người dùng") → true
     *   checkPermission("Người dùng", "Quản lý người dùng") → false
     *   checkPermission("Người dùng", "Ký tài liệu") → true
     */
    checkPermission(userRole, featureName) {
      // Nếu chưa load matrix → deny-by-default (an toàn hơn allow)
      if (!_matrix) {
        console.warn('[Perm] checkPermission() gọi trước khi load(). Feature:', featureName);
        return false;
      }

      const role    = _normalizeRole(userRole);
      const feature = (featureName || '').trim();

      if (!role || !feature) return false;

      const featureRow = _matrix[feature];

      // Không có entry trong matrix.
      // [FIX Lỗi #2] SAFETY NET: Admin = superuser → mặc định ALLOW khi sheet
      // Phan_Quyen thiếu/sai dòng. Vai trò khác vẫn deny-by-default.
      if (!featureRow) {
        if (role === 'Admin') {
          console.warn(`[Perm] Feature "${feature}" không có trong matrix — Admin được ALLOW mặc định (kiểm tra sheet Phan_Quyen).`);
          return true;
        }
        console.warn(`[Perm] Không tìm thấy feature "${feature}" trong matrix phân quyền → deny (role: ${role}).`);
        return false;
      }

      // Tra cứu quyền; undefined → false
      const allowed = featureRow[role] ?? false;

      console.debug(`[Perm] checkPermission("${role}", "${feature}") → ${allowed}`);
      return allowed;
    },

    /**
     * Áp dụng phân quyền lên toàn bộ sidebar.
     *
     * Với mỗi nav-link có [data-feature]:
     *   - Được phép  → xóa class perm-hidden, perm-locked (hiện bình thường)
     *   - Không phép → thêm class perm-hidden (ẩn hoàn toàn)
     *
     * Sau đó ẩn group label nếu tất cả items trong group đều bị ẩn.
     *
     * @param {string} userRole - Vai trò của user đang đăng nhập
     */
    applyToSidebar(userRole) {
      if (!_matrix) return;

      const navLinks = document.querySelectorAll('#sidebar .nav-link[data-feature]');

      navLinks.forEach(link => {
        const feature = link.getAttribute('data-feature');
        const allowed = this.checkPermission(userRole, feature);

        link.classList.remove('perm-hidden', 'perm-locked');

        if (!allowed) {
          link.classList.add('perm-hidden');
        }
      });

      // Ẩn group label nếu tất cả nav items trong group đó bị hidden
      this._hideEmptyGroups();

      console.info(`[Perm] applyToSidebar() hoàn tất cho vai trò "${userRole}".`);
    },

    /**
     * Ẩn các group label trong sidebar khi toàn bộ items thuộc group đó bị ẩn.
     * Logic: group label là .nav-group-label[data-nav-group], items sau nó
     * thuộc group đó cho đến group label tiếp theo.
     */
    _hideEmptyGroups() {
      const labels = document.querySelectorAll('.nav-group-label[data-nav-group]');

      labels.forEach(label => {
        // Lấy tất cả siblings phía sau label đến label tiếp theo
        const groupItems = [];
        let el = label.nextElementSibling;
        while (el && !el.classList.contains('nav-group-label')) {
          if (el.classList.contains('nav-link') && el.hasAttribute('data-feature')) {
            groupItems.push(el);
          }
          el = el.nextElementSibling;
        }

        const allHidden = groupItems.length > 0 &&
          groupItems.every(item => item.classList.contains('perm-hidden'));

        label.classList.toggle('perm-group-hidden', allHidden);
      });
    },

    /**
     * Bảo vệ một page/module: kiểm tra quyền khi user click nav.
     * Nếu không có quyền → hiện màn hình access-denied thay vì content.
     *
     * @param {string} userRole    - Vai trò user
     * @param {string} featureName - Tính năng cần kiểm tra
     * @param {string} pageName    - Tên trang (để hiển thị trong thông báo)
     * @returns {boolean} true = được vào, false = bị chặn
     */
    guardPage(userRole, featureName, pageName) {
      const allowed = this.checkPermission(userRole, featureName);

      if (!allowed) {
        this._showAccessDenied(userRole, featureName, pageName);
        return false;
      }

      // Được phép → đảm bảo access-denied không hiện
      this._hideAccessDenied();
      return true;
    },

    _showAccessDenied(role, feature, pageName) {
      const el       = document.getElementById('access-denied');
      const content  = document.getElementById('dashboard-content');
      const roleText = document.getElementById('denied-role-text');
      const descText = document.getElementById('denied-desc-text');

      if (content) content.style.display = 'none';
      roleText.textContent = `Vai trò: ${role}`;
      descText.textContent = `Tài khoản với vai trò "${role}" không được phép truy cập ` +
        `"${pageName || feature}". Vui lòng liên hệ quản trị viên.`;

      el.classList.add('visible');
      console.warn(`[Perm] Truy cập bị chặn: role="${role}", feature="${feature}"`);
    },

    _hideAccessDenied() {
      const el      = document.getElementById('access-denied');
      const content = document.getElementById('dashboard-content');
      el.classList.remove('visible');
      if (content) content.style.display = '';
    },

    /** Buộc load lại từ server (bỏ qua cache). Dùng sau khi admin cập nhật quyền. */
    invalidateCache() {
      try { sessionStorage.removeItem(CFG.PERM_KEY); } catch (_) {}
      _matrix   = null;
      _loadedAt = 0;
      console.info('[Perm] Cache phân quyền đã bị xóa.');
    },

    /** Lấy toàn bộ matrix hiện tại (dùng để debug). */
    getMatrix() { return _matrix ? { ..._matrix } : null; },
  };
})();

/**
 * Hàm global tiện lợi — shortcut để gọi từ bất kỳ đâu trong code.
 *
 * @param {string} featureName - Tên tính năng cần kiểm tra
 * @returns {boolean}
 *
 * Ví dụ:
 *   if (!checkPermission("Tạo tài liệu")) { btn.disabled = true; }
 *   if (checkPermission("Quản lý người dùng")) { showAdminPanel(); }
 */
function checkPermission(featureName) {
  const user = Session.getUser();
  if (!user) return false;
  const role = user['Phân quyền'] || 'Người dùng';
  return PermissionEngine.checkPermission(role, featureName);
}


/* ─── ROUTER ──────────────────────────────────────────────────────────────── */
const Router = {
  goLogin() {
    // Ẩn dashboard & reset page-dashboard về trạng thái ban đầu (không còn .active)
    // Dùng cả class .is-active VÀ inline style để đảm bảo thắng mọi CSS, kể cả !important
    const dashEl = document.getElementById('app-dashboard');
    if (dashEl) {
      dashEl.classList.remove('is-active');
      dashEl.style.display = 'none';
    }
    const pageDash = document.getElementById('page-dashboard');
    if (pageDash) { pageDash.classList.remove('active'); pageDash.style.display = ''; }

    // Hiện màn login: thêm class is-active (ưu tiên cao) và set inline style
    const el = document.getElementById('app-login');
    if (el) {
      el.classList.remove('is-hidden');
      el.style.display = 'flex';
      el.classList.add('screen-fade');
    }
    // Reset form
    document.getElementById('login-form')?.reset();
    UI.clearAllErrors();
    UI.clearAlert();
    UI.setBtnLoading(false);
    setTimeout(() => document.getElementById('login-email')?.focus(), 100);
  },

  goDashboard(user) {
    console.log('[Router.goDashboard] Bắt đầu chuyển về Dashboard. User:', user?.['Mã NV'] ?? '?');

    // 1. Ẩn màn login & reset trạng thái nút login
    //    Dùng class .is-hidden + setProperty('display', 'none', 'important') để đảm bảo
    //    thắng mọi CSS rule có !important (như inline CSS trong index.html).
    const loginEl = document.getElementById('app-login');
    if (loginEl) {
      loginEl.classList.add('is-hidden');
      loginEl.style.setProperty('display', 'none', 'important');
    }
    try { UI.setBtnLoading(false); } catch (_) {}

    // 2. Hiện app-dashboard wrapper
    //    Tương tự: class .is-active + setProperty với !important để chắc chắn hiện
    const dashEl = document.getElementById('app-dashboard');
    if (!dashEl) {
      console.error('[Router.goDashboard] Không tìm thấy #app-dashboard!');
      return;
    }
    dashEl.classList.add('is-active');
    dashEl.style.setProperty('display', 'block', 'important');
    dashEl.classList.add('screen-fade');

    // 3. QUAN TRỌNG: Hiện page-dashboard bằng class .active (nhất quán với CSS pattern).
    //    Xóa inline style để CSS stylesheet kiểm soát hoàn toàn.
    //    Tất cả pages khác bị ẩn bằng cách xóa .active (CSS mặc định: display:none).
    const allPages = [
      'page-dashboard','page-users','page-new-doc',
      'page-pending','page-all-docs',
    ];
    allPages.forEach(id => {
      const p = document.getElementById(id);
      if (p) {
        // Xóa inline style để tránh xung đột với CSS stylesheet
        p.style.display = '';
        if (id === 'page-dashboard') {
          p.classList.add('active');
          p.classList.remove('hidden');
        } else {
          p.classList.remove('active');
        }
      }
    });

    // 4. Đảm bảo dashboard-content hiện (nếu bị ẩn bởi access-denied)
    const dashContent = document.getElementById('dashboard-content');
    if (dashContent) {
      dashContent.style.display = '';
    }

    // 5. Đảm bảo access-denied không hiện sót từ session cũ
    const accessDenied = document.getElementById('access-denied');
    if (accessDenied) accessDenied.classList.remove('visible');

    console.log('[Router.goDashboard] Dashboard đã hiện, page-dashboard.active = true.');

    // SAFETY NET: verify sau 50ms rằng dashboard thực sự visible.
    // Nếu CSS lỗi và dashboard không hiện (width/height = 0), force-fix bằng inline !important.
    setTimeout(() => {
      try {
        const d = document.getElementById('app-dashboard');
        const rect = d?.getBoundingClientRect();
        if (!rect || rect.width === 0 || rect.height === 0) {
          console.warn('[Router.goDashboard] SAFETY NET kích hoạt: dashboard chưa visible, force-fix.');
          d?.style.setProperty('display', 'block', 'important');
          const lg = document.getElementById('app-login');
          lg?.style.setProperty('display', 'none', 'important');
        }
        // Verify page-dashboard
        const pd = document.getElementById('page-dashboard');
        const pdRect = pd?.getBoundingClientRect();
        if (pd && (!pdRect || pdRect.height === 0)) {
          console.warn('[Router.goDashboard] page-dashboard chưa visible, force-fix.');
          pd.classList.add('active');
          pd.style.setProperty('display', 'block', 'important');
        }
      } catch (e) {
        console.error('[Router.goDashboard] SAFETY NET lỗi:', e.message);
      }
    }, 50);

    // 6. Reset nav-link active state về "Bảng điều khiển" (fix: sai highlight sau logout→login)
    try {
      document.querySelectorAll('#sidebar .nav-link').forEach(l => l.classList.remove('active'));
      const homeLink = document.querySelector('#sidebar .nav-link[data-page="dashboard"]');
      if (homeLink) homeLink.classList.add('active');
      const breadcrumb = document.getElementById('breadcrumb-current');
      if (breadcrumb) breadcrumb.textContent = 'Bảng điều khiển';
    } catch (_) {}

    // 7. Điền thông tin user vào header
    try {
      UI.renderUser(user);
      console.log('[Router.goDashboard] renderUser() thành công.');
    } catch (renderErr) {
      console.error('[Router.goDashboard] renderUser() lỗi (không block UI):', renderErr.message);
    }

    // 8. Khôi phục trạng thái sidebar
    try {
      UI.restoreSidebar();
    } catch (_) {}

    // 9. Tải phân quyền sau khi dashboard đã hiện
    const role = user?.['Phân quyền'] || 'Người dùng';
    PermissionEngine.load()
      .then(ok => {
        console.log('[Router.goDashboard] PermissionEngine.load():', ok ? 'OK' : 'Thất bại');
        if (ok) {
          PermissionEngine.applyToSidebar(role);
        } else {
          Toast.warning('Không thể tải cấu hình phân quyền. Một số tính năng có thể bị hạn chế.');
        }
      })
      .catch(permErr => {
        console.error('[Router.goDashboard] PermissionEngine lỗi (không block):', permErr.message);
      });
  },
};


/* ─── UI HELPERS ──────────────────────────────────────────────────────────── */
const UI = {
  initials(name) {
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0] + p[p.length - 1][0]).toUpperCase();
  },

  /** Điền thông tin user vào sidebar footer + header dropdown.
   *  Null-safe: dùng optional chaining để không crash khi element thiếu.
   */
  renderUser(user) {
    if (!user) {
      console.warn('[UI.renderUser] user là null/undefined, bỏ qua.');
      return;
    }
    console.log('[UI.renderUser] Điền thông tin user:', user['Mã NV'] ?? '?');

    const name      = user['Họ tên']     || 'Người dùng';
    const role      = user['Phân quyền'] || '—';
    const chucvu    = user['Chức vụ']    || role;
    const initials  = this.initials(name);
    const firstName = name.split(' ').pop();
    const avatarUrl = user['Hình đại diện'] || '';

    // Sidebar footer
    const sbAvatar = document.getElementById('sb-avatar');
    const sbName   = document.getElementById('sb-name');
    const sbRole   = document.getElementById('sb-role');
    if (sbAvatar) {
      if (avatarUrl) {
        sbAvatar.innerHTML = `<img src="${avatarUrl}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentNode.textContent='${initials}'">`;
      } else {
        sbAvatar.textContent = initials;
      }
    }
    if (sbName) sbName.textContent = name;
    if (sbRole) sbRole.textContent = chucvu;

    // Header dropdown
    const hdrAvatar = document.getElementById('hdr-avatar');
    const hdrName   = document.getElementById('hdr-name');
    const hdrRole   = document.getElementById('hdr-role');
    if (hdrAvatar) hdrAvatar.textContent = initials;
    if (hdrName)   hdrName.textContent   = name;
    if (hdrRole)   hdrRole.textContent   = chucvu;

    // Welcome message trên dashboard
    const welcomeEl = document.getElementById('welcome-msg');
    if (welcomeEl) {

        `Xin chào, <strong>${firstName}</strong>! Bạn có <strong>5 tài liệu</strong> đang chờ ký.`;
    }

    console.log('[UI.renderUser] Hoàn tất.');
  },

  restoreSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar) return;
    const collapsed = localStorage.getItem(CFG.SIDEBAR_KEY) === 'true' && window.innerWidth >= 992;
    sidebar.classList.toggle('collapsed', collapsed);
    document.body.classList.toggle('sidebar-collapsed', collapsed);
  },

  /* — Alert banner — */
  setAlert(msg, type = 'error') {
    const el   = document.getElementById('login-alert');
    const span = document.getElementById('login-alert-msg');
    const icon = el.querySelector('i');
    el.className  = `alert-login visible ${type}`;
    span.textContent = msg;
    icon.className = type === 'error'
      ? 'bi bi-exclamation-circle-fill'
      : 'bi bi-check-circle-fill';
    icon.style.cssText = 'font-size:16px;flex-shrink:0;';
  },
  clearAlert() { document.getElementById('login-alert').classList.remove('visible'); },

  /* — Field error — */
  setFieldError(inputId, msg) {
    const input = document.getElementById(inputId);
    // err-email, err-password  ← derivado de "login-email" → "email"
    const errId = 'err-' + inputId.replace('login-', '');
    const errEl = document.getElementById(errId);
    input?.classList.toggle('is-invalid', !!msg);
    if (errEl) {
      errEl.classList.toggle('visible', !!msg);
      const s = errEl.querySelector('span');
      if (s) s.textContent = msg ?? '';
    }
  },
  clearAllErrors() {
    ['login-email', 'login-password'].forEach(id => this.setFieldError(id, ''));
  },

  /* — Submit button loading state — */
  setBtnLoading(on) {
    const btn = document.getElementById('btn-login');
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  },
};


/* ─── AUTH CONTROLLER ─────────────────────────────────────────────────────── */
/**
 * Chờ cho google.script.run sẵn sàng (tối đa 5 giây).
 * Trên GAS deployed, runtime có thể chậm hơn DOMContentLoaded ~100-500ms.
 * Fallback an toàn: sau timeout vẫn tiếp tục (sẽ dùng Mock nếu chưa có).
 */
function _waitForGasRuntime(timeoutMs = 5000) {
  // Nếu đã sẵn sàng ngay → resolve luôn
  if (typeof google !== 'undefined' && typeof google.script !== 'undefined') {
    return Promise.resolve();
  }
  return new Promise(resolve => {
    const start    = Date.now();
    const interval = setInterval(() => {
      if (typeof google !== 'undefined' && typeof google.script !== 'undefined') {
        clearInterval(interval);
        console.info('[eSign] GAS runtime sẵn sàng sau', Date.now() - start, 'ms');
        resolve();
      } else if (Date.now() - start >= timeoutMs) {
        clearInterval(interval);
        console.warn('[eSign] GAS runtime timeout — tiếp tục với Mock mode');
        resolve();
      }
    }, 50);
  });
}

const Auth = {
  _timer: null,

  /** Điểm khởi động: kiểm tra session cũ hay hiện login. */
  async init() {
    // Đảm bảo google.script.run đã sẵn sàng trước khi gọi
    // (GAS runtime đôi khi khởi tạo chậm hơn DOMContentLoaded)
    await _waitForGasRuntime();

    if (Session.load()) {
      await this._verifyAndEnter();
    } else {
      Router.goLogin();
    }
  },

  /** Verify token với server; vào dashboard hoặc về login. */
  async _verifyAndEnter() {
    try {
      const res = await GAS.call('validateSession', Session.getToken());
      if (res.valid) {
        Router.goDashboard(res.user);
        this._scheduleRefresh(res.expiresAt);
      } else {
        Session.clear();
        Router.goLogin();
      }
    } catch (e) {
      // Lỗi mạng → tin tưởng session local tạm thời
      console.warn('[Auth] Server verify thất bại, dùng cache:', e.message);
      Router.goDashboard(Session.getUser());
    }
  },

  /**
   * Xử lý submit form đăng nhập.
   * Thứ tự: validate → gọi GAS → lưu session → chuyển dashboard.
   */
  async handleLogin(e) {
    e.preventDefault();
    UI.clearAlert();
    UI.clearAllErrors();

    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const remember = document.getElementById('remember-me').checked;

    /* Validate client-side */
    let invalid = false;
    if (!email) {
      UI.setFieldError('login-email', 'Vui lòng nhập địa chỉ email.');
      invalid = true;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      UI.setFieldError('login-email', 'Địa chỉ email không đúng định dạng.');
      invalid = true;
    }
    if (!password) {
      UI.setFieldError('login-password', 'Vui lòng nhập mật khẩu.');
      invalid = true;
    }
    if (invalid) return;

    /* Gọi backend */
    console.log('[Auth.handleLogin] Gọi GAS login, email:', email);
    UI.setBtnLoading(true);

    try {
      const res = await GAS.call('login', { email, password });
      console.log('[Auth.handleLogin] Kết quả GAS:', res.success ? 'SUCCESS' : 'FAILED', res.error || '');

      if (res.success) {
        /* ✅ Đăng nhập thành công */
        Session.save(res, remember);
        console.log('[Auth.handleLogin] Session đã lưu. User:', res.user?.['Mã NV']);
        UI.setAlert('Đăng nhập thành công! Đang tải...', 'success');

        setTimeout(() => {
          // [FIX] Bọc try/catch để tránh blank screen nếu goDashboard lỗi
          try {
            console.log('[Auth.handleLogin] Chuyển sang Dashboard...');
            UI.setBtnLoading(false);
            Router.goDashboard(res.user);
            Toast.success(`Chào mừng, ${res.user['Họ tên']}!`);
            this._scheduleRefresh(res.expiresAt);
          } catch (navErr) {
            console.error('[Auth.handleLogin] Lỗi chuyển Dashboard:', navErr.message);
            _emergencyShowLogin();
            UI.setAlert('Lỗi hiển thị Dashboard. Vui lòng thử lại.');
          }
        }, 550);

      } else {
        /* ❌ Sai thông tin */
        UI.setBtnLoading(false);
        UI.setAlert(res.error || 'Đăng nhập thất bại. Vui lòng thử lại.');
        const pwd = document.getElementById('login-password');
        if (pwd) { pwd.classList.add('is-invalid'); pwd.value = ''; pwd.focus(); }
      }

    } catch (err) {
      UI.setBtnLoading(false);
      UI.setAlert('Lỗi kết nối. Vui lòng thử lại sau.');
      console.error('[Auth.handleLogin] Exception:', err.message, err.stack);
    }
  },

  /** Đăng xuất: xóa session local → về login → gọi backend hủy cache. */
  async handleLogout(e) {
    e.preventDefault();
    const token = Session.getToken();
    clearTimeout(this._timer);
    Session.clear();
    PermissionEngine.invalidateCache();
    TransactionLogger.clearLocalLog();
    Router.goLogin();
    Toast.success('Đã đăng xuất thành công.');
    if (token) GAS.call('logout', token).catch(() => {});
  },

  /**
   * Lập lịch tự động refresh token.
   * Gọi lại đệ quy sau mỗi lần refresh thành công.
   */
  _scheduleRefresh(expiresAt) {
    clearTimeout(this._timer);
    if (!expiresAt) return;
    const delay = Math.max(0, new Date(expiresAt) - Date.now() - CFG.REFRESH_BEFORE);
    if (delay === 0) return;

    this._timer = setTimeout(async () => {
      try {
        const res = await GAS.call('refreshSession', Session.getToken());
        if (res.success) {
          Session.refresh(res.token, res.expiresAt);
          this._scheduleRefresh(res.expiresAt);
          console.info('[Auth] Token gia hạn thành công.');
        } else {
          Toast.error('Phiên đăng nhập hết hạn. Vui lòng đăng nhập lại.');
          setTimeout(() => this.handleLogout({ preventDefault() {} }), 2500);
        }
      } catch (err) {
        console.error('[Auth._scheduleRefresh]', err);
      }
    }, delay);

    console.info(`[Auth] Refresh token sau ${Math.round(delay / 1000)}s`);
  },
};


/* ─── DASHBOARD CONTROLLER ───────────────────────────────────────────────── */
const Dash = {
  init() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    /* Toggle sidebar */
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      if (window.innerWidth >= 992) {
        const c = sidebar.classList.toggle('collapsed');
        document.body.classList.toggle('sidebar-collapsed', c);
        localStorage.setItem(CFG.SIDEBAR_KEY, c);
      } else {
        const open = sidebar.classList.toggle('mobile-open');
        overlay.classList.toggle('visible', open);
        document.body.style.overflow = open ? 'hidden' : '';
      }
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.remove('mobile-open');
      overlay.classList.remove('visible');
      document.body.style.overflow = '';
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 992) {
        sidebar.classList.remove('mobile-open');
        overlay.classList.remove('visible');
        document.body.style.overflow = '';
      }
    });

    /* Nav active state + breadcrumb + permission guard */
    document.querySelectorAll('#sidebar .nav-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();

        const feature  = link.getAttribute('data-feature');
        const page     = link.getAttribute('data-page');
        const label    = link.querySelector('.nav-label');
        const pageName = label?.textContent.trim() ?? feature;
        const user     = Session.getUser();
        const role     = user?.['Phân quyền'] || 'Người dùng';

        if (feature && !PermissionEngine.guardPage(role, feature, pageName)) return;

        PermissionEngine._hideAccessDenied();
        document.querySelectorAll('#sidebar .nav-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        if (label) document.getElementById('breadcrumb-current').textContent = pageName;

        // ── SPA page routing ──
        if (page === 'users') {
          NewDocModule.hide(); PendingDocs.hide(); DocSearch.hide();
          UserManager.show();
        } else if (page === 'new-doc') {
          UserManager.hide(); PendingDocs.hide(); DocSearch.hide();
          NewDocModule.show();
        } else if (page === 'pending') {
          UserManager.hide(); NewDocModule.hide(); DocSearch.hide();
          PendingDocs.show();
        } else if (page === 'all-docs' || page === 'done') {
          UserManager.hide(); NewDocModule.hide(); PendingDocs.hide();
          DocSearch.show(page === 'done' ? 'Đã ký' : '');
        } else if (page === 'dashboard') {
          UserManager.hide(); NewDocModule.hide(); PendingDocs.hide(); DocSearch.hide();
        } else {
          UserManager.hide(); NewDocModule.hide(); PendingDocs.hide(); DocSearch.hide();
        }

        if (window.innerWidth < 992) {
          sidebar.classList.remove('mobile-open');
          overlay.classList.remove('visible');
          document.body.style.overflow = '';
        }
      });
    });
  },
};


/* ══════════════════════════════════════════════════════════════════════════════
   NEW DOC MODULE  v2.0  —  Khởi tạo tài liệu trình ký
   Thêm: SignerConfig sub-module — cấu hình người ký theo loại tài liệu
══════════════════════════════════════════════════════════════════════════════ */
const NewDocModule = (() => {

  /* ── State ────────────────────────────────────────────────────────────── */
  let _selectedType = '';
  let _selectedFile = null;
  let _isSubmitting = false;

  /**
   * _signerConfig — object lưu toàn bộ cấu hình người ký.
   *
   * Với Văn bản HC (van-ban-hc):
   * {
   *   mode   : 'single',
   *   single : { maNV, hoTen, phongBan, phanQuyen }
   * }
   *
   * Với Hợp đồng / Biên bản (hop-dong | bien-ban):
   * {
   *   mode  : 'multi',
   *   steps : [
   *     { id, buoc, maNV, hoTen, phongBan, phanQuyen, vaiTroKy },
   *     { id, buoc, maNV, hoTen, phongBan, phanQuyen, vaiTroKy },
   *     ...
   *   ]
   * }
   *
   * null = chưa cấu hình
   */
  let _signerConfig = null;

  /* ── Helpers ──────────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const DOC_TYPE_LABELS  = { 'hop-dong':'Hợp đồng', 'bien-ban':'Biên bản', 'van-ban-hc':'Văn bản hành chính' };
  const DOC_TYPE_PREFIX  = { 'hop-dong':'HĐ', 'bien-ban':'BB', 'van-ban-hc':'VB' };
  const MAX_FILE_MB = 20;
  const MAX_FILE_B  = MAX_FILE_MB * 1024 * 1024;
  const MAX_SIGNERS = 8;

  const _fmtSize  = b => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(2)+' MB';
  const _initials = n => { if (!n) return '?'; const p=n.trim().split(/\s+/); return p.length===1?p[0][0].toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase(); };
  const _previewCode = t => { if (!t) return 'Tự động tạo'; const yr=new Date().getFullYear(); return `${DOC_TYPE_PREFIX[t]??'TL'}-${yr}-${String(Math.floor(Math.random()*900)+100)}`; };
  const _today = () => new Date().toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'});
  const _uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

  /* ═══════════════════════════════════════════════════════════════════════
     SIGNER CONFIG SUB-MODULE
     Toàn bộ logic cấu hình người ký nằm trong object SignerConfig
  ═══════════════════════════════════════════════════════════════════════ */
  const SignerConfig = (() => {

    /** Danh sách user được load từ GAS (hoặc Mock) */
    let _users = [];

    /** Danh sách signer rows trong chế độ multi */
    let _rows  = []; // [{ id, buoc, maNV, hoTen, phongBan, phanQuyen, vaiTroKy, expanded }]

    /** Drag-and-drop state */
    let _dragSrcId = null;

    /* ── Cấu hình thông tin theo loại tài liệu ─────────────────────────── */
    const TYPE_CONFIG = {
      'van-ban-hc': {
        title    : 'Người/Đơn vị ký duyệt',
        desc     : 'Chọn người hoặc đơn vị ký duyệt văn bản hành chính',
        infoText : 'Văn bản hành chính yêu cầu <strong>một người</strong> có thẩm quyền ký duyệt. Thường là cấp quản lý hoặc lãnh đạo đơn vị.',
        mode     : 'single',
      },
      'hop-dong': {
        title    : 'Danh sách người ký hợp đồng',
        desc     : 'Thêm và sắp xếp thứ tự các bên ký hợp đồng (kéo thả để đổi thứ tự)',
        infoText : 'Hợp đồng có thể có <strong>nhiều bên ký</strong>. Kéo thả <i class="bi bi-grip-vertical"></i> để thay đổi thứ tự ký. Hệ thống sẽ lần lượt gửi yêu cầu ký theo thứ tự này.',
        mode     : 'multi',
      },
      'bien-ban': {
        title    : 'Danh sách người ký biên bản',
        desc     : 'Thêm tất cả người tham ký xác nhận biên bản theo thứ tự',
        infoText : 'Biên bản cần <strong>tất cả các bên</strong> ký xác nhận. Mỗi người sẽ nhận yêu cầu ký tuần tự theo bước đã cấu hình.',
        mode     : 'multi',
      },
    };

    /* ── Populate user dropdowns ────────────────────────────────────────── */
    function _buildOptionHTML(selected = '') {
      return '<option value="">— Chọn người ký —</option>' +
        _users.map(u => {
          const val = u['Mã NV'] || u.maNV || '';
          const lbl = (u['Họ tên'] || u.hoTen || '—') + ' — ' + (u['Phòng ban'] || u.phongBan || '') + ' (' + (u['Phân quyền'] || '') + ')';
          return `<option value="${val}" ${val === selected ? 'selected' : ''}>${lbl}</option>`;
        }).join('');
    }

    function _populateSingleSelect() {
      const sel = $('single-signer-select');
      if (sel) sel.innerHTML = _buildOptionHTML();
    }

    function _populateRowSelect(rowId, selected = '') {
      const sel = document.querySelector(`[data-row-id="${rowId}"] .row-user-select`);
      if (sel) sel.innerHTML = _buildOptionHTML(selected);
    }

    /* ── Single mode — chip preview ─────────────────────────────────────── */
    function _updateSingleChip(maNV) {
      const user   = _users.find(u => (u['Mã NV'] || u.maNV) === maNV);
      const chip   = $('single-signer-chip');
      if (!chip) return;

      if (user) {
        const name = user['Họ tên'] || user.hoTen || '—';
        $('chip-avatar').textContent = _initials(name);
        $('chip-name').textContent   = name;
        $('chip-dept').textContent   = (user['Phòng ban'] || user.phongBan || '') + ' · ' + (user['Chức vụ'] || user.chucVu || '');
        $('chip-role').textContent   = user['Phân quyền'] || user.phanQuyen || '—';
        chip.classList.add('show');
      } else {
        chip.classList.remove('show');
      }
    }

    /* ── Multi mode — render row list ───────────────────────────────────── */
    function _renderRows() {
      const list = $('signer-list');
      if (!list) return;

      list.innerHTML = _rows.map((row, idx) => {
        const user      = _users.find(u => (u['Mã NV'] || u.maNV) === row.maNV);
        const userName  = user ? (user['Họ tên'] || user.hoTen) : null;
        const isFilled  = !!row.maNV;
        const expanded  = row.expanded;

        return `
        <div class="signer-row ${isFilled ? 'is-filled' : ''} ${expanded ? 'expanded' : ''}"
             data-row-id="${row.id}"
             draggable="true"
             role="listitem"
             aria-label="Bước ${idx+1}: ${userName || 'Chưa chọn'}">

          <!-- Row header -->
          <div class="signer-row-header" onclick="SignerConfig._toggleRow('${row.id}')">
            <div class="signer-drag-handle" title="Kéo để đổi thứ tự"
                 onclick="event.stopPropagation()"
                 draggable="false">
              <i class="bi bi-grip-vertical"></i>
            </div>
            <div class="signer-step-badge">${isFilled ? '<i class="bi bi-check" style="font-size:12px;"></i>' : idx+1}</div>
            <div class="signer-step-label">Bước ${idx+1}</div>
            <div class="signer-step-role" style="color:${isFilled?'#059669':'var(--text-muted)'}">
              ${userName ? `<i class="bi bi-person-fill me-1"></i>${userName}` : '<i class="bi bi-person me-1"></i>Chưa chọn'}
            </div>
            <i class="bi bi-chevron-${expanded?'up':'down'}" style="font-size:13px;color:var(--text-muted);"></i>
            <button class="signer-row-delete" title="Xóa bước này"
                    onclick="event.stopPropagation();SignerConfig._deleteRow('${row.id}')"
                    aria-label="Xóa bước ${idx+1}">
              <i class="bi bi-trash3"></i>
            </button>
          </div>

          <!-- Expanded body -->
          <div class="signer-row-body d-flex">
            <div class="signer-user-picker">
              <i class="bi bi-person su-icon"></i>
              <select class="row-user-select"
                      data-row-id="${row.id}"
                      aria-label="Chọn người ký bước ${idx+1}"
                      onchange="SignerConfig._onRowUserChange('${row.id}', this.value)">
                ${_buildOptionHTML(row.maNV)}
              </select>
            </div>
            <div class="signer-role-input">
              <input type="text"
                     placeholder="Vai trò ký (tuỳ chọn)"
                     maxlength="60"
                     value="${row.vaiTroKy || ''}"
                     aria-label="Vai trò ký của người ký bước ${idx+1}"
                     oninput="SignerConfig._onRowRoleChange('${row.id}', this.value)" />
            </div>
          </div>

        </div>
        ${idx < _rows.length - 1 ? '<div class="signer-flow-arrow"><i class="bi bi-arrow-down"></i></div>' : ''}
        `;
      }).join('');

      // Add signer btn state
      const addBtn = $('btn-add-signer');
      if (addBtn) addBtn.disabled = _rows.length >= MAX_SIGNERS;

      // Update flow preview
      _renderFlowPreview();
      // Rebind drag events after re-render
      _bindDragEvents();
      // Bubble up to parent
      _onSignersChanged();
    }

    function _renderFlowPreview() {
      const filled = _rows.filter(r => r.maNV);
      const prev   = $('signer-flow-preview');
      const items  = $('signer-flow-items');
      if (!prev || !items) return;

      if (filled.length === 0) { prev.style.display = 'none'; return; }
      prev.style.display = 'block';

      items.innerHTML = filled.map((r, i) => {
        const u    = _users.find(u => (u['Mã NV']||u.maNV) === r.maNV);
        const name = u ? (u['Họ tên']||u.hoTen) : r.maNV;
        const role = r.vaiTroKy ? ` · <em>${r.vaiTroKy}</em>` : '';
        return `
          <div class="signer-summary-item">
            <div class="step-num">${i+1}</div>
            <span>${name}${role}</span>
          </div>
          ${i < filled.length-1 ? '<div style="padding-left:10px;color:var(--text-muted);font-size:14px;margin:-2px 0;"><i class="bi bi-arrow-down-short"></i></div>' : ''}
        `;
      }).join('');
    }

    /* ── Row event handlers (exposed to onclick attributes) ─────────────── */
    function _toggleRow(rowId) {
      const row = _rows.find(r => r.id === rowId);
      if (!row) return;
      row.expanded = !row.expanded;
      _renderRows();
    }

    function _deleteRow(rowId) {
      _rows = _rows.filter(r => r.id !== rowId);
      _renderRows();
      $('err-multi-signer')?.classList.remove('show');
    }

    function _onRowUserChange(rowId, maNV) {
      const row  = _rows.find(r => r.id === rowId);
      if (!row) return;
      const user = _users.find(u => (u['Mã NV']||u.maNV) === maNV);
      row.maNV      = maNV;
      row.hoTen     = user ? (user['Họ tên']||user.hoTen||'') : '';
      row.phongBan  = user ? (user['Phòng ban']||user.phongBan||'') : '';
      row.phanQuyen = user ? (user['Phân quyền']||user.phanQuyen||'') : '';
      _renderRows();
    }

    function _onRowRoleChange(rowId, val) {
      const row = _rows.find(r => r.id === rowId);
      if (row) { row.vaiTroKy = val.trim(); _renderFlowPreview(); _onSignersChanged(); }
    }

    /* ── Add row ────────────────────────────────────────────────────────── */
    function _addRow() {
      if (_rows.length >= MAX_SIGNERS) return;
      const newRow = { id: _uid(), buoc: _rows.length + 1, maNV: '', hoTen: '', phongBan: '', phanQuyen: '', vaiTroKy: '', expanded: true };
      // Collapse other rows for cleaner UX
      _rows.forEach(r => r.expanded = false);
      _rows.push(newRow);
      _renderRows();
      // Scroll new row into view
      setTimeout(() => {
        const el = document.querySelector(`[data-row-id="${newRow.id}"]`);
        el?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 80);
    }

    /* ── Drag & Drop to reorder ─────────────────────────────────────────── */
    function _bindDragEvents() {
      const rows = document.querySelectorAll('.signer-row[draggable]');
      rows.forEach(el => {
        const id = el.dataset.rowId;
        el.addEventListener('dragstart', e => {
          _dragSrcId = id;
          e.dataTransfer.effectAllowed = 'move';
          el.classList.add('dragging');
        });
        el.addEventListener('dragend', () => {
          el.classList.remove('dragging');
          document.querySelectorAll('.signer-row').forEach(r => r.classList.remove('drag-over'));
        });
        el.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (id !== _dragSrcId) el.classList.add('drag-over');
        });
        el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
        el.addEventListener('drop', e => {
          e.preventDefault();
          el.classList.remove('drag-over');
          if (!_dragSrcId || _dragSrcId === id) return;

          const srcIdx  = _rows.findIndex(r => r.id === _dragSrcId);
          const destIdx = _rows.findIndex(r => r.id === id);
          if (srcIdx === -1 || destIdx === -1) return;

          // Swap
          const [moved] = _rows.splice(srcIdx, 1);
          _rows.splice(destIdx, 0, moved);
          _dragSrcId = null;
          _renderRows();
        });
      });
    }

    /* ── Callback bubbled up to parent module ────────────────────────────── */
    function _onSignersChanged() {
      // Let parent update summary & submit button
      _updateSummary();
    }

    /* ── Show/hide panels by doc type ───────────────────────────────────── */
    function showForType(type) {
      const cfg      = TYPE_CONFIG[type];
      const card     = $('nd-card-signers');
      const single   = $('signer-single');
      const multi    = $('signer-multi');
      const infoText = $('signer-info-text');
      const infoBox  = $('signer-info-box');

      if (!card || !cfg) return;

      // Update card header
      if ($('signers-card-title')) $('signers-card-title').textContent = cfg.title;
      if ($('signers-card-desc'))  $('signers-card-desc').textContent  = cfg.desc;

      // Info box
      if (infoText) infoText.innerHTML = cfg.infoText;
      if (infoBox)  infoBox.style.display = '';

      // Show correct panel
      single?.classList.toggle('show', cfg.mode === 'single');
      multi?.classList.toggle('show',  cfg.mode === 'multi');

      // Reset errors
      $('err-single-signer')?.classList.remove('show');
      $('err-multi-signer')?.classList.remove('show');

      // Show card with animation
      card.classList.add('show');

      // Reset config
      _signerConfig = null;

      if (cfg.mode === 'single') {
        _populateSingleSelect();
        // Reset chip
        $('single-signer-chip')?.classList.remove('show');
        const sel = $('single-signer-select');
        if (sel) sel.value = '';
      } else {
        // Start with 1 empty row for better UX
        if (_rows.length === 0) {
          _rows = [{ id: _uid(), buoc:1, maNV:'', hoTen:'', phongBan:'', phanQuyen:'', vaiTroKy:'', expanded:true }];
        }
        _renderRows();
      }
    }

    function hide() {
      $('nd-card-signers')?.classList.remove('show');
      $('signer-single')?.classList.remove('show');
      $('signer-multi')?.classList.remove('show');
      _rows = [];
      _signerConfig = null;
    }

    /* ── Validate ───────────────────────────────────────────────────────── */
    function validate(type) {
      const cfg = TYPE_CONFIG[type];
      if (!cfg) return true; // No signer config needed

      if (cfg.mode === 'single') {
        const maNV = $('single-signer-select')?.value || '';
        if (!maNV) { $('err-single-signer')?.classList.add('show'); return false; }
        return true;
      } else {
        const filled = _rows.filter(r => r.maNV);
        if (filled.length === 0) {
          $('err-multi-signer')?.classList.add('show');
          $('err-multi-msg').textContent = 'Vui lòng thêm ít nhất 1 người ký.';
          return false;
        }
        // Check for duplicate signers
        const maNVs = filled.map(r => r.maNV);
        const hasDup = maNVs.length !== new Set(maNVs).size;
        if (hasDup) {
          $('err-multi-signer')?.classList.add('show');
          $('err-multi-msg').textContent = 'Có người ký bị trùng lặp. Mỗi người chỉ ký một lần.';
          return false;
        }
        return true;
      }
    }

    /* ── Build config object ────────────────────────────────────────────── */
    function buildConfig(type) {
      const cfg = TYPE_CONFIG[type];
      if (!cfg) return null;

      if (cfg.mode === 'single') {
        const maNV = $('single-signer-select')?.value || '';
        const user = _users.find(u => (u['Mã NV']||u.maNV) === maNV);
        return {
          mode  : 'single',
          single: {
            maNV,
            hoTen    : user ? (user['Họ tên']||user.hoTen||'')       : '',
            phongBan : user ? (user['Phòng ban']||user.phongBan||'')  : '',
            phanQuyen: user ? (user['Phân quyền']||user.phanQuyen||''): '',
          },
        };
      } else {
        const steps = _rows
          .filter(r => r.maNV)
          .map((r, i) => ({ ...r, buoc: i + 1 }));
        return { mode: 'multi', steps };
      }
    }

    /* ── Get readable summary string ────────────────────────────────────── */
    function getSummaryText(type) {
      const cfg = TYPE_CONFIG[type];
      if (!cfg) return null;

      if (cfg.mode === 'single') {
        const maNV = $('single-signer-select')?.value || '';
        if (!maNV) return null;
        const user = _users.find(u => (u['Mã NV']||u.maNV) === maNV);
        return user ? (user['Họ tên']||user.hoTen||maNV) : maNV;
      } else {
        const filled = _rows.filter(r => r.maNV);
        if (filled.length === 0) return null;
        return `${filled.length} người ký`;
      }
    }

    /* ── Load users list ────────────────────────────────────────────────── */
    async function loadUsers() {
      try {
        const token = Session.getToken();
        const res   = await GAS.call('getUserList', token);
        if (res.success) {
          _users = res.data ?? [];
        }
      } catch (e) {
        console.warn('[SignerConfig] Không load được user list:', e.message);
        _users = [];
      }
    }

    /* ── Reset ──────────────────────────────────────────────────────────── */
    function reset() {
      _rows  = [];
      hide();
    }

    /* ── Expose needed internals for onclick in rendered HTML ─────────── */
    return {
      showForType, hide, validate, buildConfig, getSummaryText, loadUsers, reset,
      // Exposed for onclick attributes in rendered row HTML
      _toggleRow, _deleteRow, _onRowUserChange, _onRowRoleChange,
      _addRow,
      // Exposed for single signer chip update
      _updateSingleChip,
    };

  })(); // end SignerConfig

  // Make SignerConfig accessible globally for onclick handlers in rendered HTML
  window.SignerConfig = SignerConfig;

  /* ── Summary panel live update ────────────────────────────────────────── */
  function _updateSummary() {
    const loaiEl = $('sum-loai');
    if (_selectedType) { loaiEl.textContent = DOC_TYPE_LABELS[_selectedType]; loaiEl.classList.remove('placeholder'); }
    else { loaiEl.textContent = 'Chưa chọn'; loaiEl.classList.add('placeholder'); }

    const tenVal = ($('nd-ten-td')?.value ?? '').trim();
    const tenEl  = $('sum-ten');
    tenEl.textContent = tenVal || 'Chưa nhập';
    tenEl.classList.toggle('placeholder', !tenVal);

    const daVal = ($('nd-ten-da')?.value ?? '').trim();
    const daEl  = $('sum-da');
    daEl.textContent = daVal || 'Không có';
    daEl.classList.toggle('placeholder', !daVal);

    const fileEl = $('sum-file');
    if (_selectedFile) { fileEl.textContent = _selectedFile.name; fileEl.classList.remove('placeholder'); }
    else { fileEl.textContent = 'Chưa tải lên'; fileEl.classList.add('placeholder'); }

    // Signer summary
    const signerTxt = _selectedType ? SignerConfig.getSummaryText(_selectedType) : null;
    const signerEl  = $('sum-signers');
    if (signerEl) {
      signerEl.textContent = signerTxt || 'Chưa cấu hình';
      signerEl.classList.toggle('placeholder', !signerTxt);
    }

    const maEl = $('sum-ma');
    maEl.textContent = _previewCode(_selectedType);
    maEl.classList.remove('placeholder');

    $('sum-ngay').textContent  = _today();
    const user = Session.getUser();
    $('sum-nguoi').textContent = user?.['Họ tên'] || '—';

    // Checklist
    const signerOk = !!_selectedType && !!SignerConfig.getSummaryText(_selectedType);
    _setCheckItem('chk-loai',    !!_selectedType);
    _setCheckItem('chk-ten',     !!tenVal);
    _setCheckItem('chk-file',    !!_selectedFile);
    _setCheckItem('chk-signers', signerOk);

    // PDF thumbnail
    const thumbCard = $('nd-pdf-thumb-card');
    if (_selectedFile) {
      thumbCard.style.display = 'block';
      $('thumb-name').textContent = _selectedFile.name;
      $('thumb-size').textContent = _fmtSize(_selectedFile.size);
    } else {
      thumbCard.style.display = 'none';
    }

    // Enable submit
    const canSubmit = !!_selectedType && !!tenVal && !!_selectedFile && signerOk;
    const btn = $('nd-btn-submit');
    if (btn) btn.disabled = !canSubmit || _isSubmitting;

    _setWizardStep(!!_selectedType && !!tenVal && signerOk, !!_selectedFile);
  }

  function _setCheckItem(id, ok) {
    const el = $(id); if (!el) return;
    el.classList.toggle('ok', ok);
    const icon = el.querySelector('i');
    if (icon) icon.style.display = ok ? '' : 'none';
  }

  function _setWizardStep(step1Done, step2Done) {
    $('ws-1').classList.toggle('done',   step1Done);
    $('ws-1').classList.toggle('active', !step1Done);
    $('ws-circle-1').innerHTML = step1Done ? '<i class="bi bi-check"></i>' : '1';
    $('ws-2').classList.toggle('done',   step1Done && step2Done);
    $('ws-2').classList.toggle('active', step1Done && !step2Done);
    $('ws-circle-2').innerHTML = step2Done ? '<i class="bi bi-check"></i>' : '2';
    $('ws-3').classList.toggle('active', step1Done && step2Done);
  }

  /* ── Doc type card selector ────────────────────────────────────────────── */
  function _initDocTypeSelector() {
    document.querySelectorAll('.doc-type-btn').forEach(btn => {
      btn.addEventListener('click', () => _selectDocType(btn.dataset.type));
      btn.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); _selectDocType(btn.dataset.type); }
      });
    });
  }

  function _selectDocType(type) {
    _selectedType = type;
    document.querySelectorAll('.doc-type-btn').forEach(b => {
      const sel = b.dataset.type === type;
      b.classList.toggle('selected', sel);
      b.setAttribute('aria-checked', sel ? 'true' : 'false');
    });
    if ($('nd-loai-td')) $('nd-loai-td').value = type;
    $('err-loai-td')?.classList.remove('show');

    // Show signer panel for this type
    SignerConfig.showForType(type);
    _updateSummary();
  }

  /* ── Input char counter ────────────────────────────────────────────────── */
  function _bindCharCount(inputId, countId, max) {
    const el = $(inputId); const ct = $(countId);
    if (!el || !ct) return;
    const update = () => {
      const len = el.value.length;
      ct.textContent = `${len} / ${max}`;
      ct.className   = 'nd-hint' + (len >= max ? ' over' : len > max * .85 ? ' warn' : '');
    };
    el.addEventListener('input', () => { update(); _updateSummary(); });
    update();
  }

  /* ── Drag & Drop zone ──────────────────────────────────────────────────── */
  function _initDropZone() {
    const zone  = $('drop-zone');
    const input = $('nd-file-input');
    if (!zone || !input) return;

    zone.addEventListener('click', e => {
      if (!e.target.closest('#btn-remove-file')) input.click();
    });
    zone.addEventListener('keydown', e => {
      if ((e.key==='Enter'||e.key===' ') && e.target===zone) { e.preventDefault(); input.click(); }
    });
    input.addEventListener('change', e => { const f=e.target.files?.[0]; if(f) _handleFile(f); input.value=''; });

    ['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.add('drag-hover'); }));
    ['dragleave','dragend'].forEach(ev  => zone.addEventListener(ev, e => { e.preventDefault(); if(!zone.contains(e.relatedTarget)) zone.classList.remove('drag-hover'); }));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-hover'); const f=e.dataTransfer.files?.[0]; if(f) _handleFile(f); });
    $('btn-remove-file')?.addEventListener('click', e => { e.stopPropagation(); _clearFile(); });
  }

  /* ════════════════════════════════════════════════════════════════════════
     PDF VIEWER MODULE — Xem trước PDF + Đặt khung chữ ký ảo
     Dùng pdf.js (Mozilla) để render PDF lên canvas
  ════════════════════════════════════════════════════════════════════════ */
  const PdfViewer = (() => {

    /* ── State ────────────────────────────────────────────────────────────── */
    let _pdfDoc        = null;   // PDFDocumentProxy (pdf.js)
    let _currentPage   = 1;
    let _totalPages    = 0;
    let _scale         = 1.0;
    let _fitScale      = 1.0;    // Scale để vừa khung viewport
    let _renderTask    = null;   // Tác vụ render đang chạy
    let _sigMode       = false;  // true = đang trong chế độ đặt chữ ký
    let _pdfjsLib      = null;   // Reference đến window.pdfjsLib sau khi load

    /* ── Frames state ─────────────────────────────────────────────────────── */
    /**
     * Mảng lưu tất cả khung chữ ký đã đặt.
     * Mỗi entry:
     * {
     *   id        : string,       // ID duy nhất
     *   page      : number,       // Trang PDF (1-based)
     *   x         : number,       // Tọa độ X trái-trên tính theo % chiều rộng trang
     *   y         : number,       // Tọa độ Y trái-trên tính theo % chiều cao trang
     *   w         : number,       // Chiều rộng tính theo % chiều rộng trang
     *   h         : number,       // Chiều cao tính theo % chiều cao trang
     *   xPt       : number,       // Tọa độ X tính bằng điểm PDF (pt)
     *   yPt       : number,       // Tọa độ Y tính bằng điểm PDF (pt), gốc dưới-trái
     *   wPt       : number,       // Chiều rộng tính bằng điểm PDF
     *   hPt       : number,       // Chiều cao tính bằng điểm PDF
     *   label     : string,       // Nhãn hiển thị (VD: "Bước 1")
     *   signerStep: number|null,  // Index người ký liên kết
     * }
     */
    let _frames = [];

    /* ── Drag state ────────────────────────────────────────────────────────── */
    let _drag = null; // { frameId, startX, startY, origLeft, origTop, type: 'move'|'resize' }

    /* ── DOM helpers ──────────────────────────────────────────────────────── */
    const $  = id   => document.getElementById(id);
    const qs = sel  => document.querySelector(sel);
    const uid = ()  => 'sf_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);

    /* ── pdf.js async loader ────────────────────────────────────────────────── */
    /**
     * Load pdf.js library động — dùng type="module" import vì CDN phiên bản 4.x
     * chỉ hỗ trợ ES Module.
     * @returns {Promise<Object>} pdfjsLib
     */
    async function _loadPdfjsLib() {
      if (_pdfjsLib) return _pdfjsLib;

      return new Promise((resolve, reject) => {
        // Cố gắng lấy từ window nếu đã load
        if (window.pdfjsLib) {
          _pdfjsLib = window.pdfjsLib;
          _pdfjsLib.GlobalWorkerOptions.workerSrc = window.PDFJS_WORKER_URL;
          return resolve(_pdfjsLib);
        }

        // Dùng dynamic import cho ES module
        import('ht' + 'tps://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs')
          .then(module => {
            _pdfjsLib = module;
            _pdfjsLib.GlobalWorkerOptions.workerSrc = window.PDFJS_WORKER_URL;
            window.pdfjsLib = _pdfjsLib;
            resolve(_pdfjsLib);
          })
          .catch(err => {
            console.error('[PdfViewer] Không load được pdf.js:', err);
            reject(new Error('Không thể tải thư viện PDF.js. Kiểm tra kết nối mạng.'));
          });
      });
    }

    /* ── Load & render PDF từ File object ─────────────────────────────────── */
    /**
     * Nhận File object → đọc bằng FileReader → load qua pdf.js → render trang 1.
     * @param {File} file
     */
    async function loadFile(file) {
      _showLoading(true);
      _showCard(true);
      _resetFrames();

      try {
        const lib = await _loadPdfjsLib();

        // Đọc file thành ArrayBuffer
        const arrayBuffer = await file.arrayBuffer();

        // Load PDF document
        const loadingTask = lib.getDocument({ data: arrayBuffer });
        _pdfDoc      = await loadingTask.promise;
        _totalPages  = _pdfDoc.numPages;
        _currentPage = 1;

        // Cập nhật UI toolbar
        $('pdf-total-pages').textContent = _totalPages;
        _updatePageNav();

        // Tính scale để vừa khung viewport lần đầu
        await _computeFitScale();
        _scale = _fitScale;
        _updateZoomLabel();

        // Render trang đầu
        await _renderPage(_currentPage);

        // Cập nhật badge số trang trong file-badges
        const badgePages = $('badge-pages');
        if (badgePages) badgePages.textContent = `${_totalPages} trang`;

      } catch (err) {
        console.error('[PdfViewer.loadFile]', err);
        _showLoadError(err.message);
      } finally {
        _showLoading(false);
      }
    }

    /**
     * Tính scale để page vừa khung viewport-outer (fit width).
     */
    async function _computeFitScale() {
      if (!_pdfDoc) return;
      const page      = await _pdfDoc.getPage(1);
      const viewport  = page.getViewport({ scale: 1.0 });
      const container = $('pdf-viewport');
      if (!container) return;
      const availW  = container.clientWidth - 40; // trừ padding
      _fitScale = Math.min(1.5, Math.max(0.5, availW / viewport.width));
    }

    /**
     * Render một trang PDF lên canvas.
     * Hủy tác vụ render cũ nếu đang chạy.
     * @param {number} pageNum - Số trang (1-based)
     */
    async function _renderPage(pageNum) {
      if (!_pdfDoc) return;
      if (_renderTask) { _renderTask.cancel(); _renderTask = null; }

      _showLoading(true);

      try {
        const page     = await _pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: _scale });
        const canvas   = $('pdf-canvas');
        const ctx      = canvas.getContext('2d');

        canvas.width  = viewport.width;
        canvas.height = viewport.height;

        // Resize page-wrapper để overlay layer khớp
        const wrapper = $('pdf-page-wrapper');
        if (wrapper) {
          wrapper.style.width  = viewport.width  + 'px';
          wrapper.style.height = viewport.height + 'px';
        }

        _renderTask = page.render({ canvasContext: ctx, viewport });
        await _renderTask.promise;
        _renderTask = null;

        // Re-render tất cả frames thuộc trang này
        _renderAllFramesOnPage(pageNum);

        // Update page input
        const inp = $('pdf-page-input');
        if (inp) inp.value = pageNum;

      } catch (err) {
        if (err?.name !== 'RenderingCancelledException') {
          console.error('[PdfViewer._renderPage]', err);
        }
      } finally {
        _showLoading(false);
      }
    }

    /* ── Điều hướng trang ─────────────────────────────────────────────────── */
    async function goPrev() {
      if (_currentPage > 1) { _currentPage--; await _renderPage(_currentPage); _updatePageNav(); }
    }

    async function goNext() {
      if (_currentPage < _totalPages) { _currentPage++; await _renderPage(_currentPage); _updatePageNav(); }
    }

    async function goToPage(n) {
      const p = Math.max(1, Math.min(_totalPages, n));
      if (p !== _currentPage) { _currentPage = p; await _renderPage(_currentPage); _updatePageNav(); }
    }

    function _updatePageNav() {
      const prev = $('pdf-prev'); const next = $('pdf-next');
      if (prev) prev.disabled = _currentPage <= 1;
      if (next) next.disabled = _currentPage >= _totalPages;
      const inp = $('pdf-page-input');
      if (inp) inp.max = _totalPages;
    }

    /* ── Zoom ─────────────────────────────────────────────────────────────── */
    const ZOOM_STEPS = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.5];

    async function zoomIn() {
      const next = ZOOM_STEPS.find(s => s > _scale);
      if (next) { _scale = next; _updateZoomLabel(); await _renderPage(_currentPage); }
    }

    async function zoomOut() {
      const prev = [...ZOOM_STEPS].reverse().find(s => s < _scale);
      if (prev) { _scale = prev; _updateZoomLabel(); await _renderPage(_currentPage); }
    }

    async function zoomFit() {
      await _computeFitScale();
      _scale = _fitScale;
      _updateZoomLabel();
      await _renderPage(_currentPage);
    }

    function _updateZoomLabel() {
      const el = $('pdf-zoom-label');
      if (el) el.textContent = Math.round(_scale * 100) + '%';
    }

    /* ════════════════════════════════════════════════════════════════════════
       SIGNATURE PLACEMENT
    ════════════════════════════════════════════════════════════════════════ */

    /** Bật/tắt chế độ đặt chữ ký */
    function toggleSigMode() {
      _sigMode = !_sigMode;
      const wrapper = $('pdf-page-wrapper');
      const layer   = $('sig-layer');
      const btn     = $('btn-sig-mode');
      const banner  = $('sig-mode-banner');

      wrapper?.classList.toggle('sig-mode-off', !_sigMode);
      layer?.classList.toggle('active', _sigMode);
      btn?.classList.toggle('active', _sigMode);
      banner?.classList.toggle('show', _sigMode);

      if (!_sigMode) {
        // Deselect all frames khi thoát sig mode
        document.querySelectorAll('.sig-frame.selected')
          .forEach(f => f.classList.remove('selected'));
      }
    }

    /**
     * Tạo khung chữ ký mới tại vị trí click.
     * Gọi khi người dùng click lên sig-layer trong sig-mode.
     * @param {MouseEvent} e - Event từ sig-layer click
     */
    function _addFrameAtClick(e) {
      if (!_sigMode || !_pdfDoc) return;

      const wrapper = $('pdf-page-wrapper');
      if (!e.target.closest('#sig-layer') && e.target !== $('sig-layer')) return;

      const rect   = wrapper.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      // Kích thước mặc định: 200×70 px theo scale hiện tại
      const DEFAULT_W = 200;
      const DEFAULT_H = 70;

      // Đặt frame sao cho tâm tại điểm click, tránh ra ngoài biên
      const left = Math.max(0, Math.min(clickX - DEFAULT_W / 2, wrapper.offsetWidth  - DEFAULT_W));
      const top  = Math.max(0, Math.min(clickY - DEFAULT_H / 2, wrapper.offsetHeight - DEFAULT_H));

      _createFrame(left, top, DEFAULT_W, DEFAULT_H);
    }

    /**
     * Tạo frame DOM + lưu vào _frames state.
     * @param {number} left - px từ trái của page-wrapper
     * @param {number} top  - px từ trên của page-wrapper
     * @param {number} w    - px chiều rộng
     * @param {number} h    - px chiều cao
     * @returns {Object} frame data
     */
    function _createFrame(left, top, w, h) {
      const id     = uid();
      const coords = _pxToPdf(left, top, w, h);

      const frameData = {
        id,
        page       : _currentPage,
        x          : (left / $('pdf-page-wrapper').offsetWidth)  * 100,
        y          : (top  / $('pdf-page-wrapper').offsetHeight) * 100,
        w          : (w    / $('pdf-page-wrapper').offsetWidth)  * 100,
        h          : (h    / $('pdf-page-wrapper').offsetHeight) * 100,
        xPt        : coords.xPt,
        yPt        : coords.yPt,
        wPt        : coords.wPt,
        hPt        : coords.hPt,
        label      : `Chữ ký ${_frames.length + 1}`,
        signerStep : _frames.length,  // Liên kết với bước ký thứ n
      };

      _frames.push(frameData);
      _renderFrameDOM(frameData);
      _updateCoordsPanel();
      _updateSummary();

      return frameData;
    }

    /**
     * Tạo DOM element cho một frame.
     * @param {Object} fd - Frame data
     */
    function _renderFrameDOM(fd) {
      if (fd.page !== _currentPage) return; // Không render nếu không phải trang hiện tại

      const layer  = $('sig-layer');
      if (!layer) return;

      const wrapper = $('pdf-page-wrapper');
      const wW = wrapper.offsetWidth;
      const wH = wrapper.offsetHeight;

      // Tính lại px từ %
      const left = (fd.x / 100) * wW;
      const top  = (fd.y / 100) * wH;
      const w    = (fd.w / 100) * wW;
      const h    = (fd.h / 100) * wH;

      const el = document.createElement('div');
      el.className    = 'sig-frame';
      el.dataset.id   = fd.id;
      el.style.left   = left + 'px';
      el.style.top    = top  + 'px';
      el.style.width  = w    + 'px';
      el.style.height = h    + 'px';
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', `Khung chữ ký: ${fd.label} - Trang ${fd.page}`);

      el.innerHTML = `
        <div class="sig-frame-coord">
          Trang ${fd.page} · X:${Math.round(fd.xPt)}pt · Y:${Math.round(fd.yPt)}pt
        </div>
        <div class="sig-frame-label">
          <i class="bi bi-pen-fill" style="font-size:11px;"></i>
          ${fd.label}
        </div>
        <div class="sig-frame-resize" title="Kéo để thay đổi kích thước"></div>
        <button class="sig-frame-del" data-id="${fd.id}" title="Xóa khung chữ ký" aria-label="Xóa khung ${fd.label}">
          <i class="bi bi-x"></i>
        </button>
      `;

      // Xử lý drag (di chuyển)
      el.addEventListener('mousedown', e => {
        if (e.target.classList.contains('sig-frame-resize')) return;
        if (e.target.closest('.sig-frame-del')) return;
        e.preventDefault();
        _startDrag(e, fd.id, 'move', el);
      });

      // Xử lý resize
      el.querySelector('.sig-frame-resize').addEventListener('mousedown', e => {
        e.preventDefault();
        e.stopPropagation();
        _startDrag(e, fd.id, 'resize', el);
      });

      // Xóa frame
      el.querySelector('.sig-frame-del').addEventListener('click', e => {
        e.stopPropagation();
        _deleteFrame(fd.id);
      });

      // Select frame on click
      el.addEventListener('click', e => {
        if (e.target.closest('.sig-frame-del')) return;
        document.querySelectorAll('.sig-frame.selected').forEach(f => f.classList.remove('selected'));
        el.classList.add('selected');
      });

      layer.appendChild(el);

      // Animate in
      el.style.opacity = '0'; el.style.transform = 'scale(.85)';
      requestAnimationFrame(() => {
        el.style.transition = 'opacity .2s ease, transform .2s ease';
        el.style.opacity = '1'; el.style.transform = 'scale(1)';
      });
    }

    /** Re-render tất cả frames thuộc trang hiện tại sau khi render canvas xong */
    function _renderAllFramesOnPage(pageNum) {
      const layer = $('sig-layer');
      if (!layer) return;
      layer.innerHTML = ''; // Xóa DOM cũ (chỉ DOM, không xóa _frames)
      _frames.filter(f => f.page === pageNum).forEach(_renderFrameDOM);
    }

    /* ── Drag & Resize ────────────────────────────────────────────────────── */
    function _startDrag(e, frameId, type, el) {
      _drag = {
        frameId,
        type,
        startX    : e.clientX,
        startY    : e.clientY,
        origLeft  : parseFloat(el.style.left),
        origTop   : parseFloat(el.style.top),
        origWidth : parseFloat(el.style.width),
        origHeight: parseFloat(el.style.height),
        el,
      };
      el.classList.add('dragging');
      document.body.style.cursor = type === 'resize' ? 'se-resize' : 'grabbing';
    }

    function _onMouseMove(e) {
      if (!_drag) return;
      const dx = e.clientX - _drag.startX;
      const dy = e.clientY - _drag.startY;
      const wrapper = $('pdf-page-wrapper');
      if (!wrapper) return;
      const wW = wrapper.offsetWidth;
      const wH = wrapper.offsetHeight;

      if (_drag.type === 'move') {
        const newLeft = Math.max(0, Math.min(_drag.origLeft + dx, wW - parseFloat(_drag.el.style.width)));
        const newTop  = Math.max(0, Math.min(_drag.origTop  + dy, wH - parseFloat(_drag.el.style.height)));
        _drag.el.style.left = newLeft + 'px';
        _drag.el.style.top  = newTop  + 'px';
      } else {
        const newW = Math.max(80, Math.min(_drag.origWidth  + dx, wW - _drag.origLeft));
        const newH = Math.max(30, Math.min(_drag.origHeight + dy, wH - _drag.origTop));
        _drag.el.style.width  = newW + 'px';
        _drag.el.style.height = newH + 'px';
      }
    }

    function _onMouseUp() {
      if (!_drag) return;
      const { frameId, el } = _drag;
      el.classList.remove('dragging');
      document.body.style.cursor = '';

      // Cập nhật frame data với vị trí/kích thước mới
      const fd = _frames.find(f => f.id === frameId);
      if (fd) {
        const wrapper = $('pdf-page-wrapper');
        const wW = wrapper.offsetWidth;
        const wH = wrapper.offsetHeight;
        const left = parseFloat(el.style.left);
        const top  = parseFloat(el.style.top);
        const w    = parseFloat(el.style.width);
        const h    = parseFloat(el.style.height);

        fd.x = (left / wW) * 100;
        fd.y = (top  / wH) * 100;
        fd.w = (w    / wW) * 100;
        fd.h = (h    / wH) * 100;

        const coords = _pxToPdf(left, top, w, h);
        fd.xPt = coords.xPt;
        fd.yPt = coords.yPt;
        fd.wPt = coords.wPt;
        fd.hPt = coords.hPt;

        // Cập nhật label tọa độ trong frame
        const coordLabel = el.querySelector('.sig-frame-coord');
        if (coordLabel) {
          coordLabel.textContent = `Trang ${fd.page} · X:${Math.round(fd.xPt)}pt · Y:${Math.round(fd.yPt)}pt`;
        }

        _updateCoordsPanel();
        _updateSummary();
      }
      _drag = null;
    }

    /* ── Xóa frame ────────────────────────────────────────────────────────── */
    function _deleteFrame(frameId) {
      _frames = _frames.filter(f => f.id !== frameId);
      // Cập nhật label sau khi xóa
      _frames.forEach((f, i) => { f.label = `Chữ ký ${i + 1}`; f.signerStep = i; });
      // Xóa DOM
      const el = document.querySelector(`.sig-frame[data-id="${frameId}"]`);
      if (el) {
        el.style.transition = 'opacity .15s, transform .15s';
        el.style.opacity = '0'; el.style.transform = 'scale(.8)';
        setTimeout(() => el.remove(), 150);
      }
      _updateCoordsPanel();
      _updateSummary();
    }

    /** Xóa tất cả frames */
    function _resetFrames() {
      _frames = [];
      const layer = $('sig-layer');
      if (layer) layer.innerHTML = '';
      _updateCoordsPanel();
    }

    /* ── Tọa độ PDF (đơn vị pt) ───────────────────────────────────────────── */
    /**
     * Chuyển tọa độ px (trong canvas đã scale) sang đơn vị pt của PDF.
     * Gốc tọa độ PDF là dưới-trái (khác với canvas là trên-trái).
     *
     * @param {number} pxLeft  - px từ trái canvas
     * @param {number} pxTop   - px từ trên canvas
     * @param {number} pxW     - px chiều rộng
     * @param {number} pxH     - px chiều cao
     * @returns {{ xPt, yPt, wPt, hPt }} — đơn vị pt, gốc dưới-trái
     */
    function _pxToPdf(pxLeft, pxTop, pxW, pxH) {
      const canvas = $('pdf-canvas');
      if (!canvas) return { xPt: 0, yPt: 0, wPt: 0, hPt: 0 };

      const canvasW = canvas.width  / _scale; // Chiều rộng trang ở scale=1 (pt tương đương 1pt=1px@72dpi)
      const canvasH = canvas.height / _scale;

      // Tọa độ theo scale=1
      const x1 = pxLeft / _scale;
      const y1 = pxTop  / _scale;
      const w  = pxW    / _scale;
      const h  = pxH    / _scale;

      // Gốc PDF: dưới-trái → yPt = pageHeight - y1 - h
      return {
        xPt : Math.round(x1 * 10) / 10,
        yPt : Math.round((canvasH - y1 - h) * 10) / 10,
        wPt : Math.round(w  * 10) / 10,
        hPt : Math.round(h  * 10) / 10,
      };
    }

    /* ── Cập nhật panel tọa độ ────────────────────────────────────────────── */
    function _updateCoordsPanel() {
      const list  = $('sig-coords-list');
      const badge = $('sig-count-badge');
      if (!list) return;

      if (badge) badge.textContent = _frames.length;

      if (_frames.length === 0) {
