        list.innerHTML = `
          <span class="sig-empty-hint">
            <i class="bi bi-info-circle"></i>
            Nhấn <strong>"Đặt chữ ký"</strong> và nhấp vào trang PDF để thêm vị trí ký.
          </span>`;
        return;
      }

      list.innerHTML = _frames.map((f, i) => `
        <div class="sig-coord-chip" data-frame-id="${f.id}">
          <div class="chip-step">${i + 1}</div>
          <div class="chip-data">
            <strong>Trang ${f.page}</strong> ·
            X:<strong>${Math.round(f.xPt)}</strong>pt ·
            Y:<strong>${Math.round(f.yPt)}</strong>pt ·
            ${Math.round(f.wPt)}×${Math.round(f.hPt)}pt
          </div>
          <button class="sig-coord-chip-del" data-frame-id="${f.id}" title="Xóa vị trí này" aria-label="Xóa vị trí chữ ký ${i+1}">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>`).join('');

      // Bind delete buttons
      list.querySelectorAll('.sig-coord-chip-del').forEach(btn => {
        btn.addEventListener('click', () => _deleteFrame(btn.dataset.frameId));
      });

      // Highlight frame khi hover chip
      list.querySelectorAll('.sig-coord-chip').forEach(chip => {
        chip.addEventListener('mouseenter', () => {
          const el = document.querySelector(`.sig-frame[data-id="${chip.dataset.frameId}"]`);
          if (el) el.classList.add('selected');
        });
        chip.addEventListener('mouseleave', () => {
          const el = document.querySelector(`.sig-frame[data-id="${chip.dataset.frameId}"]`);
          if (el) el.classList.remove('selected');
        });
      });
    }

    /* ── Loading / Error UI ───────────────────────────────────────────────── */
    function _showLoading(show) {
      $('pdf-loading')?.classList.toggle('hidden', !show);
    }

    function _showCard(show) {
      $('nd-card-pdf-viewer')?.classList.toggle('show', show);
    }

    function _showLoadError(msg) {
      const canvas  = $('pdf-canvas');
      const viewport = $('pdf-viewport');
      if (viewport) {
        viewport.innerHTML = `
          <div style="color:#fff;text-align:center;padding:40px 20px;">
            <i class="bi bi-exclamation-triangle" style="font-size:36px;color:#FCA5A5;display:block;margin-bottom:12px;"></i>
            <div style="font-size:14px;margin-bottom:6px;font-weight:600;">Không thể tải PDF</div>
            <div style="font-size:12.5px;opacity:.7;">${msg}</div>
          </div>`;
      }
    }

    /* ── Bind events ──────────────────────────────────────────────────────── */
    function initEvents() {
      // Page navigation
      $('pdf-prev')?.addEventListener('click', goPrev);
      $('pdf-next')?.addEventListener('click', goNext);
      $('pdf-page-input')?.addEventListener('change', function() {
        goToPage(parseInt(this.value) || 1);
      });
      $('pdf-page-input')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') goToPage(parseInt(e.target.value) || 1);
      });

      // Zoom
      $('pdf-zoom-in')?.addEventListener('click',  zoomIn);
      $('pdf-zoom-out')?.addEventListener('click', zoomOut);
      $('pdf-zoom-fit')?.addEventListener('click', zoomFit);

      // Signature mode toggle
      $('btn-sig-mode')?.addEventListener('click', toggleSigMode);
      $('sig-mode-cancel')?.addEventListener('click', () => { if (_sigMode) toggleSigMode(); });

      // Click on sig-layer to add frame
      $('sig-layer')?.addEventListener('click', _addFrameAtClick);

      // Global mouse events for drag/resize
      document.addEventListener('mousemove', _onMouseMove);
      document.addEventListener('mouseup',   _onMouseUp);

      // Window resize → re-fit
      window.addEventListener('resize', async () => {
        if (_pdfDoc) { await zoomFit(); }
      });
    }

    /* ── Clear / Reset ────────────────────────────────────────────────────── */
    function clear() {
      if (_renderTask) { _renderTask.cancel(); _renderTask = null; }
      if (_pdfDoc)     { _pdfDoc.destroy(); _pdfDoc = null; }
      _currentPage = 1; _totalPages = 0; _scale = 1.0; _sigMode = false;
      _resetFrames();
      _showCard(false);

      const canvas = $('pdf-canvas');
      if (canvas) { const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); }

      // Reset toolbar
      if ($('pdf-total-pages')) $('pdf-total-pages').textContent = '—';
      if ($('pdf-page-input'))  $('pdf-page-input').value = 1;
      const btn = $('btn-sig-mode'); if (btn) btn.classList.remove('active');
      const banner = $('sig-mode-banner'); if (banner) banner.classList.remove('show');
    }

    /* ── Public API ───────────────────────────────────────────────────────── */
    return {
      loadFile,
      clear,
      initEvents,
      getFrames   : () => [..._frames],         // Trả về bản copy
      getFrameCount: () => _frames.length,
      getCurrentPage: () => _currentPage,
    };

  })(); // end PdfViewer

  function _handleFile(file) {
    const errEl=$('err-file'); const errMsg=$('err-file-msg'); const zone=$('drop-zone');
    zone.classList.remove('has-error'); errEl?.classList.remove('show');
    const isPDF = file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    if (!isPDF) { errMsg.textContent=`"${file.name}" không phải PDF.`; errEl.classList.add('show'); zone.classList.add('has-error'); _animateShake(zone); return; }
    if (file.size > MAX_FILE_B) { errMsg.textContent=`File ${_fmtSize(file.size)} vượt giới hạn ${MAX_FILE_MB} MB.`; errEl.classList.add('show'); zone.classList.add('has-error'); _animateShake(zone); return; }
    _selectedFile = file;
    _renderFilePreview(file);
    _updateSummary();
    _simulateProgress();
    // Tải PDF vào viewer
    PdfViewer.loadFile(file);
  }

  function _renderFilePreview(file) {
    const zone=$('drop-zone'); zone.classList.add('has-file'); zone.classList.remove('has-error');
    $('fp-name').textContent=file.name; $('fp-meta').textContent=`${_fmtSize(file.size)} · PDF · Đã kiểm tra`;
    const badges=$('file-badges'); if(badges){badges.style.display='flex'; $('badge-size').textContent=_fmtSize(file.size); $('badge-time').textContent='Vừa tải lên'; $('badge-pages').textContent='Đang phân tích…';}
    const idle=$('dz-idle'); if(idle){idle.querySelector('.dz-icon-wrap').innerHTML='<i class="bi bi-check-circle-fill"></i>'; idle.querySelector('.dz-icon-wrap').style.cssText='background:#DCFCE7;color:#059669;'; idle.querySelector('.dz-title').textContent='File đã sẵn sàng'; idle.querySelector('.dz-sub').innerHTML=`<strong>${file.name}</strong> đã được chọn.`;}
  }

  function _clearFile() {
    _selectedFile=null; const zone=$('drop-zone'); zone.classList.remove('has-file','has-error','drag-hover');
    const idle=$('dz-idle'); if(idle){idle.querySelector('.dz-icon-wrap').innerHTML='<i class="bi bi-cloud-arrow-up-fill"></i>'; idle.querySelector('.dz-icon-wrap').style.cssText=''; idle.querySelector('.dz-title').textContent='Kéo & thả file PDF vào đây'; idle.querySelector('.dz-sub').innerHTML='hoặc <span class="dz-browse">nhấn để chọn file</span>';}
    $('upload-progress')?.classList.remove('show');
    const badges=$('file-badges'); if(badges) badges.style.display='none';
    $('err-file')?.classList.remove('show');
    // Xóa PDF viewer
    PdfViewer.clear();
    _updateSummary();
  }

  function _simulateProgress() {
    const bar=$('up-bar'); const prog=$('upload-progress'); const lblL=$('up-label-left'); const lblR=$('up-label-right');
    if(!bar||!prog) return;
    prog.classList.add('show'); let pct=0;
    const stages=[{to:30,ms:120,label:'Đang kiểm tra file…'},{to:65,ms:200,label:'Phân tích PDF…'},{to:90,ms:150,label:'Chuẩn bị dữ liệu…'},{to:100,ms:180,label:'Hoàn tất!'}];
    const runStage=idx=>{ if(idx>=stages.length){setTimeout(()=>prog.classList.remove('show'),800);return;} const{to,ms,label}=stages[idx]; const prev=idx>0?stages[idx-1].to:0; const step=()=>{ if(pct<to){pct++;bar.style.width=pct+'%';lblR.textContent=pct+'%';setTimeout(step,ms/(to-prev));}else{lblL.textContent=label;runStage(idx+1);} }; step(); };
    lblL.textContent=stages[0].label; runStage(0);
  }

  function _animateShake(el) {
    el.style.animation='none'; el.offsetHeight; el.style.animation='shake .4s ease';
    setTimeout(()=>el.style.animation='',400);
    if (!document.getElementById('shake-style')) {
      const s=document.createElement('style'); s.id='shake-style';
      s.textContent=`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}`;
      document.head.appendChild(s);
    }
  }

  /* ── Form validation ───────────────────────────────────────────────────── */
  function _validate() {
    let ok = true;
    if (!_selectedType) { $('err-loai-td')?.classList.add('show'); ok=false; }
    const tenVal = ($('nd-ten-td')?.value??'').trim();
    if (!tenVal) { $('nd-ten-td')?.classList.add('has-error'); $('err-ten-td')?.classList.add('show'); ok=false; }
    if (!_selectedFile) { $('err-file')?.classList.add('show'); $('drop-zone')?.classList.add('has-error'); _animateShake($('drop-zone')); ok=false; }
    if (_selectedType && !SignerConfig.validate(_selectedType)) ok=false;
    return ok;
  }

  /* ── Form reset ────────────────────────────────────────────────────────── */
  function _resetForm() {
    _selectedType=''; _selectedFile=null; _isSubmitting=false;
    document.querySelectorAll('.doc-type-btn').forEach(b=>{b.classList.remove('selected');b.setAttribute('aria-checked','false');});
    if($('nd-loai-td')) $('nd-loai-td').value='';
    ['nd-ten-td','nd-ten-da','nd-ghi-chu','nd-ma-tl','nd-ngay-ph'].forEach(id=>{const el=$(id);if(el){el.value='';el.classList.remove('has-error');}});
    ['nd-ten-count','nd-da-count','nd-gc-count'].forEach(id=>{const el=$(id);if(el)el.textContent='0 / '+(id==='nd-ten-count'?120:id==='nd-da-count'?80:300);});
    _clearFile();
    document.querySelectorAll('.nd-error-msg').forEach(e=>e.classList.remove('show'));
    document.querySelectorAll('.nd-input.has-error').forEach(e=>e.classList.remove('has-error'));
    const btn=$('nd-btn-submit'); if(btn){btn.disabled=true;btn.classList.remove('loading');}
    $('ws-1')?.classList.add('active'); $('ws-1')?.classList.remove('done');
    ['ws-2','ws-3'].forEach(id=>{$(id)?.classList.remove('active','done');});
    if($('ws-circle-1'))$('ws-circle-1').innerHTML='1';
    if($('ws-circle-2'))$('ws-circle-2').innerHTML='2';
    SignerConfig.reset();
    PdfViewer.clear();
    _updateSummary();
  }

  /* ════════════════════════════════════════════════════════════════════════
     FILE UPLOAD CLIENT — Chuyển file thành base64 & gọi GAS uploadTempFile
     Tách thành module con để dễ test và mở rộng độc lập.
  ════════════════════════════════════════════════════════════════════════ */
  const FileUploadClient = (() => {

    /* ── Hằng số ──────────────────────────────────────────────────────────── */
    const CHUNK_SIZE_MB = 5;                        // Phân đoạn file nếu > X MB
    const CHUNK_SIZE_B  = CHUNK_SIZE_MB * 1024 * 1024;

    /* ── Đọc file thành base64 bằng FileReader ────────────────────────────── */

    /**
     * Chuyển File object → base64 string (KHÔNG có prefix "data:...;base64,").
     *
     * Sử dụng FileReader.readAsDataURL() — API chuẩn, không cần thư viện.
     * Tự động strip data-URL prefix trước khi trả về để GAS decode trực tiếp.
     *
     * @param {File}     file           - File object từ input hoặc drag-and-drop
     * @param {Function} [onProgress]   - Callback({ loaded, total, percent }) trong khi đọc
     * @returns {Promise<string>}       - Base64 thuần (không có data URL prefix)
     */
    function readAsBase64(file, onProgress) {
      return new Promise((resolve, reject) => {
        if (!file || !(file instanceof File)) {
          return reject(new Error('Tham số không phải File object hợp lệ.'));
        }

        const reader = new FileReader();

        /* Tiến trình đọc file (percent 0–100) */
        reader.onprogress = evt => {
          if (evt.lengthComputable && typeof onProgress === 'function') {
            onProgress({
              loaded  : evt.loaded,
              total   : evt.total,
              percent : Math.round((evt.loaded / evt.total) * 100),
            });
          }
        };

        /* Đọc xong — strip "data:application/pdf;base64," khỏi đầu chuỗi */
        reader.onload = evt => {
          try {
            const dataUrl   = evt.target.result;   // "data:application/pdf;base64,JVBERi0x..."
            const commaIdx  = dataUrl.indexOf(',');
            if (commaIdx === -1) {
              return reject(new Error('FileReader trả về định dạng không mong đợi (thiếu dấu phẩy).'));
            }
            const base64 = dataUrl.slice(commaIdx + 1); // Chỉ lấy phần sau dấu phẩy
            resolve(base64);
          } catch (parseErr) {
            reject(new Error('Lỗi xử lý kết quả FileReader: ' + parseErr.message));
          }
        };

        reader.onerror = () => reject(new Error(
          `FileReader lỗi khi đọc "${file.name}": ${reader.error?.message ?? 'Unknown error'}`
        ));

        reader.onabort = () => reject(new Error('Đọc file bị hủy.'));

        /* Bắt đầu đọc — readAsDataURL nạp toàn bộ file vào bộ nhớ */
        reader.readAsDataURL(file);
      });
    }

    /**
     * Đọc file theo từng mảnh (chunk) để hiển thị tiến trình chi tiết
     * và tránh OOM với file lớn (> 5 MB).
     *
     * ⚠️  GAS nhận toàn bộ base64 trong một lần gọi — chunking chỉ là
     * kỹ thuật phía client để đọc file và cập nhật UI. Kết quả cuối
     * vẫn là một chuỗi base64 đầy đủ.
     *
     * @param {File}     file         - File cần đọc
     * @param {Function} onProgress   - Callback({ loaded, total, percent, phase })
     * @returns {Promise<string>}     - Base64 đầy đủ
     */
    function readAsBase64WithProgress(file, onProgress) {
      // Với file nhỏ (< CHUNK_SIZE_B) → dùng phương pháp đơn giản
      if (file.size <= CHUNK_SIZE_B) {
        return readAsBase64(file, progress => onProgress?.({ ...progress, phase: 'reading' }));
      }

      // Với file lớn → đọc từng slice để cập nhật UI mượt hơn
      return new Promise((resolve, reject) => {
        const chunks   = [];
        let   offset   = 0;
        let   totalRead = 0;

        const readNextChunk = () => {
          const slice  = file.slice(offset, offset + CHUNK_SIZE_B);
          const reader = new FileReader();

          reader.onload = evt => {
            const result    = evt.target.result;
            const commaIdx  = result.indexOf(',');
            chunks.push(commaIdx !== -1 ? result.slice(commaIdx + 1) : result);

            totalRead += slice.size;
            offset    += CHUNK_SIZE_B;

            onProgress?.({
              loaded  : totalRead,
              total   : file.size,
              percent : Math.round((totalRead / file.size) * 100),
              phase   : 'reading',
            });

            if (offset < file.size) {
              // Dùng setTimeout để không block UI thread
              setTimeout(readNextChunk, 0);
            } else {
              // Ghép tất cả chunks lại
              // Lưu ý: base64 của từng slice KHÔNG thể ghép trực tiếp —
              // phải dùng readAsDataURL trên toàn bộ file để ra base64 đúng.
              // → Fallback về readAsBase64 với file đã được kiểm tra size.
              resolve(readAsBase64(file, p => onProgress?.({ ...p, phase: 'encoding' })));
            }
          };

          reader.onerror = () => reject(new Error(`Lỗi đọc chunk tại offset ${offset}.`));
          reader.readAsDataURL(slice);
        };

        readNextChunk();
      });
    }

    /**
     * Upload file lên GAS — luồng chính được gọi từ _handleSubmit.
     *
     * LUỒNG 2 PHA:
     *   Pha 1 — Đọc file: FileReader.readAsDataURL() → base64 string
     *   Pha 2 — Upload  : GAS.call('uploadTempFile', base64, fileName, metaData)
     *
     * @param {File}   file          - File PDF người dùng chọn
     * @param {Object} metaData      - Metadata bổ sung (token, loại tài liệu, ...)
     * @param {Object} callbacks     - { onReadProgress, onUploadStart, onSuccess, onError }
     * @returns {Promise<Object>}    - Response từ GAS uploadTempFile
     */
    async function uploadFile(file, metaData, callbacks = {}) {
      const { onReadProgress, onUploadStart, onSuccess, onError } = callbacks;

      /* ── Pha 1: Đọc file thành base64 ──────────────────────────────────── */
      let base64Data;
      try {
        _log(`Pha 1 — Đọc file: "${file.name}" (${_fmtSz(file.size)})`);

        base64Data = await readAsBase64WithProgress(file, progress => {
          onReadProgress?.(progress);
          _updateUploadUI('reading', progress);
        });

        _log(`Pha 1 — Hoàn thành. Base64 length: ${base64Data.length} chars (~${_fmtSz(base64Data.length * 0.75)})`);

      } catch (readErr) {
        const msg = 'Lỗi đọc file: ' + readErr.message;
        _log('❌ ' + msg);
        onError?.(msg);
        return { success: false, error: msg };
      }

      /* ── Pha 2: Gửi base64 lên GAS ─────────────────────────────────────── */
      try {
        _log(`Pha 2 — Bắt đầu upload lên GAS...`);
        onUploadStart?.();
        _updateUploadUI('uploading', { percent: 0 });

        // Simulate UI progress trong lúc chờ GAS (không có real progress event)
        const stopSim = _simulateGasUploadProgress(file.size);

        const res = await GAS.call('uploadTempFile', base64Data, file.name, {
          ...metaData,
          fileSizeBytes : file.size,
          mimeType      : file.type || 'application/pdf',
        });

        stopSim(); // Dừng simulation, nhảy lên 100%
        _updateUploadUI('done', { percent: 100 });

        if (res.success) {
          _log(`✅ Upload thành công: fileId=${res.fileId} | ${res.meta?.sizeHuman}`);
          onSuccess?.(res);
        } else {
          _log(`❌ GAS trả lỗi: ${res.error}`);
          onError?.(res.error);
          _updateUploadUI('error', {});
        }

        return res;

      } catch (gasErr) {
        const msg = 'Lỗi kết nối GAS: ' + gasErr.message;
        _log('❌ ' + msg);
        onError?.(msg);
        _updateUploadUI('error', {});
        return { success: false, error: msg };
      }
    }

    /* ── Upload UI helpers ────────────────────────────────────────────────── */

    /**
     * Cập nhật progress bar và label trong drop zone khi upload.
     * @param {'reading'|'uploading'|'done'|'error'} phase
     * @param {{ percent: number }} progress
     */
    function _updateUploadUI(phase, progress) {
      const bar    = document.getElementById('up-bar');
      const prog   = document.getElementById('upload-progress');
      const lblL   = document.getElementById('up-label-left');
      const lblR   = document.getElementById('up-label-right');
      if (!bar || !prog) return;

      const pct = progress.percent ?? 0;

      const PHASE_CONFIG = {
        reading  : { label: 'Đang đọc file…',       color: '#3F83F8' },
        uploading: { label: 'Đang tải lên Drive…',   color: '#7C3AED' },
        done     : { label: '✅ Tải lên hoàn tất!',  color: '#059669' },
        error    : { label: '❌ Lỗi tải lên',         color: '#DC2626' },
      };

      const cfg = PHASE_CONFIG[phase] ?? PHASE_CONFIG.reading;
      prog.classList.add('show');
      bar.style.width      = pct + '%';
      bar.style.background = `linear-gradient(90deg, ${cfg.color}, ${cfg.color}cc)`;
      if (lblL) lblL.textContent = cfg.label;
      if (lblR) lblR.textContent = pct + '%';

      if (phase === 'done') {
        setTimeout(() => prog.classList.remove('show'), 1200);
      }
    }

    /**
     * Giả lập tiến trình upload lên GAS vì google.script.run không có progress event.
     * Dừng lại ở 95% để tránh nhảy 100% trước khi GAS thực sự xong.
     *
     * @param {number} fileSizeBytes - Kích thước file để ước tính thời gian
     * @returns {Function} Hàm stop để gọi khi upload thật xong
     */
    function _simulateGasUploadProgress(fileSizeBytes) {
      const bar  = document.getElementById('up-bar');
      const lblR = document.getElementById('up-label-right');

      // Ước tính: 1 MB/s qua GAS (thực tế ~0.5–2 MB/s tuỳ mạng)
      const estimatedMs  = Math.max(2000, (fileSizeBytes / 1048576) * 1200);
      const intervalMs   = 120;
      const totalSteps   = estimatedMs / intervalMs;
      const stepSize     = 95 / totalSteps; // Chỉ đến 95%
      let   current      = 0;
      let   stopped      = false;

      const timer = setInterval(() => {
        if (stopped || current >= 95) { clearInterval(timer); return; }
        current = Math.min(current + stepSize, 95);
        if (bar)  bar.style.width      = current.toFixed(1) + '%';
        if (lblR) lblR.textContent     = Math.round(current) + '%';
      }, intervalMs);

      // Hàm stop: nhảy lên 100% mượt
      return () => {
        stopped = true;
        clearInterval(timer);
        if (bar)  bar.style.width  = '100%';
        if (lblR) lblR.textContent = '100%';
      };
    }

    /* ── Utilities ────────────────────────────────────────────────────────── */
    const _fmtSz = b => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(2)+' MB';
    const _log   = msg => console.info(`[FileUploadClient] ${msg}`);

    return { readAsBase64, readAsBase64WithProgress, uploadFile };

  })(); // end FileUploadClient


  /* ── _handleSubmit — 2-pha: upload file trước, sau đó createDocument ── */
  async function _handleSubmit() {
    if (_isSubmitting) return;
    if (!_validate()) {
      document.querySelector('.nd-error-msg.show,.nd-input.has-error,.drop-zone.has-error')
        ?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    _isSubmitting = true;
    const btn = $('nd-btn-submit');
    btn.disabled = true;
    btn.classList.add('loading');

    // Xây dựng cấu hình người ký trước
    _signerConfig = SignerConfig.buildConfig(_selectedType);

    // Metadata chung cho cả 2 pha
    const commonMeta = {
      sessionToken  : Session.getToken(),
      loaiTaiLieu   : _selectedType,
      tenTaiLieu    : ($('nd-ten-td')?.value ?? '').trim(),
      tenDuAn       : ($('nd-ten-da')?.value ?? '').trim(),
      maTL          : ($('nd-ma-tl')?.value  ?? '').trim(),   // Số văn bản do người dùng nhập
      ngayPhatHanh  : ($('nd-ngay-ph')?.value ?? '').trim(),  // Ngày phát hành tài liệu
      ghiChu        : ($('nd-ghi-chu')?.value ?? '').trim(),
      signerConfig  : _signerConfig,
      sigFrames     : PdfViewer.getFrames(),  // ← Tọa độ khung chữ ký
      nguoiTao      : Session.getUser()?.['Mã NV'] ?? '',
    };

    /* ── PHA 1 & 2: Đọc file + Upload lên Drive ─────────────────────────── */
    const uploadResult = await FileUploadClient.uploadFile(
      _selectedFile,
      commonMeta,
      {
        onReadProgress : prog => console.debug('[Upload] Đọc file:', prog.percent + '%'),
        onUploadStart  : ()   => console.info('[Upload] Bắt đầu gửi lên GAS...'),

        onSuccess: res => {
          console.info('[Upload] ✅ Drive OK:', res.fileId, res.driveUrl);
          // Lưu fileId vào config để pha tiếp theo dùng
          commonMeta.driveFileId  = res.fileId;
          commonMeta.driveUrl     = res.driveUrl;
          commonMeta.uploadedName = res.uploadedName;
        },

        onError: errMsg => {
          Toast.network.error(errMsg);
        },
      }
    );

    if (!uploadResult.success) {
      btn.disabled = false;
      btn.classList.remove('loading');
      _isSubmitting = false;
      return;
    }

    /* ── PHA 3: Tạo bản ghi tài liệu (createDocument) ──────────────────── */
    try {
      const finalPayload = {
        ...commonMeta,
        driveFileId   : uploadResult.fileId,
        driveUrl      : uploadResult.driveUrl,
        downloadUrl   : uploadResult.downloadUrl,
        uploadedName  : uploadResult.uploadedName,
        fileSizeBytes : _selectedFile.size,
        fileName      : _selectedFile.name,
      };

      console.info('[NewDoc] Pha 3 — createDocument payload:', {
        loaiTaiLieu : finalPayload.loaiTaiLieu,
        tenTaiLieu  : finalPayload.tenTaiLieu,
        driveFileId : finalPayload.driveFileId,
        signerConfig: JSON.stringify(finalPayload.signerConfig),
      });

      const res = await GAS.call('createDocument', Session.getToken(), finalPayload);

      if (res.success) {
        const docId = res.data?.maDoc ?? uploadResult.meta?.timestamp ?? '—';
        _showSuccess(docId, uploadResult);
      } else {
        Toast.sign.failed(res.error ?? '');
        btn.disabled = false;
        btn.classList.remove('loading');
        _isSubmitting = false;
      }

    } catch (err) {
      console.error('[NewDocModule._handleSubmit Pha3]', err);
      Toast.sign.failed(err.message);
      btn.disabled = false;
      btn.classList.remove('loading');
      _isSubmitting = false;
    }
  }

  function _showSuccess(docId, uploadResult) {
    $('success-doc-id').textContent = docId;

    // Nếu có Drive URL, cho phép mở file trực tiếp
    const viewBtn = $('nd-success-view');
    if (viewBtn && uploadResult?.driveUrl) {
      viewBtn.onclick = () => {
        window.open(uploadResult.driveUrl, '_blank', 'noopener,noreferrer');
        $('nd-success-overlay').classList.remove('show');
      };
    }

    $('nd-success-overlay').classList.add('show');
    _isSubmitting = false;
    setTimeout(() => $('nd-success-overlay')?.classList.remove('show'), 8000);
  }

  /* ── Show / Hide ──────────────────────────────────────────────────────── */
  function show() {
    // Ẩn các pages khác bằng class (nhất quán với CSS pattern)
    ['page-dashboard','page-users','page-pending','page-all-docs'].forEach(id => {
      const p = document.getElementById(id);
      if (p) { p.style.display = ''; p.classList.remove('active'); }
    });
    const el=$('page-new-doc');
    if (el) { el.style.display = ''; el.classList.add('active'); }
    // Load users for signer pickers (async, non-blocking)
    SignerConfig.loadUsers();
    _updateSummary();
  }

  function hide() {
    const el=$('page-new-doc'); if(el){ el.style.display=''; el.classList.remove('active'); }
    $('nd-success-overlay')?.classList.remove('show');
  }

  /* ── Init events ──────────────────────────────────────────────────────── */
  function initEvents() {
    _initDocTypeSelector();
    _initDropZone();
    _bindCharCount('nd-ten-td','nd-ten-count',120);
    _bindCharCount('nd-ten-da','nd-da-count',80);
    _bindCharCount('nd-ghi-chu','nd-gc-count',300);
    $('nd-ten-da')?.addEventListener('input', _updateSummary);

    ['nd-ten-td'].forEach(id => {
      $(id)?.addEventListener('input', ()=>{
        $(id).classList.remove('has-error');
        $('err-'+id.replace('nd-',''))?.classList.remove('show');
      });
    });

    $('nd-btn-submit')?.addEventListener('click', _handleSubmit);
    ['nd-btn-reset','nd-btn-reset-2'].forEach(id=>{
      $(id)?.addEventListener('click',()=>{ if(confirm('Xóa toàn bộ thông tin đã nhập?')) _resetForm(); });
    });
    $('nd-success-new')?.addEventListener('click',()=>{ $('nd-success-overlay').classList.remove('show'); _resetForm(); });
    $('nd-success-view')?.addEventListener('click',()=>{ $('nd-success-overlay').classList.remove('show'); document.querySelector('#sidebar .nav-link[data-page="all-docs"]')?.click(); });

    // Signer panel events
    $('btn-add-signer')?.addEventListener('click', ()=>SignerConfig._addRow());
    $('single-signer-select')?.addEventListener('change', function() {
      SignerConfig._updateSingleChip(this.value);
      $('err-single-signer')?.classList.remove('show');
      _updateSummary();
    });

    /* PDF Viewer events */
    PdfViewer.initEvents();

    // PendingDocs events
    PendingDocs.initEvents();

    _updateSummary();
  }

  return { show, hide, initEvents };

})(); // end NewDocModule


/* ══════════════════════════════════════════════════════════════════════════════
   USER MANAGER MODULE  v1.0
   Quản lý CRUD nhân viên — giao tiếp GAS qua google.script.run
══════════════════════════════════════════════════════════════════════════════ */
const UserManager = (() => {

  /* ── State ────────────────────────────────────────────────────────────── */
  let _allUsers    = [];      // Toàn bộ dữ liệu gốc từ sheet
  let _filtered    = [];      // Sau khi lọc/search
  let _editRowIdx  = null;    // _rowIndex của record đang sửa (null = thêm mới)
  let _editMaNV    = null;    // Mã NV gốc khi mở modal sửa (để tìm dòng khi update)
  let _deleteRow   = null;    // { name, rowIndex } đang chờ xóa
  let _sortCol     = null;    // Cột đang sort
  let _sortDir     = 'asc';   // Hướng sort
  let _page        = 1;
  const PAGE_SIZE  = 10;

  // Bootstrap modal instances (khởi tạo lười)
  let _bsModalUser = null;
  let _bsModalDel  = null;

  /* ── Cột sheet Nguoi_Dung ─────────────────────────────────────────────── */
  const F = {
    MA_NV    : 'Mã NV',
    HO_TEN   : 'Họ tên',
    EMAIL    : 'Email',
    SDT      : 'Số điện thoại',
    CHUC_VU  : 'Chức vụ',
    PHONG_BAN: 'Phòng ban',
    PHAN_Q   : 'Phân quyền',
    MAT_KHAU : 'Mật khẩu',
    HINH_DAI : 'Hình đại diện',
    ROW_IDX  : '_rowIndex',
  };

  /* ── Helpers DOM ──────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const initials = name => {
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0] + p[p.length-1][0]).toUpperCase();
  };
  const roleClass = role => ({
    'Admin': 'admin', 'Quản lý': 'manager', 'Người dùng': 'user'
  })[role] ?? 'user';

  /* ── Load dữ liệu từ GAS ──────────────────────────────────────────────── */
  async function _fetchUsers(forceRefresh = false) {
    _renderSkeleton();
    try {
      const token = Session.getToken();
      const res   = await GAS.call('getUserList', token);

      if (!res.success) {
        _renderError(res.error || 'Không thể tải danh sách nhân viên.');
        return;
      }

      _allUsers = res.data ?? [];
      _buildDeptFilter();
      _applyFilters();
      _updateStats();

    } catch (err) {
      _renderError('Lỗi kết nối: ' + err.message);
      console.error('[UserManager._fetchUsers]', err);
    }
  }

  /* ── Lọc + sort ───────────────────────────────────────────────────────── */
  function _applyFilters() {
    const q    = ($('usr-search')?.value ?? '').trim().toLowerCase();
    const role = $('usr-filter-role')?.value ?? '';
    const dept = $('usr-filter-dept')?.value ?? '';

    _filtered = _allUsers.filter(u => {
      const matchQ = !q || [u[F.MA_NV], u[F.HO_TEN], u[F.EMAIL], u[F.PHONG_BAN]]
        .some(v => (v ?? '').toLowerCase().includes(q));
      const matchR = !role || u[F.PHAN_Q] === role;
      const matchD = !dept || u[F.PHONG_BAN] === dept;
      return matchQ && matchR && matchD;
    });

    if (_sortCol) {
      _filtered.sort((a, b) => {
        const va = (a[_sortCol] ?? '').toString().toLowerCase();
        const vb = (b[_sortCol] ?? '').toString().toLowerCase();
        return _sortDir === 'asc' ? va.localeCompare(vb, 'vi') : vb.localeCompare(va, 'vi');
      });
    }

    _page = 1;
    _renderTable();
  }

  /* ── Render skeleton ──────────────────────────────────────────────────── */
  function _renderSkeleton() {
    const tbody = $('usr-tbody');
    if (!tbody) return;
    tbody.innerHTML = Array(5).fill('').map(() => `
      <tr class="skel-row">
        ${Array(8).fill('<td><div class="skel-block" style="height:14px;border-radius:4px;"></div></td>').join('')}
      </tr>`).join('');
    $('pag-info').textContent = 'Đang tải…';
    $('pag-controls').innerHTML = '';
  }

  function _renderError(msg) {
    const tbody = $('usr-tbody');
    if (tbody) tbody.innerHTML = `<tr><td colspan="8"><div class="usr-empty">
      <i class="bi bi-wifi-off"></i>${msg}</div></td></tr>`;
    $('pag-info').textContent = '';
  }

  /* ── Render bảng ──────────────────────────────────────────────────────── */
  function _renderTable() {
    const tbody = $('usr-tbody');
    if (!tbody) return;

    const total = _filtered.length;
    const start = (_page - 1) * PAGE_SIZE;
    const end   = Math.min(start + PAGE_SIZE, total);
    const page  = _filtered.slice(start, end);

    if (total === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="usr-empty">
        <i class="bi bi-people"></i>Không tìm thấy nhân viên nào.</div></td></tr>`;
      $('pag-info').textContent = '';
      $('pag-controls').innerHTML = '';
      return;
    }

    tbody.innerHTML = page.map(u => {
      const ini = initials(u[F.HO_TEN]);
      const av  = u[F.HINH_DAI] ? `<img src="${u[F.HINH_DAI]}" alt="${u[F.HO_TEN]}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                  <span style="display:none">${ini}</span>`
                                 : ini;
      const rClass = roleClass(u[F.PHAN_Q]);
      const canEdit = checkPermission('Quản lý người dùng');
      return `
      <tr data-row="${u[F.ROW_IDX]}">
        <td><input type="checkbox" class="chk-row" data-row="${u[F.ROW_IDX]}" style="accent-color:var(--brand-primary);"></td>
        <td>
          <div class="usr-avatar-cell">
            <div class="usr-av">${av}</div>
            <div>
              <div class="usr-fullname">${u[F.HO_TEN] || '—'}</div>
              <div class="usr-maNV">${u[F.MA_NV] || ''}</div>
            </div>
          </div>
        </td>
        <td style="font-size:13px;">${u[F.EMAIL] || '—'}</td>
        <td style="font-size:13px;color:var(--text-secondary);">${u[F.SDT] || '—'}</td>
        <td style="font-size:13px;">${u[F.PHONG_BAN] || '—'}</td>
        <td style="font-size:13px;color:var(--text-secondary);">${u[F.CHUC_VU] || '—'}</td>
        <td><span class="role-badge ${rClass}">${u[F.PHAN_Q] || '—'}</span></td>
        <td style="text-align:center;">
          <div class="d-flex gap-1 justify-content-center">
            ${canEdit ? `<button class="tbl-action btn-edit-user" data-row="${u[F.ROW_IDX]}" title="Chỉnh sửa"><i class="bi bi-pencil"></i></button>` : ''}
            ${canEdit ? `<button class="tbl-action btn-del-user" data-row="${u[F.ROW_IDX]}" data-name="${u[F.HO_TEN]}" title="Xóa" style="color:#DC2626;"><i class="bi bi-trash3"></i></button>` : ''}
            <button class="tbl-action btn-view-user" data-row="${u[F.ROW_IDX]}" title="Xem chi tiết"><i class="bi bi-eye"></i></button>
          </div>
        </td>
      </tr>`;
    }).join('');

    // Pagination info
    $('pag-info').textContent = `Hiển thị ${start + 1}–${end} / ${total} nhân viên`;
    _renderPagination(total);
  }

  /* ── Render pagination ────────────────────────────────────────────────── */
  function _renderPagination(total) {
    const pages  = Math.ceil(total / PAGE_SIZE);
    const ctrl   = $('pag-controls');
    if (!ctrl) return;
    if (pages <= 1) { ctrl.innerHTML = ''; return; }

    let html = `<button class="pag-btn" id="pag-prev" ${_page===1?'disabled':''}><i class="bi bi-chevron-left" style="font-size:12px;"></i></button>`;
    for (let p = 1; p <= pages; p++) {
      if (pages > 7 && p > 2 && p < pages - 1 && Math.abs(p - _page) > 1) {
        if (p === 3 || p === pages - 2) html += `<button class="pag-btn" disabled style="pointer-events:none;">…</button>`;
        continue;
      }
      html += `<button class="pag-btn ${p===_page?'active':''}" data-p="${p}">${p}</button>`;
    }
    html += `<button class="pag-btn" id="pag-next" ${_page===pages?'disabled':''}><i class="bi bi-chevron-right" style="font-size:12px;"></i></button>`;
    ctrl.innerHTML = html;

    ctrl.querySelectorAll('[data-p]').forEach(btn => {
      btn.addEventListener('click', () => { _page = +btn.dataset.p; _renderTable(); });
    });
    const prev = $('pag-prev'), next = $('pag-next');
    if (prev) prev.addEventListener('click', () => { if (_page > 1) { _page--; _renderTable(); } });
    if (next) next.addEventListener('click', () => { if (_page < pages) { _page++; _renderTable(); } });
  }

  /* ── Cập nhật thống kê ────────────────────────────────────────────────── */
  function _updateStats() {
    $('stat-total').textContent   = _allUsers.length;
    $('stat-admin').textContent   = _allUsers.filter(u => u[F.PHAN_Q] === 'Admin').length;
    $('stat-manager').textContent = _allUsers.filter(u => u[F.PHAN_Q] === 'Quản lý').length;
    $('stat-user').textContent    = _allUsers.filter(u => u[F.PHAN_Q] === 'Người dùng').length;
  }

  /* ── Build datalist phòng ban ─────────────────────────────────────────── */
  function _buildDeptFilter() {
    const depts  = [...new Set(_allUsers.map(u => u[F.PHONG_BAN]).filter(Boolean))].sort((a,b) => a.localeCompare(b,'vi'));
    const sel    = $('usr-filter-dept');
    const dl     = $('dept-list');
    if (sel) {
      sel.innerHTML = '<option value="">Tất cả phòng ban</option>' +
        depts.map(d => `<option value="${d}">${d}</option>`).join('');
    }
    if (dl) dl.innerHTML = depts.map(d => `<option value="${d}">`).join('');
  }

  /* ── Password strength ────────────────────────────────────────────────── */
  function _checkPwdStrength(pwd) {
    if (!pwd) return { score: 0, label: '', color: '' };
    let score = 0;
    if (pwd.length >= 8)          score++;
    if (/[A-Z]/.test(pwd))        score++;
    if (/[0-9]/.test(pwd))        score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const levels = [
      { label: 'Rất yếu',  color: '#EF4444', pct: '20%'  },
      { label: 'Yếu',      color: '#F97316', pct: '40%'  },
      { label: 'Trung bình',color: '#EAB308', pct: '65%'  },
      { label: 'Mạnh',     color: '#22C55E', pct: '85%'  },
      { label: 'Rất mạnh', color: '#059669', pct: '100%' },
    ];
    return levels[score];
  }

  /* ── Mở modal thêm mới ────────────────────────────────────────────────── */
  function _openAddModal() {
    _editRowIdx = null;
    $('modalUserLabel').innerHTML = '<i class="bi bi-person-plus me-2"></i>Thêm nhân viên mới';
    $('save-label').textContent = 'Lưu nhân viên';
    $('form-user').reset();
    $('f-row-index').value = '';
    $('modal-avatar-preview').textContent = '?';
    $('pwd-required-note').style.display = '';
    $('pwd-optional-note').style.display = 'none';
    $('f-mat-khau').required = true;
    $('pwd-strength-wrap').style.display = 'none';
    _clearModalAlert();
    _clearFormErrors();
    _bsModalUser.show();
  }

  /* ── Mở modal sửa ─────────────────────────────────────────────────────── */
  function _openEditModal(rowIdx) {
    const user = _allUsers.find(u => u[F.ROW_IDX] == rowIdx);
    if (!user) return;
    _editRowIdx = rowIdx;
    _editMaNV   = user[F.MA_NV] || ''; // Lưu Mã NV gốc để backend tìm đúng dòng

    $('modalUserLabel').innerHTML = '<i class="bi bi-pencil-square me-2"></i>Chỉnh sửa nhân viên';
    $('save-label').textContent = 'Cập nhật';
    $('f-row-index').value  = rowIdx;
    $('f-ma-nv').value      = user[F.MA_NV]    ?? '';
    $('f-ho-ten').value     = user[F.HO_TEN]   ?? '';
    $('f-email').value      = user[F.EMAIL]    ?? '';
    $('f-sdt').value        = user[F.SDT]      ?? '';
    $('f-phong-ban').value  = user[F.PHONG_BAN]?? '';
    $('f-chuc-vu').value    = user[F.CHUC_VU]  ?? '';
    $('f-phan-quyen').value = user[F.PHAN_Q]   ?? '';
    $('f-avatar').value     = user[F.HINH_DAI] ?? '';
    $('f-mat-khau').value   = '';
    $('f-mat-khau').required = false;
    $('pwd-required-note').style.display = 'none';
    $('pwd-optional-note').style.display = '';
    $('pwd-strength-wrap').style.display = 'none';

    // Avatar preview
    _updateAvatarPreview(user[F.HO_TEN], user[F.HINH_DAI]);
    _clearModalAlert();
    _clearFormErrors();
    _bsModalUser.show();
