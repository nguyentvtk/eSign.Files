  /* ── Cập nhật avatar preview ──────────────────────────────────────────── */
  function _updateAvatarPreview(name, url) {
    const el = $('modal-avatar-preview');
    if (url) {
      el.innerHTML = `<img src="${url}" alt="${name}" onerror="this.parentNode.textContent='${initials(name)}'">`;
    } else {
      el.textContent = initials(name) || '?';
    }
  }

  /* ── Validate form ────────────────────────────────────────────────────── */
  function _validateForm() {
    let ok = true;
    _clearFormErrors();

    const req = [
      ['f-ma-nv',     'Vui lòng nhập mã nhân viên.'],
      ['f-ho-ten',    'Vui lòng nhập họ và tên.'],
      ['f-email',     'Vui lòng nhập email.'],
      ['f-phong-ban', 'Vui lòng nhập phòng ban.'],
      ['f-chuc-vu',   'Vui lòng nhập chức vụ.'],
      ['f-phan-quyen','Vui lòng chọn phân quyền.'],
    ];

    req.forEach(([id, msg]) => {
      const el = $(id);
      if (!el?.value.trim()) { el.classList.add('is-invalid'); ok = false; }
    });

    // Email format
    const emailEl = $('f-email');
    if (emailEl?.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
      emailEl.classList.add('is-invalid');
      emailEl.nextElementSibling && (emailEl.nextElementSibling.textContent = 'Email không đúng định dạng.');
      ok = false;
    }

    // Password
    const pwdEl = $('f-mat-khau');
    if (pwdEl?.required && !pwdEl.value) {
      pwdEl.classList.add('is-invalid'); ok = false;
    } else if (pwdEl?.value && pwdEl.value.length < 6) {
      pwdEl.classList.add('is-invalid'); ok = false;
    }

    // Email trùng khi thêm mới
    if (!_editRowIdx) {
      const emailVal = $('f-email')?.value.trim().toLowerCase();
      const dup = _allUsers.find(u => (u[F.EMAIL]||'').toLowerCase() === emailVal);
      if (dup) {
        $('f-email').classList.add('is-invalid');
        $('f-email').nextElementSibling.textContent = 'Email này đã tồn tại trong hệ thống.';
        ok = false;
      }
    }

    return ok;
  }

  function _clearFormErrors() {
    document.querySelectorAll('#form-user .is-invalid').forEach(el => el.classList.remove('is-invalid'));
  }

  /* ── Modal alert ──────────────────────────────────────────────────────── */
  function _showModalAlert(msg, type = 'danger') {
    const el = $('modal-alert');
    el.className = `alert alert-${type} d-flex align-items-center gap-2 mb-4`;
    el.innerHTML = `<i class="bi bi-${type==='danger'?'exclamation-circle':'check-circle'}-fill"></i>${msg}`;
  }
  function _clearModalAlert() {
    const el = $('modal-alert');
    el.className = 'alert d-none';
    el.innerHTML = '';
  }

  /* ── Lưu (thêm hoặc sửa) ──────────────────────────────────────────────── */
  async function _saveUser() {
    if (!_validateForm()) return;

    const payload = {
      [F.MA_NV]    : $('f-ma-nv').value.trim(),
      [F.HO_TEN]   : $('f-ho-ten').value.trim(),
      [F.EMAIL]    : $('f-email').value.trim(),
      [F.SDT]      : $('f-sdt').value.trim(),
      [F.PHONG_BAN]: $('f-phong-ban').value.trim(),
      [F.CHUC_VU]  : $('f-chuc-vu').value.trim(),
      [F.PHAN_Q]   : $('f-phan-quyen').value,
      [F.HINH_DAI] : $('f-avatar').value.trim(),
    };

    const pwd = $('f-mat-khau').value;
    if (pwd) payload[F.MAT_KHAU] = pwd;

    const isEdit = !!_editRowIdx;
    // Với update: backend tìm dòng theo Mã NV (đã lưu khi mở modal)
    // _editMaNV được set trong _openEditModal
    if (isEdit) payload['_searchMaNV'] = _editMaNV;

    // Bật loading trên nút Lưu
    $('save-spinner').style.display = 'inline-block';
    $('save-icon').style.display    = 'none';
    $('btn-save-user').disabled     = true;

    try {
      const token  = Session.getToken();
      const fnName = isEdit ? 'updateNguoiDung' : 'addNguoiDung';
      const res    = await GAS.call(fnName, token, payload);

      if (res.success) {
        _bsModalUser.hide();
        Toast.success(isEdit ? `Đã cập nhật "${payload[F.HO_TEN]}" thành công.`
                              : `Đã thêm "${payload[F.HO_TEN]}" vào hệ thống.`);
        await _fetchUsers();
      } else {
        _showModalAlert(res.error || 'Lưu thất bại. Vui lòng thử lại.');
      }
    } catch (err) {
      _showModalAlert('Lỗi kết nối: ' + err.message);
      console.error('[UserManager._saveUser]', err);
    } finally {
      $('save-spinner').style.display = 'none';
      $('save-icon').style.display    = '';
      $('btn-save-user').disabled     = false;
    }
  }

  /* ── Xóa nhân viên ────────────────────────────────────────────────────── */
  function _openDeleteModal(rowIdx, name) {
    const user = _allUsers.find(u => u[F.ROW_IDX] == rowIdx);
    _deleteRow = {
      rowIdx,
      name  : name || user?.[F.HO_TEN] || '—',
      maNV  : user?.[F.MA_NV]  || '',
      email : user?.[F.EMAIL]  || '',
    };
    $('del-user-name').textContent = _deleteRow.name;
    _bsModalDel.show();
  }

  async function _confirmDelete() {
    if (!_deleteRow) return;
    $('del-spinner').style.display = 'inline-block';
    $('del-icon').style.display    = 'none';
    $('btn-confirm-delete').disabled = true;

    try {
      const token = Session.getToken();
      // Gửi maNV + email để backend tìm dòng chính xác (không dùng rowIndex dễ lỗi thời)
      const res   = await GAS.call('deleteNguoiDung', token, _deleteRow.maNV, _deleteRow.email);

      if (res.success) {
        _bsModalDel.hide();
        Toast.success(`Đã xóa "${_deleteRow.name}" khỏi hệ thống.`);
        _deleteRow = null;
        await _fetchUsers();
      } else {
        Toast.error(res.error || 'Xóa thất bại.');
      }
    } catch (err) {
      Toast.network.error(err.message);
      console.error('[UserManager._confirmDelete]', err);
    } finally {
      $('del-spinner').style.display = 'none';
      $('del-icon').style.display    = '';
      $('btn-confirm-delete').disabled = false;
    }
  }

  /* ── Export CSV ───────────────────────────────────────────────────────── */
  function _exportCSV() {
    const cols  = [F.MA_NV, F.HO_TEN, F.EMAIL, F.SDT, F.PHONG_BAN, F.CHUC_VU, F.PHAN_Q];
    const header = cols.join(',');
    const rows   = _filtered.map(u =>
      cols.map(c => `"${(u[c] ?? '').toString().replace(/"/g, '""')}"`).join(',')
    );
    const csv  = '\uFEFF' + [header, ...rows].join('\n'); // BOM for Excel
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `DanhSachNhanVien_${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    Toast.success('Xuất CSV thành công!');
  }

  /* ── Hiện/ẩn page Users ───────────────────────────────────────────────── */
  function show() {
    // Ẩn các pages khác bằng class (nhất quán với CSS pattern)
    ['page-dashboard','page-new-doc','page-pending','page-all-docs'].forEach(id => {
      const p = document.getElementById(id);
      if (p) { p.style.display = ''; p.classList.remove('active'); }
    });
    const el = $('page-users');
    if (el) { el.style.display = ''; el.classList.add('active'); }
    _fetchUsers();
  }

  function hide() {
    const el = $('page-users');
    if (el) { el.style.display = ''; el.classList.remove('active'); }
  }

  /* ── Khởi tạo events (gọi một lần trong bootstrap) ───────────────────── */
  function initEvents() {
    // Khởi tạo Bootstrap modal instances
    _bsModalUser = new bootstrap.Modal($('modalUser'));
    _bsModalDel  = new bootstrap.Modal($('modalDelete'));

    // Reset form khi đóng modal
    $('modalUser').addEventListener('hidden.bs.modal', () => {
      $('form-user').reset();
      _clearFormErrors();
      _clearModalAlert();
      $('modal-avatar-preview').textContent = '?';
      $('save-spinner').style.display = 'none';
      $('save-icon').style.display    = '';
      $('btn-save-user').disabled     = false;
    });

    // Nút Thêm mới
    $('btn-add-user').addEventListener('click', _openAddModal);

    // Nút Lưu trong modal
    $('btn-save-user').addEventListener('click', _saveUser);

    // Nút Xác nhận xóa
    $('btn-confirm-delete').addEventListener('click', _confirmDelete);

    // Refresh
    $('btn-refresh-users').addEventListener('click', () => _fetchUsers(true));

    // Export CSV
    $('btn-export-csv').addEventListener('click', _exportCSV);

    // Search — debounce 300ms
    let _debounce;
    $('usr-search').addEventListener('input', () => {
      clearTimeout(_debounce);
      _debounce = setTimeout(_applyFilters, 300);
    });

    // Filter dropdowns
    $('usr-filter-role').addEventListener('change', _applyFilters);
    $('usr-filter-dept').addEventListener('change', _applyFilters);

    // Sort columns (event delegation)
    document.querySelectorAll('.sort-col').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (_sortCol === col) {
          _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          _sortCol = col; _sortDir = 'asc';
        }
        // Cập nhật icon sort
        document.querySelectorAll('.sort-col i').forEach(i => i.className = 'bi bi-arrow-down-up' + ' ms-1' );
        const icon = th.querySelector('i');
        if (icon) icon.className = `bi bi-arrow-${_sortDir === 'asc' ? 'up' : 'down'} ms-1`;
        _applyFilters();
      });
    });

    // Nút chọn tất cả
    $('chk-all').addEventListener('change', function() {
      document.querySelectorAll('.chk-row').forEach(c => c.checked = this.checked);
    });

    // Event delegation cho nút Sửa / Xóa / Xem trong bảng
    $('usr-tbody').addEventListener('click', e => {
      const editBtn = e.target.closest('.btn-edit-user');
      const delBtn  = e.target.closest('.btn-del-user');
      const viewBtn = e.target.closest('.btn-view-user');

      if (editBtn) _openEditModal(+editBtn.dataset.row);
      if (delBtn)  _openDeleteModal(+delBtn.dataset.row, delBtn.dataset.name);
      if (viewBtn) {
        // Hiện chi tiết (đơn giản: mở edit ở chế độ readonly — có thể mở rộng)
        _openEditModal(+viewBtn.dataset.row);
      }
    });

    // Toggle mật khẩu trong modal
    $('toggle-modal-pwd').addEventListener('click', () => {
      const inp  = $('f-mat-khau');
      const icon = $('modal-pwd-icon');
      const show = inp.type === 'password';
      inp.type       = show ? 'text' : 'password';
      icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    // Password strength + live avatar preview
    $('f-mat-khau').addEventListener('input', function() {
      const wrap = $('pwd-strength-wrap');
      if (this.value) {
        wrap.style.display = '';
        const s = _checkPwdStrength(this.value);
        $('pwd-fill').style.width      = s.pct;
        $('pwd-fill').style.background = s.color;
        $('pwd-strength-text').textContent = s.label;
        $('pwd-strength-text').style.color = s.color;
      } else {
        wrap.style.display = 'none';
      }
    });

    $('f-ho-ten').addEventListener('input', function() {
      if (!$('f-avatar').value) {
        $('modal-avatar-preview').textContent = initials(this.value) || '?';
      }
    });

    $('f-avatar').addEventListener('input', function() {
      _updateAvatarPreview($('f-ho-ten').value, this.value);
    });

    // Xóa is-invalid khi gõ lại
    $('form-user').querySelectorAll('.form-control, .form-select').forEach(el => {
      el.addEventListener('input', () => el.classList.remove('is-invalid'));
    });
  }

  /* ── Public API ───────────────────────────────────────────────────────── */
  return { show, hide, initEvents, refresh: () => _fetchUsers(true) };

})(); // end UserManager


/* ══════════════════════════════════════════════════════════════════════════════
   TRANSACTION LOGGER  v1.0  —  Ghi nhật ký giao dịch sau khi lưu Drive
   ─────────────────────────────────────────────────────────────────────────────
   Gọi ngay sau khi saveFinalSignedFile thành công.
   Ghi vào sheet 'Data' cột A-G:
     A: Timestamp VN (dd/MM/yyyy HH:mm:ss)
     B: STT tự tăng
     C: Tên Tài Liệu
     D: Loại Tài Liệu
     E: Tên Dự Án
     F: Người/Tổ Chức Ký (Thực Hiện)
     G: URL File Final trên Drive
══════════════════════════════════════════════════════════════════════════════ */
const TransactionLogger = (() => {

  /* ── Config ───────────────────────────────────────────────────────────── */
  const MAX_LOG_RETRY = 2;     // Số lần retry nếu log lỗi
  const LOG_DELAY_MS  = 500;   // Delay trước khi ghi (đảm bảo Drive đã flush)

  /* ── Nhật ký local (session memory) ─────────────────────────────────────
   * Lưu lại tất cả log entries trong session để user có thể xem lại.
   * Xóa khi user đăng xuất.
   */
  const _localLog = [];

  /* ── DOM helper ───────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);

  /* ════════════════════════════════════════════════════════════════════════
     HÀM CHÍNH: log — Ghi một giao dịch sau khi lưu Drive thành công
  ════════════════════════════════════════════════════════════════════════ */

  /**
   * Ghi nhật ký giao dịch vào sheet 'Data' cột A-G.
   * Tự động lấy thêm context từ Session nếu logData thiếu trường.
   *
   * @param {Object} saveResult  - Response từ GAS saveFinalSignedFile
   * @param {Object} signMeta    - Meta từ luồng ký: { maDoc, tenTaiLieu,
   *                               loaiTaiLieu, tenDuAn, signerName, signerEmail }
   * @returns {Promise<Object>}  - Response từ GAS logTransaction
   */
  async function log(saveResult, signMeta = {}) {
    // Delay nhỏ để chắc chắn Drive đã ghi xong
    await _sleep(LOG_DELAY_MS);

    const user     = Session.getUser();
    const token    = Session.getToken();

    // ── Chuẩn bị payload logData ────────────────────────────────────────
    const logData = {
      tenTaiLieu   : _clean(signMeta.tenTaiLieu  ?? saveResult?.maDoc        ?? 'Không xác định'),
      loaiTaiLieu  : _clean(signMeta.loaiTaiLieu ?? ''),
      tenDuAn      : _clean(signMeta.tenDuAn     ?? ''),
      thucHien     : _buildThucHien(signMeta, user),
      urlFinal     : saveResult?.driveUrl ?? saveResult?.fileUrl ?? '',
      maDoc        : _clean(signMeta.maDoc       ?? saveResult?.maDoc ?? ''),
      phuongThuc   : _clean(signMeta.phuongThuc  ?? ''),
    };

    // Validate tối thiểu trước khi gọi GAS
    if (!logData.urlFinal) {
      console.warn('[TransactionLogger] Thiếu urlFinal — bỏ qua log.');
      return { success: false, error: 'Thiếu urlFinal', meta: { action: 'LOG_SKIPPED' } };
    }

    console.info('[TransactionLogger] Ghi log:', logData);

    // ── Ghi vào local log trước ────────────────────────────────────────
    const localEntry = {
      ...logData,
      timestamp : _formatLocalTimestamp(),
      saveResult: { fileId: saveResult?.fileId, sizeHuman: saveResult?.sizeHuman },
    };
    _localLog.unshift(localEntry); // Mới nhất ở đầu
    if (_localLog.length > 100) _localLog.pop(); // Giới hạn 100 entries

    // ── Gọi GAS với retry ──────────────────────────────────────────────
    let lastErr = null;
    for (let attempt = 1; attempt <= MAX_LOG_RETRY; attempt++) {
      try {
        const res = await GAS.call('logTransaction', token, logData);

        if (res.success) {
          const { stt, sheetRow, timestamp } = res.data ?? {};
          console.info(
            `[TransactionLogger] ✅ Log STT=${stt}, hàng ${sheetRow}, ` +
            `timestamp="${timestamp}"`
          );
          // Cập nhật local entry với STT chính thức
          localEntry.stt      = stt;
          localEntry.sheetRow = sheetRow;
          // Cập nhật UI nếu có log panel
          _updateLogPanel(localEntry, stt, timestamp);
          return res;
        } else {
          lastErr = new Error(res.error ?? 'logTransaction thất bại');
          console.warn(`[TransactionLogger] GAS lỗi [${attempt}]: ${res.error}`);
        }

      } catch (err) {
        lastErr = err;
        console.error(`[TransactionLogger] Lỗi attempt ${attempt}:`, err.message);
        if (attempt < MAX_LOG_RETRY) await _sleep(1500 * attempt);
      }
    }

    console.error('[TransactionLogger] ❌ Ghi log thất bại sau', MAX_LOG_RETRY, 'lần:', lastErr?.message);
    // Không throw — log thất bại không được block flow chính
    return { success: false, error: lastErr?.message, meta: { action: 'LOG_RETRY_EXHAUSTED' } };
  }

  /**
   * Ghi nhiều giao dịch một lúc (batch) — ví dụ khi hoàn thành cả luồng ký.
   * @param {Object[]} entries - Mảng { saveResult, signMeta }
   */
  async function logBatch(entries) {
    if (!Array.isArray(entries) || entries.length === 0) return;
    const token = Session.getToken();
    const user  = Session.getUser();

    const logDataArray = entries.map(({ saveResult, signMeta = {} }) => ({
      tenTaiLieu  : _clean(signMeta.tenTaiLieu  ?? saveResult?.maDoc ?? ''),
      loaiTaiLieu : _clean(signMeta.loaiTaiLieu ?? ''),
      tenDuAn     : _clean(signMeta.tenDuAn     ?? ''),
      thucHien    : _buildThucHien(signMeta, user),
      urlFinal    : saveResult?.driveUrl ?? saveResult?.fileUrl ?? '',
      maDoc       : _clean(signMeta.maDoc       ?? saveResult?.maDoc ?? ''),
    })).filter(d => d.urlFinal);

    if (logDataArray.length === 0) return;

    try {
      const res = await GAS.call('logTransactionBatch', token, logDataArray);
      console.info('[TransactionLogger] Batch log:', res.data);
      return res;
    } catch (err) {
      console.error('[TransactionLogger] Batch log lỗi:', err.message);
    }
  }

  /* ── Helpers ──────────────────────────────────────────────────────────── */

  /**
   * Xây dựng chuỗi "Thực hiện" từ signMeta và thông tin user session.
   * Format: "Nguyễn Văn An (NV001) <email@co.vn>"
   */
  function _buildThucHien(signMeta, user) {
    const name  = _clean(signMeta.signerName  ?? user?.['Họ tên']  ?? '');
    const email = _clean(signMeta.signerEmail ?? user?.['Email']   ?? '');
    const maNV  = _clean(user?.['Mã NV'] ?? '');
    const dept  = _clean(user?.['Phòng ban'] ?? '');

    let parts = [];
    if (name)  parts.push(name);
    if (maNV)  parts.push(`(${maNV})`);
    if (dept)  parts.push(`— ${dept}`);
    if (email && email !== name) parts.push(`<${email}>`);

    return parts.join(' ') || email || 'Không xác định';
  }

  /** Format timestamp phía client (fallback nếu GAS timestamp chưa trả về) */
  function _formatLocalTimestamp() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  /** Trim + giới hạn độ dài chuỗi */
  function _clean(str, max = 255) {
    return String(str ?? '').trim().substring(0, max);
  }

  const _sleep = ms => new Promise(r => setTimeout(r, ms));

  /* ── UI: Cập nhật log panel nếu có ──────────────────────────────────── */

  /**
   * Cập nhật log notification badge và panel nếu trang hiện đang mở.
   * @param {Object} entry    - Log entry đã ghi
   * @param {number} stt      - Số thứ tự
   * @param {string} timestamp- Timestamp chuẩn VN từ GAS
   */
  function _updateLogPanel(entry, stt, timestamp) {
    // Cập nhật toast nhỏ xác nhận log
    const msg = `📋 Log giao dịch #${stt ?? '—'} đã ghi lúc ${timestamp ?? _formatLocalTimestamp()}`;
    console.info('[TransactionLogger]', msg);

    // Cập nhật save-complete-overlay nếu đang hiện
    const overlay = $('save-complete-overlay');
    if (overlay?.classList.contains('show')) {
      const meta = $('sco-drive-meta');
      if (meta) {
        const cur = meta.textContent;
        if (!cur.includes('Log')) {
          meta.textContent = cur + ` · Log #${stt ?? '—'}`;
        }
      }
    }
  }

  /* ── Public API ───────────────────────────────────────────────────────── */
  return {
    log,
    logBatch,
    getLocalLog : () => [..._localLog],     // Copy để tránh mutation
    clearLocalLog: () => { _localLog.length = 0; },
  };

})(); // end TransactionLogger

/* ══════════════════════════════════════════════════════════════════════════════
   SAVE TO DRIVE MODULE  v1.0  —  Lưu PDF đã ký lên Drive + xử lý lỗi mạng
   ─────────────────────────────────────────────────────────────────────────────
   Luồng:
     1. Lấy base64 từ PdfStamper.getLastBytes() + convert → base64
     2. Gọi GAS saveFinalSignedFile với retry exponential backoff
     3. Cập nhật overlay UI từng bước
     4. Hiện kết quả: Drive URL + nút mở/tải xuống
     5. Xử lý lỗi mạng: retry 3 lần, fallback download local
══════════════════════════════════════════════════════════════════════════════ */
const SaveToDrive = (() => {

  /* ── Config ───────────────────────────────────────────────────────────── */
  const MAX_RETRY     = 3;
  const BASE_DELAY_MS = 2_000;  // Exponential backoff: 2s, 4s, 8s
  const TIMEOUT_MS    = 90_000; // Timeout cho mỗi attempt (90s — GAS có thể chậm)

  /* ── State ────────────────────────────────────────────────────────────── */
  let _lastResult   = null;   // Response từ GAS saveFinalSignedFile
  let _lastPayload  = null;   // Lưu để retry khi mạng lỗi

  /* ── DOM helpers ──────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);

  /* ════════════════════════════════════════════════════════════════════════
     HÀM CHÍNH: saveSignedPdfToDrive
  ════════════════════════════════════════════════════════════════════════ */

  /**
   * Lấy PDF đã ký từ PdfStamper → gọi GAS saveFinalSignedFile → hiện kết quả.
   *
   * @param {Object} meta  - { maDoc, tenTaiLieu, signerName, signerEmail,
   *                           ngayKy, phuongThuc, certSerial, certIssuer, tempFileId }
   * @returns {Promise<Object>} - Response từ GAS
   */
  async function saveSignedPdfToDrive(meta = {}) {
    /* ── Bước 1: Lấy PDF bytes từ PdfStamper ── */
    const signedBytes = PdfStamper.getLastBytes();
    if (!signedBytes || signedBytes.length === 0) {
      Toast.error('Chưa có PDF đã ký. Vui lòng thực hiện ký trước.');
      throw new Error('NO_SIGNED_PDF');
    }

    const base64Data = _uint8ArrayToBase64Safe(signedBytes);
    const docName    = meta.tenTaiLieu ?? 'TaiLieu';
    const token      = Session.getToken();

    const fullMeta = {
      sessionToken : token,
      maDoc        : meta.maDoc        ?? '',
      signerName   : meta.signerName   ?? Session.getUser()?.['Họ tên']  ?? '',
      signerEmail  : meta.signerEmail  ?? Session.getUser()?.['Email']    ?? '',
      ngayKy       : meta.ngayKy       ?? new Date().toISOString(),
      phuongThuc   : meta.phuongThuc   ?? 'unknown',
      certSerial   : meta.certSerial   ?? '',
      certIssuer   : meta.certIssuer   ?? '',
      tempFileId   : meta.tempFileId   ?? '',
    };

    _lastPayload = { base64Data, docName, meta: fullMeta };

    console.info(`[SaveToDrive] Bắt đầu lưu: "${docName}" (${_formatBytes(signedBytes.length)})`);

    /* ── Bước 2: Hiện overlay & update UI ── */
    _showSaveOverlay('loading', docName, signedBytes.length);

    /* ── Bước 3: Gọi GAS với retry ── */
    let attempt = 0;
    let lastErr = null;

    while (attempt < MAX_RETRY) {
      attempt++;

      if (attempt > 1) {
        const delay = BASE_DELAY_MS * Math.pow(2, attempt - 2);
        _showRetryInfo(attempt, MAX_RETRY, delay);
        console.warn(`[SaveToDrive] Retry ${attempt}/${MAX_RETRY}, đợi ${delay}ms…`);
        await _sleep(delay);
      }

      try {
        _setStep(3, 'active'); // Bước "Lưu Drive" đang chạy

        const res = await _callWithTimeout(
          () => GAS.call('saveFinalSignedFile', base64Data, docName, fullMeta),
          TIMEOUT_MS
        );

        if (res.success) {
          _lastResult = res;
          _setStep(3, 'done');
          _setStep(4, 'done');
          _showSaveSuccess(res, signedBytes);
          console.info(`[SaveToDrive] ✅ Thành công: ${res.driveUrl}`);

          // Ghi nhật ký giao dịch (fire-and-forget — không block UI)
          TransactionLogger.log(res, fullMeta).then(logRes => {
            if (logRes?.success) {
              console.info(`[SaveToDrive] Log giao dịch STT=${logRes.data?.stt}`);
            } else {
              console.warn('[SaveToDrive] Log thất bại:', logRes?.error);
            }
          }).catch(e => console.warn('[SaveToDrive] Log exception:', e.message));

          return res;
        } else {
          // GAS trả về lỗi logic (không phải lỗi mạng)
          lastErr = new Error(res.error ?? 'Lưu thất bại');
          console.error(`[SaveToDrive] GAS lỗi [${attempt}]: ${res.error}`);

          // Một số lỗi không nên retry (auth, validation)
          const noRetryActions = ['SAVE_UNAUTHORIZED', 'SAVE_NO_TOKEN', 'SAVE_NOT_PDF', 'SAVE_INVALID_DATA'];
          if (noRetryActions.includes(res.meta?.action)) {
            _showSaveError(res.error, false);
            throw lastErr;
          }
          // Các lỗi Drive/mạng → retry
        }

      } catch (err) {
        if (err.message === 'TIMEOUT') {
          lastErr = new Error(`Quá thời gian chờ (${TIMEOUT_MS / 1000}s). Mạng có thể chậm.`);
        } else {
          lastErr = err;
        }
        console.error(`[SaveToDrive] Lỗi attempt ${attempt}:`, lastErr.message);
      }
    }

    // Hết retry → hiện lỗi + nút download local
    console.error(`[SaveToDrive] ❌ Thất bại sau ${MAX_RETRY} lần thử: ${lastErr?.message}`);
    _showSaveError(lastErr?.message ?? 'Lỗi không xác định. Vui lòng thử lại.', true);
    throw lastErr ?? new Error('SAVE_FAILED_ALL_RETRIES');
  }

  /* ── Retry thủ công (gọi từ nút UI) ──────────────────────────────────── */
  async function retryLastSave() {
    if (!_lastPayload) {
      Toast.warning('Không có dữ liệu để thử lại. Vui lòng thực hiện ký trước.');
      return;
    }
    const { base64Data, docName, meta } = _lastPayload;
    _showSaveOverlay('loading', docName, 0);
    await saveSignedPdfToDrive({ ...meta, _isRetry: true });
  }

  /* ════════════════════════════════════════════════════════════════════════
     UI HELPERS
  ════════════════════════════════════════════════════════════════════════ */

  function _showSaveOverlay(state, docName, sizeBytes) {
    const overlay = $('save-complete-overlay');
    if (!overlay) return;

    // Reset state
    $('sco-net-err')?.classList.remove('show');
    $('sco-actions')?.style && ($('sco-actions').style.display = 'flex');
    $('sco-retry-info')?.classList.remove('show');
    $('sco-drive-card').style.display = '';

    if (state === 'loading') {
      // Cập nhật icon → loading
      $('sco-icon').style.background = 'var(--brand-light)';
      $('sco-icon-i').className = 'bi bi-cloud-arrow-up-fill';
      $('sco-icon-i').style.color = 'var(--brand-primary)';
      $('sco-title').textContent    = 'Đang lưu lên Google Drive…';
      $('sco-subtitle').textContent = 'Vui lòng không tắt trình duyệt trong quá trình tải lên.';
      $('sco-drive-name').textContent = docName || 'Đang xử lý…';
      $('sco-drive-meta').textContent = sizeBytes > 0 ? _formatBytes(sizeBytes) + ' · Đang tải lên…' : 'Đang xử lý…';
      $('sco-actions').style.display = 'none';

      _setStep(3, 'active');
      _setStep(4, '');
    }

    overlay.classList.add('show');
  }

  function _showSaveSuccess(res, bytes) {
    $('sco-icon').style.background  = '#DCFCE7';
    $('sco-icon-i').className        = 'bi bi-cloud-check-fill';
    $('sco-icon-i').style.color      = '#059669';
    $('sco-title').textContent       = 'Đã lưu vào Google Drive!';
    $('sco-subtitle').innerHTML      =
      `File PDF đã ký số được lưu vào <strong>Tai_Lieu_Da_Ky/${res.folderPath?.split('/').pop() ?? ''}</strong>.`;

    $('sco-drive-name').textContent  = res.uploadedName ?? '—';
    $('sco-drive-meta').textContent  = `${res.sizeHuman ?? _formatBytes(bytes?.length ?? 0)} · ${res.folderPath ?? ''}`;

    $('sco-retry-info')?.classList.remove('show');
    $('sco-net-err')?.classList.remove('show');
    $('sco-actions').style.display = 'flex';

    // Bind Drive URL
    const openBtn = $('sco-btn-open-drive');
    if (openBtn) openBtn.href = res.driveUrl ?? '#';

    // Bind download
    const dlBtn = $('sco-btn-download-local');
    if (dlBtn) {
      dlBtn.onclick = () => PdfStamper.downloadLast();
    }

    _setStep(3, 'done');
    _setStep(4, 'done');
  }

  function _showSaveError(errMsg, allowRetry = true) {
    $('sco-icon').style.background  = '#FEF2F2';
    $('sco-icon-i').className        = 'bi bi-cloud-slash-fill';
    $('sco-icon-i').style.color      = '#DC2626';
    $('sco-title').textContent       = 'Không thể lưu lên Drive';
    $('sco-subtitle').textContent    = 'File đã ký vẫn còn trong bộ nhớ trình duyệt.';
    $('sco-drive-card').style.display = 'none';
    $('sco-actions').style.display   = 'none';
    $('sco-retry-info')?.classList.remove('show');

    $('sco-net-err')?.classList.add('show');
    if ($('sco-err-msg')) $('sco-err-msg').textContent = errMsg || 'Lỗi không xác định.';

    const retryBtn = $('sco-btn-retry-save');
    if (retryBtn) retryBtn.style.display = allowRetry ? '' : 'none';
  }

  function _showRetryInfo(attempt, max, delayMs) {
    const el = $('sco-retry-info');
    if (!el) return;
    el.classList.add('show');
    const msg = $('sco-retry-msg');
    if (msg) msg.textContent = `Thử lại lần ${attempt}/${max} sau ${delayMs/1000}s… Kiểm tra kết nối mạng.`;
  }

  /** Cập nhật trạng thái step indicator */
  function _setStep(stepNum, state) {
    const el = $(`sco-step-${stepNum}`);
    if (!el) return;
    el.classList.remove('done', 'active');
    if (state === 'done')   el.classList.add('done');
    if (state === 'active') el.classList.add('active');
  }

  /* ── Utilities ────────────────────────────────────────────────────────── */

  /** Uint8Array → base64 (chunk để tránh stack overflow trên file lớn) */
  function _uint8ArrayToBase64Safe(bytes) {
    let binary = '';
    const CHUNK = 8192;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      binary += String.fromCharCode(...bytes.subarray(i, i + CHUNK));
    }
    return btoa(binary);
  }

  const _formatBytes = b => b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(2)+' MB';
  const _sleep       = ms => new Promise(r => setTimeout(r, ms));

  /**
   * Bọc Promise trong timeout.
   * @param {Function} fn - Async factory
   * @param {number}   ms - Timeout milliseconds
   */
  function _callWithTimeout(fn, ms) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error('TIMEOUT')), ms);
      fn().then(
        v => { clearTimeout(timer); resolve(v); },
        e => { clearTimeout(timer); reject(e);  }
      );
    });
  }

  /* ── Init events ──────────────────────────────────────────────────────── */
  function initEvents() {
    $('sco-btn-close-sco')?.addEventListener('click', () => {
      $('save-complete-overlay')?.classList.remove('show');
    });
    $('sco-btn-retry-save')?.addEventListener('click', retryLastSave);
    $('sco-btn-download-only')?.addEventListener('click', () => {
      PdfStamper.downloadLast();
      $('save-complete-overlay')?.classList.remove('show');
    });
  }

  /* ── Public API ───────────────────────────────────────────────────────── */
  return { saveSignedPdfToDrive, retryLastSave, initEvents };

})(); // end SaveToDrive

/* ══════════════════════════════════════════════════════════════════════════════
   PDF STAMPER  v1.0  —  Nhúng chữ ký trực quan vào PDF bằng pdf-lib.js
   ─────────────────────────────────────────────────────────────────────────────
   Luồng xử lý:
     1. Nhận pdfBase64 (file gốc từ Drive) + coordinates (sigFrames từ PdfViewer)
     2. Tạo stamp image trên Canvas 2D → xuất PNG base64
     3. Load PDF bằng PDFLib.PDFDocument.load()
     4. Nhúng PNG stamp vào từng trang theo tọa độ (xPt, yPt)
     5. Nhúng metadata chứng thư số vào DocumentInfo
     6. Xuất PDF bytes → Uint8Array → base64
     7. Hiển thị preview stamp + nút tải xuống
══════════════════════════════════════════════════════════════════════════════ */
const PdfStamper = (() => {

  /* ── State ────────────────────────────────────────────────────────────── */
  let _lastSignedBytes = null;  // Uint8Array của PDF đã ký (để download)
  let _lastFileName    = '';    // Tên file để đặt cho download

  /* ── Kiểm tra pdf-lib sẵn sàng ────────────────────────────────────────── */
  function _getPdfLib() {
    if (window.PDFLib) return window.PDFLib;
    throw new Error('pdf-lib chưa load. Kiểm tra CDN kết nối.');
  }

  /* ════════════════════════════════════════════════════════════════════════
     HÀM CHÍNH: stampAndSign
     Nhận PDF base64 + tọa độ + thông tin chứng thư → trả PDF đã ký (base64)
  ════════════════════════════════════════════════════════════════════════ */

  /**
   * @param {string}   pdfBase64     - PDF gốc dạng base64
   * @param {Object[]} coordinates   - Mảng sigFrames [{ page, xPt, yPt, wPt, hPt, label }]
   * @param {Object}   certInfo      - Thông tin chứng thư từ USB Token
   *   { subject, issuer, serial, validFrom, validTo, algorithm }
   * @param {Object}   meta          - { signerName, signerEmail, maDoc, tenTaiLieu }
   * @param {Function} [onProgress]  - Callback(percent, label)
   * @returns {Promise<{ base64: string, bytes: Uint8Array, fileName: string }>}
   */
  async function stampAndSign(pdfBase64, coordinates, certInfo, meta, onProgress) {
    const PDFLib = _getPdfLib();
    const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;

    const report = (pct, label) => {
      onProgress?.(pct, label);
      console.info(`[PdfStamper] ${label} (${pct}%)`);
    };

    report(5, 'Giải mã PDF…');

    /* ── BƯỚC 1: Load PDF từ base64 ─────────────────────────────────────── */
    let pdfBytes;
    try {
      pdfBytes = _base64ToUint8Array(pdfBase64);
    } catch (e) {
      throw new Error('Không thể giải mã PDF base64: ' + e.message);
    }

    const pdfDoc = await PDFDocument.load(pdfBytes, { ignoreEncryption: true });
    const pages  = pdfDoc.getPages();
    const totalPages = pages.length;

    report(15, 'Tải font chữ…');

    /* ── BƯỚC 2: Nhúng font (dùng Helvetica chuẩn, không cần tải ngoài) ── */
    const helveticaFont      = await pdfDoc.embedFont(StandardFonts.Helvetica);
    const helveticaBoldFont  = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

    report(25, 'Tạo hình ảnh chữ ký…');

    /* ── BƯỚC 3: Tạo stamp image trên Canvas ────────────────────────────── */
    const signerName  = meta?.signerName   ?? 'Người ký';
    const signerEmail = meta?.signerEmail  ?? '';
    const maDoc       = meta?.maDoc        ?? '';
    const ngayKy      = new Date().toLocaleString('vi-VN', {
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit',
    });

    const stampPng = await _createStampImage({
      signerName,
      signerEmail,
      maDoc,
      ngayKy,
      certSubject : certInfo?.subject ?? '',
      certSerial  : certInfo?.serial  ?? 'SIMULATION',
      certIssuer  : certInfo?.issuer  ?? 'Demo CA',
    });

    // Preview stamp trong overlay
    _renderStampPreview(stampPng);

    report(40, 'Nhúng stamp PNG vào PDF…');

    /* ── BƯỚC 4: Embed PNG image vào PDFDocument ────────────────────────── */
    const stampImageBytes = _base64ToUint8Array(stampPng.replace(/^data:image\/png;base64,/, ''));
    const embeddedImg     = await pdfDoc.embedPng(stampImageBytes);

    report(55, 'Nhúng chữ ký vào từng trang…');

    /* ── BƯỚC 5: Chèn stamp vào trang PDF theo tọa độ ──────────────────── */
    // Nếu không có coordinates → đặt 1 stamp mặc định ở tất cả trang
    const frames = (coordinates && coordinates.length > 0)
      ? coordinates
      : _getDefaultCoordinates(pages);

    let stampsPlaced = 0;
    for (const frame of frames) {
      const pageIdx = (frame.page ?? 1) - 1; // Convert 1-based → 0-based
      if (pageIdx < 0 || pageIdx >= totalPages) continue;

      const page     = pages[pageIdx];
      const { width: pageW, height: pageH } = page.getSize();

      // pdf-lib gốc tọa độ dưới-trái, y tăng lên trên
      // sigFrame đã lưu xPt, yPt theo hệ pdf.js (gốc dưới-trái) — dùng trực tiếp
      const x = frame.xPt ?? 50;
      const y = frame.yPt ?? 50;
      const w = frame.wPt ?? 160;
      const h = frame.hPt ?? 56;

      // Clamp trong biên trang
      const clampedX = Math.max(0, Math.min(x, pageW - w));
      const clampedY = Math.max(0, Math.min(y, pageH - h));

      // Vẽ background trắng mờ + viền
      page.drawRectangle({
        x       : clampedX - 2,
        y       : clampedY - 2,
        width   : w + 4,
        height  : h + 4,
        borderColor: rgb(0.1, 0.33, 0.86),
        borderWidth: 0.8,
        color   : rgb(0.97, 0.98, 1.0),
        opacity : 0.92,
      });

      // Chèn stamp image
      page.drawImage(embeddedImg, {
        x       : clampedX,
        y       : clampedY,
        width   : w,
        height  : h,
        opacity : 0.96,
      });

      // Đường viền xanh mỏng bao quanh stamp
      page.drawRectangle({
        x       : clampedX,
        y       : clampedY,
        width   : w,
        height  : h,
        borderColor: rgb(0.1, 0.33, 0.86),
        borderWidth: 0.5,
        opacity : 0.85,
        color   : rgb(1, 1, 1),
        opacity : 0,
      });

      stampsPlaced++;
      report(55 + Math.round((stampsPlaced / frames.length) * 20), `Nhúng chữ ký trang ${frame.page ?? pageIdx+1}…`);
    }

    report(75, 'Nhúng metadata chứng thư…');

    /* ── BƯỚC 6: Nhúng metadata chứng thư vào Document Info ─────────────── */
    pdfDoc.setTitle(meta?.tenTaiLieu ?? 'Tài liệu đã ký');
    pdfDoc.setAuthor(signerName);
    pdfDoc.setSubject(`Ký số bởi ${signerName} · Mã TL: ${maDoc}`);
    pdfDoc.setKeywords([
      'eSign', 'digital-signature', maDoc,
      certInfo?.serial ?? '', certInfo?.issuer ?? '',
    ]);
    pdfDoc.setProducer('eSign WebApp — pdf-lib 1.17');
    pdfDoc.setCreator('eSign System');
    pdfDoc.setModificationDate(new Date());

    /* Nhúng XMP metadata tùy chỉnh chứa thông tin chứng thư (plain XML) */
    const xmp = _buildXmpMetadata({
      signerName, signerEmail, maDoc, ngayKy,
      certInfo : certInfo ?? {},
      stampsPlaced,
    });
    pdfDoc.setMetadata(xmp);

    report(88, 'Xuất file PDF…');

    /* ── BƯỚC 7: Xuất PDF → Uint8Array → base64 ────────────────────────── */
    const signedBytes = await pdfDoc.save({
      useObjectStreams    : true,     // Nén output
      addDefaultPage      : false,
      objectsPerTick      : 50,      // Tránh block UI thread
      updateFieldAppearances: false,
    });

    const signedBase64 = _uint8ArrayToBase64(signedBytes);

    report(100, 'Hoàn tất! PDF đã ký xong.');

    // Lưu để user có thể download
    _lastSignedBytes = signedBytes;
    _lastFileName    = _buildSignedFileName(meta?.tenTaiLieu ?? 'TaiLieu', maDoc);

    // Hiện banner download
    _showDownloadBanner(signedBytes.length, _lastFileName);

    return { base64: signedBase64, bytes: signedBytes, fileName: _lastFileName };
  }

  /* ════════════════════════════════════════════════════════════════════════
     TẠO STAMP IMAGE TRÊN CANVAS 2D
  ════════════════════════════════════════════════════════════════════════ */

  /**
   * Vẽ hình ảnh chữ ký trực quan trên HTML Canvas và xuất PNG base64.
   *
   * Layout của stamp (280 × 90 px):
   * ┌─────────────────────────────────────────────┐
   * │ [🖊] ĐÃ KÝ SỐ / DIGITALLY SIGNED            │
   * │      Bởi: NGUYEN THANH TUNG                  │
   * │      Ngày: 10/07/2025 14:30                  │
   * │      CA: VNPT-CA  |  Mã TL: HĐ-2025-001      │
   * │      Serial: A1:B2:C3... [QR mini]           │
   * └─────────────────────────────────────────────┘
   *
   * @param {Object} info - { signerName, signerEmail, maDoc, ngayKy,
   *                          certSubject, certSerial, certIssuer }
   * @returns {Promise<string>} data:image/png;base64,...
   */
  async function _createStampImage(info) {
    const W = 400;  // px chiều rộng canvas
    const H = 120;  // px chiều cao canvas
    const DPR = 2;  // Device pixel ratio để rõ nét hơn

    const canvas  = document.createElement('canvas');
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    // ── Nền & viền ──────────────────────────────────────────────────────────
    // Gradient nền trắng → xanh rất nhạt
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0,   'rgba(240, 249, 255, 0.98)');
    grad.addColorStop(1,   'rgba(219, 234, 254, 0.95)');
    ctx.fillStyle = grad;
    _roundRect(ctx, 0, 0, W, H, 6);
    ctx.fill();

    // Viền xanh đậm
    ctx.strokeStyle = '#1A56DB';
    ctx.lineWidth   = 1.5;
    _roundRect(ctx, 0.75, 0.75, W - 1.5, H - 1.5, 5.5);
    ctx.stroke();

    // Dải màu bên trái (accent bar)
    ctx.fillStyle = '#1A56DB';
    _roundRect(ctx, 0, 0, 5, H, 5);
    ctx.fill();

    // ── Icon bút ký ──────────────────────────────────────────────────────────
    ctx.font      = 'bold 22px sans-serif';
    ctx.fillStyle = '#1A56DB';
    ctx.fillText('✍', 14, 34);

    // ── Tiêu đề "ĐÃ KÝ SỐ" ──────────────────────────────────────────────────
    ctx.font      = 'bold 13px "Be Vietnam Pro", Arial, sans-serif';
    ctx.fillStyle = '#1E429F';
    ctx.fillText('ĐÃ KÝ SỐ  /  DIGITALLY SIGNED', 46, 20);

    // Đường kẻ ngang phân cách
    ctx.strokeStyle = '#93C5FD';
    ctx.lineWidth   = 0.8;
    ctx.beginPath();
    ctx.moveTo(46, 25);
    ctx.lineTo(W - 14, 25);
    ctx.stroke();

    // ── Tên người ký ─────────────────────────────────────────────────────────
    ctx.font      = 'bold 13px "Be Vietnam Pro", Arial, sans-serif';
    ctx.fillStyle = '#111827';
    const displayName = (info.signerName ?? 'N/A').toUpperCase();
    ctx.fillText(`Bởi: ${displayName}`, 46, 42);

    // ── Ngày ký ───────────────────────────────────────────────────────────────
    ctx.font      = '11px "Be Vietnam Pro", Arial, sans-serif';
    ctx.fillStyle = '#374151';
    ctx.fillText(`Ngày ký: ${info.ngayKy ?? '—'}`, 46, 58);

    // ── CA & Mã tài liệu ─────────────────────────────────────────────────────
    ctx.font      = '11px "Be Vietnam Pro", Arial, sans-serif';
    ctx.fillStyle = '#6B7280';
    const caShort = (info.certIssuer ?? '').replace(/Root Certificate.*$/i, '').trim() || 'eSign CA';
    ctx.fillText(`CA: ${caShort}`, 46, 73);
    ctx.fillStyle = '#1D4ED8';
    ctx.fillText(`Mã TL: ${info.maDoc ?? '—'}`, 200, 73);

    // ── Serial số ngắn (8 ký tự đầu) ────────────────────────────────────────
    ctx.font      = '10px monospace';
    ctx.fillStyle = '#9CA3AF';
    const serialShort = (info.certSerial ?? 'DEMO').slice(0, 18);
    ctx.fillText(`S/N: ${serialShort}`, 46, 88);

    // ── Dấu tích xác minh ────────────────────────────────────────────────────
    ctx.font      = 'bold 11px sans-serif';
    ctx.fillStyle = '#059669';
    ctx.fillText('✓ Hợp lệ', W - 64, 88);

    // ── Watermark chéo nhạt ──────────────────────────────────────────────────
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.rotate(-15 * Math.PI / 180);
    ctx.font      = 'bold 42px Arial, sans-serif';
    ctx.fillStyle = 'rgba(26, 86, 219, 0.04)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ĐÃ KÝ', 0, 0);
    ctx.restore();

    return canvas.toDataURL('image/png');
  }

  /** Vẽ hình chữ nhật bo góc trên Canvas */
  function _roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  /** Hiển thị stamp preview vào canvas nhỏ trong overlay */
  function _renderStampPreview(stampDataUrl) {
    const previewBox = document.getElementById('stamp-preview-box');
    const canvas     = document.getElementById('stamp-preview-canvas');
    if (!previewBox || !canvas) return;

    previewBox.classList.add('show');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Scale để vừa canvas preview
      const scale = canvas.width / img.width;
      canvas.height = img.height * scale;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    };
    img.src = stampDataUrl;
  }

  /* ════════════════════════════════════════════════════════════════════════
     XMP METADATA
  ════════════════════════════════════════════════════════════════════════ */

  /**
   * Tạo chuỗi XMP metadata XML nhúng thông tin chứng thư số.
   * Tuân theo chuẩn Adobe XMP + PDF/A extension.
   */
  function _buildXmpMetadata({ signerName, signerEmail, maDoc, ngayKy, certInfo, stampsPlaced }) {
    const now = new Date().toISOString();
    // QUAN TRỌNG: Không dùng template literal chứa `<?` và `?>` trực tiếp —
    // GAS template engine sẽ hiểu nhầm là scriptlet và gây lỗi parse toàn bộ file JS.
    // Giải pháp: dùng string concatenation để tránh các ký tự này trong source code.
    const xpacketOpen  = '<' + '?xpacket begin="\uFEFF" id="W5M0MpCehiHzreSzNTczkc9d"?' + '>';
    const xpacketClose = '<' + '?xpacket end="w"?' + '>';

    return xpacketOpen + `
<x:xmpmeta xmlns:x="adobe:ns:meta/">
  <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">
    <rdf:Description rdf:about=""
        xmlns:dc="http://purl.org/dc/elements/1.1/"
        xmlns:xmp="http://ns.adobe.com/xap/1.0/"
        xmlns:esign="http://esign.vn/ns/1.0/">
      <dc:creator><rdf:Seq><rdf:li>${_escXml(signerName)}</rdf:li></rdf:Seq></dc:creator>
      <dc:subject><rdf:Bag>
        <rdf:li>digital-signature</rdf:li>
        <rdf:li>${_escXml(maDoc)}</rdf:li>
      </rdf:Bag></dc:subject>
      <xmp:ModifyDate>${now}</xmp:ModifyDate>
      <xmp:MetadataDate>${now}</xmp:MetadataDate>
      <xmp:CreatorTool>eSign WebApp pdf-lib 1.17</xmp:CreatorTool>
      <esign:signerName>${_escXml(signerName)}</esign:signerName>
      <esign:signerEmail>${_escXml(signerEmail)}</esign:signerEmail>
      <esign:signDate>${now}</esign:signDate>
      <esign:documentId>${_escXml(maDoc)}</esign:documentId>
      <esign:stampsPlaced>${stampsPlaced}</esign:stampsPlaced>
      <esign:certSubject>${_escXml(certInfo.subject ?? '')}</esign:certSubject>
      <esign:certIssuer>${_escXml(certInfo.issuer  ?? '')}</esign:certIssuer>
      <esign:certSerial>${_escXml(certInfo.serial  ?? '')}</esign:certSerial>
      <esign:certValidTo>${_escXml(certInfo.validTo ?? '')}</esign:certValidTo>
      <esign:certAlgorithm>${_escXml(certInfo.algorithm ?? 'SHA256withRSA')}</esign:certAlgorithm>
      <esign:signatureType>digital-signature</esign:signatureType>
      <esign:complianceLevel>eSign-Basic-v1</esign:complianceLevel>
    </rdf:Description>
  </rdf:RDF>
</x:xmpmeta>
` + xpacketClose;
  }

  function _escXml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&apos;');
  }

  /* ════════════════════════════════════════════════════════════════════════
     TỌA ĐỘ MẶC ĐỊNH (khi không có sigFrames)
  ════════════════════════════════════════════════════════════════════════ */

  /**
   * Đặt 1 stamp ở góc dưới-phải trang đầu tiên nếu không có coordinates.
   * @param {PDFPage[]} pages
   */
  function _getDefaultCoordinates(pages) {
    if (!pages || pages.length === 0) return [];
    const { width: w, height: h } = pages[0].getSize();
    return [{
      page : 1,
      xPt  : w - 190,   // 190pt từ phải
      yPt  : 40,         // 40pt từ dưới
      wPt  : 160,
      hPt  : 56,
      label: 'Chữ ký 1',
    }];
  }

  /* ════════════════════════════════════════════════════════════════════════
     UTILITIES
  ════════════════════════════════════════════════════════════════════════ */

  /** base64 → Uint8Array */
  function _base64ToUint8Array(base64) {
    const cleanB64 = base64.replace(/^data:[^;]+;base64,/, '');
    const binary   = atob(cleanB64);
    const bytes    = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  /** Uint8Array → base64 */
  function _uint8ArrayToBase64(bytes) {
    let binary = '';
    const chunk = 8192;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
    }
    return btoa(binary);
  }

  /** Tạo tên file đã ký */
  function _buildSignedFileName(tenTaiLieu, maDoc) {
    const safe = (tenTaiLieu ?? 'TaiLieu')
      .replace(/[^\wÀ-ỹ\s\-]/g, '')
      .trim()
      .substring(0, 40)
      .replace(/\s+/g, '_');
    const date = new Date().toLocaleDateString('vi-VN').replace(/\//g, '-');
    return `[SIGNED]_${safe}_${maDoc}_${date}.pdf`;
  }

  /* ── Download signed PDF ──────────────────────────────────────────────── */

  /** Hiện banner download trong token overlay */
  function _showDownloadBanner(sizeBytes, fileName) {
    const banner = document.getElementById('signed-pdf-banner');
    const desc   = document.getElementById('spb-file-desc');
    if (!banner) return;

    const sizeMB = (sizeBytes / 1048576).toFixed(2);
    if (desc) desc.textContent = `${fileName}  ·  ${sizeMB} MB`;
    banner.classList.add('show');

    // Bind download button (một lần)
    const dlBtn = document.getElementById('btn-download-signed-pdf');
    if (dlBtn && !dlBtn.dataset.bound) {
      dlBtn.dataset.bound = '1';
      dlBtn.addEventListener('click', downloadLast);
    }

    const pvBtn = document.getElementById('btn-preview-signed-pdf');
    if (pvBtn && !pvBtn.dataset.bound) {
      pvBtn.dataset.bound = '1';
      pvBtn.addEventListener('click', previewLast);
    }
  }

  /** Tải xuống file PDF đã ký */
  function downloadLast() {
    if (!_lastSignedBytes) {
      Toast.auth.missingInfo('File PDF đã ký');
      return;
    }
    const blob = new Blob([_lastSignedBytes], { type: 'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = _lastFileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    console.info(`[PdfStamper] Downloaded: ${_lastFileName} (${_lastSignedBytes.length} bytes)`);
    Toast.save.success(_lastFileName);
  }

  /** Xem trước file PDF đã ký trong tab mới */
  function previewLast() {
    if (!_lastSignedBytes) {
      Toast.auth.missingInfo('File PDF đã ký');
      return;
    }
    const blob = new Blob([_lastSignedBytes], { type: 'application/pdf' });
    const url  = URL.createObjectURL(blob);
    window.open(url, '_blank', 'noopener,noreferrer');
    // Revoke sau 60s để tránh memory leak
    setTimeout(() => URL.revokeObjectURL(url), 60_000);
  }

  /* ── Public API ───────────────────────────────────────────────────────── */
  return {
    stampAndSign,
    downloadLast,
    previewLast,
    getLastBytes : () => _lastSignedBytes,
    getLastName  : () => _lastFileName,
  };

})(); // end PdfStamper


/* ══════════════════════════════════════════════════════════════════════════════
   USB TOKEN SIGNER  v1.0  —  Luồng ký số qua Middleware máy trạm
   ─────────────────────────────────────────────────────────────────────────────
   Kiến trúc giao tiếp (ưu tiên giảm dần):
     1. WebSocket  ws://localhost:9000   — 2-way realtime (cắm token, nhập PIN)
     2. HTTP/fetch http://localhost:8080 — REST polling (fallback nếu WS lỗi)

     → { type: 'DETECT_TOKEN' }

     POST /api/pdf/sign           → { signedBase64 }
══════════════════════════════════════════════════════════════════════════════ */
const UsbTokenSigner = (() => {

  /* ── Cấu hình Middleware endpoints ────────────────────────────────────── */
  const PROVIDERS = {

    viettel: { ws: 'ws://localhost:9001',   http: 'http://localhost:8081', name: 'Viettel-CA' },
    bkav   : { ws: 'ws://localhost:9002',   http: 'http://localhost:8082', name: 'BKAV-CA'    },

  };

  const TIMEOUT_DETECT_MS  = 60_000;  // Chờ user cắm token tối đa 60s
  const TIMEOUT_SIGN_MS    = 120_000; // Chờ ký tối đa 2 phút
  const RETRY_MAX          = 3;       // Số lần thử kết nối lại

  let _resolveSign   = null;    // Promise resolve
  let _rejectSign    = null;    // Promise reject

  let _countdownTimer= null;
  let _progressTimer = null;
  let _certInfo      = null;    // Thông tin chứng thư đọc được
  let _lastPayload   = null;    // Lưu để retry

  /* ── DOM helpers ──────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const _log = (msg, type = '') => {
    const el = $('token-log-content');
    if (!el) return;

    entry.className = `token-log-entry ${type}`;

    el.appendChild(entry);
    el.scrollTop = el.scrollHeight;
    console.log(`[UsbToken] ${msg}`);
  };

  /* ── Phase UI helper ──────────────────────────────────────────────────── */
  const PHASES = {
    detecting: {
      iconClass : 'detecting',
      iconI     : 'bi-usb-drive-fill',
      title     : 'Đang phát hiện USB Token…',
      desc      : 'Vui lòng cắm USB Token vào cổng USB trên máy tính và đảm bảo phần mềm Middleware đang chạy.',

      iconI     : 'bi-wifi',
      title     : 'Đang kết nối Middleware…',
      desc      : 'Đang thiết lập kết nối tới phần mềm ký số trên máy tính.',
