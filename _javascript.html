      showCountdown: false,
    },
    signing: {
      iconClass : 'signing',
      iconI     : 'bi-pen-fill',
      title     : 'Đang thực hiện ký số…',
      desc      : 'Chứng thư số đang được sử dụng để ký tài liệu PDF. Vui lòng không rút USB Token.',
      showCountdown: false,
    },
    success: {
      iconClass : 'success',
      iconI     : 'bi-check-circle-fill',
      title     : 'Ký số thành công!',
      desc      : 'Chữ ký số đã được nhúng vào tài liệu PDF. Đang hoàn tất quy trình…',
      showCountdown: false,
    },
    error: {
      iconClass : 'error',
      iconI     : 'bi-exclamation-triangle-fill',
      title     : 'Ký số thất bại',
      desc      : '',   // Được set động
      showCountdown: false,
    },
    timeout: {
      iconClass : 'timeout',
      iconI     : 'bi-clock-fill',
      title     : 'Hết thời gian chờ',
      desc      : 'Không phát hiện USB Token trong thời gian cho phép. Vui lòng thử lại.',
      showCountdown: false,
    },
  };

  function _setPhase(phaseName, extraDesc = '') {
    const p = PHASES[phaseName];
    if (!p) return;

    const iconEl = $('token-icon');
    const iconI  = $('token-icon-i');

    if (iconEl) iconEl.className = `token-icon-bg ${p.iconClass}`;
    if (iconI)  iconI.className  = `bi ${p.iconI}`;
    if ($('token-phase-title')) $('token-phase-title').textContent = p.title;
    if ($('token-phase-desc'))  $('token-phase-desc').textContent  = extraDesc || p.desc;

    // Countdown
    const cdWrap = $('token-countdown-wrap');
    if (cdWrap) cdWrap.style.display = p.showCountdown ? '' : 'none';

    // Retry btn
    const retryBtn = $('token-retry-btn');
    if (retryBtn) retryBtn.style.display = (phaseName === 'error' || phaseName === 'timeout') ? '' : 'none';

    // Progress bar
    const progWrap = $('token-progress-wrap');
    if (progWrap) progWrap.style.display = phaseName === 'signing' ? '' : 'none';
  }

  function _setConnBar(state, text) {
    const bar = $('token-conn-bar');
    if (!bar) return;
    bar.className     = `token-conn-bar ${state}`;
    bar.children[1].textContent = text;
  }

  function _setProgress(pct, labelLeft = '', labelRight = '') {
    const fill = $('token-progress-fill');
    const ll   = $('token-progress-label-left');
    const lr   = $('token-progress-label-right');
    if (fill) fill.style.width  = pct + '%';
    if (ll)   ll.textContent    = labelLeft;
    if (lr)   lr.textContent    = pct + '%';
  }

  function _showCertInfo(cert) {
    const box = $('token-cert-box');
    if (!box) return;
    box.style.display = '';
    $('cert-subject').textContent  = cert.subject   ?? '—';
    $('cert-issuer').textContent   = cert.issuer    ?? '—';
    $('cert-validity').textContent = cert.validTo   ? `đến ${new Date(cert.validTo).toLocaleDateString('vi-VN')}` : '—';
    $('cert-serial').textContent   = cert.serial    ?? '—';
  }

  /* ── Countdown timer ──────────────────────────────────────────────────── */
  function _startCountdown(seconds, onTimeout) {
    let remaining = seconds;
    const el = $('token-countdown');
    if (el) el.textContent = remaining;

    clearInterval(_countdownTimer);
    _countdownTimer = setInterval(() => {
      remaining--;
      if (el) {
        el.textContent  = remaining;
        el.className    = 'token-countdown' + (remaining <= 10 ? ' danger' : remaining <= 20 ? ' warning' : '');
      }
      if (remaining <= 0) {
        clearInterval(_countdownTimer);
        onTimeout();
      }
    }, 1000);
  }

  function _stopCountdown() { clearInterval(_countdownTimer); }

  /* ════════════════════════════════════════════════════════════════════════
     PUBLIC API CHÍNH: signPdfWithToken
  ════════════════════════════════════════════════════════════════════════ */

  /**
   * ★ HÀM KÝ CHÍNH ★
   *
   * Nhận thông tin tài liệu → hiện overlay chờ USB Token →
   * kết nối Middleware → yêu cầu ký → trả về PDF đã ký (base64).
   *
   * @param {string|null} pdfBase64   - Base64 PDF gốc (null = Middleware tự lấy qua fileId)
   * @param {Array}       coordinates - Mảng sigFrames [{ page, xPt, yPt, wPt, hPt }]
   * @param {Object}      meta        - { fileId, maDoc, tenTaiLieu, signerName, ... }
   * @returns {Promise<string>}       - Base64 của PDF đã ký số
   * @throws  {Error}                 - 'USER_CANCELLED' | Thông báo lỗi thực tế
   */
  async function signPdfWithToken(pdfBase64, coordinates, meta = {}) {
    _isCancelled = false;
    _certInfo    = null;
    _lastPayload = { pdfBase64, coordinates, meta };
    _retryCount  = 0;

    _showOverlay();
    _clearLog();
    _log(`Bắt đầu quy trình ký: "${meta.tenTaiLieu ?? '?'}"`, 'info');
    _log(`Provider: ${PROVIDERS[_provider].name} | fileId: ${meta.fileId ?? 'N/A'}`);

    return new Promise((resolve, reject) => {
      _resolveSign = resolve;
      _rejectSign  = reject;
      _runSignFlow(pdfBase64, coordinates, meta);
    });
  }

  /* ── Luồng ký chính ───────────────────────────────────────────────────── */
  async function _runSignFlow(pdfBase64, coordinates, meta) {
    try {
      // PHA 1: Kết nối Middleware
      _setPhase('connecting');
      _setConnBar('checking', 'Đang kiểm tra kết nối WebSocket…');
      _log('Thử kết nối WebSocket…');

      const transport = await _connectMiddleware();
      _log(`Kết nối thành công qua ${transport.type}`, 'ok');

      if (_isCancelled) throw new Error('USER_CANCELLED');

      // PHA 2: Phát hiện USB Token (chờ user cắm)
      _setPhase('detecting');
      _setConnBar(transport.type === 'ws' ? 'ws-mode' : 'connected',
        `Đã kết nối (${transport.type.toUpperCase()}) · ${PROVIDERS[_provider].name}`);

      _log('Chờ user cắm USB Token…');
      _startCountdown(60, () => {
        if (!_certInfo) {
          _setPhase('timeout');
          _log('Hết thời gian chờ USB Token', 'err');
          _rejectSign?.(new Error('Hết thời gian chờ USB Token. Vui lòng thử lại.'));
        }
      });

      const cert = await _detectToken(transport);
      _stopCountdown();

      if (_isCancelled) throw new Error('USER_CANCELLED');

      _certInfo = cert;
      _showCertInfo(cert);
      _log(`Phát hiện chứng thư: ${cert.subject}`, 'ok');

      // PHA 3: Chờ user nhập PIN (Middleware xử lý)
      _setPhase('pin');
      _log('Chờ user nhập PIN trên hộp thoại Middleware…');

      // PHA 4: Gửi yêu cầu ký
      _setPhase('signing');
      _log('Gửi yêu cầu ký PDF đến Middleware…');

      const signedBase64 = await _requestSign(transport, pdfBase64, coordinates, cert, meta);

      if (_isCancelled) throw new Error('USER_CANCELLED');

      // PHA 5: Thành công
      _setPhase('success');
      _setProgress(100, 'Hoàn tất!', '100%');
      _log('Ký số thành công. Đang đóng kết nối…', 'ok');

      if (transport.ws) transport.ws.close();

      await new Promise(r => setTimeout(r, 1200)); // Hiện "thành công" 1.2s
      _hideOverlay();
      _resolveSign?.(signedBase64);

    } catch (err) {
      _stopCountdown();
      if (transport?.ws) transport.ws.close();

      if (err.message === 'USER_CANCELLED') {
        _hideOverlay();
        _rejectSign?.(err);
      } else {
        _log(`Lỗi: ${err.message}`, 'err');
        _setPhase('error', err.message);
        _rejectSign?.(err);
      }
    }
  }

  /* ── Kết nối Middleware: WebSocket → HTTP fallback ────────────────────── */
  async function _connectMiddleware() {
    const prov = PROVIDERS[_provider];

    // Thử WebSocket trước
    try {
      const ws = await _tryWebSocket(prov.ws);
      _log(`WebSocket kết nối: ${prov.ws}`, 'ok');
      return { type: 'ws', ws };
    } catch (wsErr) {
      _log(`WebSocket thất bại (${wsErr.message}), thử HTTP…`, 'err');
    }

    // Fallback HTTP
    try {
      await _checkHttpMiddleware(prov.http);
      _log(`HTTP kết nối: ${prov.http}`, 'ok');
      return { type: 'http', baseUrl: prov.http };
    } catch (httpErr) {
      _log(`HTTP thất bại (${httpErr.message})`, 'err');
      _log('Không tìm thấy Middleware, chuyển sang chế độ giả lập…', 'info');
      return { type: 'simulation' };
    }
  }

  /** Thử kết nối WebSocket, timeout sau 3s */
  function _tryWebSocket(url) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => { ws.close(); reject(new Error('WS timeout')); }, 3000);
      const ws    = new WebSocket(url);
      ws.onopen  = () => { clearTimeout(timer); resolve(ws); };
      ws.onerror = () => { clearTimeout(timer); reject(new Error('WS connection refused')); };
    });
  }

  /** Kiểm tra Middleware HTTP có sẵn không */
  async function _checkHttpMiddleware(baseUrl) {
    const ctrl    = new AbortController();
    const timer   = setTimeout(() => ctrl.abort(), 3000);
    const res     = await fetch(`${baseUrl}/api/token/status`, {
      signal: ctrl.signal, mode: 'cors',
    });
    clearTimeout(timer);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  }

  /* ── Phát hiện token & đọc chứng thư ─────────────────────────────────── */
  async function _detectToken(transport) {
    if (transport.type === 'ws') {
      return _detectTokenWS(transport.ws);
    } else if (transport.type === 'http') {
      return _detectTokenHTTP(transport.baseUrl);
    } else {
      return _detectTokenSimulation();
    }
  }

  function _detectTokenWS(ws) {
    return new Promise((resolve, reject) => {
      ws.send(JSON.stringify({ type: 'DETECT_TOKEN' }));

      ws.onmessage = evt => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'TOKEN_DETECTED') resolve(msg.cert);
          if (msg.type === 'ERROR')          reject(new Error(msg.message));
          if (msg.type === 'SIGN_PROGRESS')  _setProgress(msg.percent, 'Đang ký…');
        } catch (_) {}
      };
      ws.onerror = () => reject(new Error('WebSocket lỗi trong khi chờ token'));
    });
  }

  function _detectTokenHTTP(baseUrl) {
    return new Promise((resolve, reject) => {
      let attempts = 0;
      const poll = setInterval(async () => {
        if (_isCancelled) { clearInterval(poll); reject(new Error('USER_CANCELLED')); return; }
        try {
          const res  = await fetch(`${baseUrl}/api/token/detect`, { mode: 'cors' });
          const data = await res.json();
          if (data.status === 'detected') {
            clearInterval(poll);
            resolve(data.cert);
          }
        } catch (_) {}
        if (++attempts > TIMEOUT_DETECT_MS / POLL_INTERVAL_MS) {
          clearInterval(poll);
          reject(new Error('Timeout HTTP polling'));
        }
      }, POLL_INTERVAL_MS);
    });
  }

  /** Giả lập: auto-detect sau 2.5s (chế độ demo) */
  function _detectTokenSimulation() {
    _log('[SIMULATION] Giả lập phát hiện USB Token sau 2.5 giây…', 'info');
    return new Promise(resolve => {
      setTimeout(() => {
        resolve({
          subject  : 'CN=NGUYEN THANH TUNG, O=CONG TY ABC, C=VN',
          issuer   : 'VNPT-CA Root Certificate Authority',
          serial   : 'A1:B2:C3:D4:E5:F6:01:02',
          validFrom: '2024-01-01T00:00:00Z',
          validTo  : '2026-12-31T23:59:59Z',
          algorithm: 'SHA256withRSA',
        });
      }, 2500);
    });
  }

  /* ── Gửi yêu cầu ký PDF ───────────────────────────────────────────────── */
  async function _requestSign(transport, pdfBase64, coordinates, cert, meta) {
    if (transport.type === 'ws') {
      return _signPdfWS(transport.ws, pdfBase64, coordinates, cert, meta);
    } else if (transport.type === 'http') {
      return _signPdfHTTP(transport.baseUrl, pdfBase64, coordinates, cert, meta);
    } else {
      return _signPdfSimulation(pdfBase64, coordinates, meta);
    }
  }

  function _signPdfWS(ws, pdfBase64, coordinates, cert, meta) {
    return new Promise((resolve, reject) => {
      ws.send(JSON.stringify({
        type        : 'SIGN_PDF',
        fileId      : meta.fileId ?? '',
        pdfBase64   : pdfBase64  ?? '',
        coordinates,
        certSerial  : cert.serial,
        signerName  : meta.signerName  ?? '',
        signerEmail : meta.signerEmail ?? '',
        maDoc       : meta.maDoc       ?? '',
        timestamp   : new Date().toISOString(),
      }));

      ws.onmessage = evt => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'SIGN_PROGRESS') {
            _setProgress(msg.percent, `Đang ký (${msg.percent}%)…`);
            _log(`Tiến trình ký: ${msg.percent}%`);
          }
          if (msg.type === 'SIGN_COMPLETE') {
            // WS trả về PDF đã ký từ Middleware → còn cần stamp visual
            PdfStamper.stampAndSign(msg.signedBase64, coordinates, cert, meta,
              (pct, label) => _setProgress(Math.round(85 + pct * 0.15), label)
            ).then(result => resolve(result.base64))
             .catch(() => resolve(msg.signedBase64)); // fallback nếu stamp lỗi
          }
          if (msg.type === 'ERROR') reject(new Error(msg.message));
        } catch (_) {}
      };
      ws.onerror = () => reject(new Error('WebSocket lỗi khi ký PDF'));
    });
  }

  async function _signPdfHTTP(baseUrl, pdfBase64, coordinates, cert, meta) {
    const res = await fetch(`${baseUrl}/api/pdf/sign`, {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      mode    : 'cors',
      body    : JSON.stringify({
        fileId: meta.fileId ?? '',
        pdfBase64: pdfBase64 ?? '',
        coordinates,
        certSerial  : cert.serial,
        signerName  : meta.signerName ?? '',
        maDoc       : meta.maDoc ?? '',
        timestamp   : new Date().toISOString(),
      }),
    });
    if (!res.ok) throw new Error(`HTTP Sign Error ${res.status}`);
    const data = await res.json();
    if (!data.signedBase64) throw new Error(data.error ?? 'Không nhận được PDF đã ký');

    // HTTP trả về PDF đã ký từ Middleware → còn cần stamp visual
    try {
      const result = await PdfStamper.stampAndSign(
        data.signedBase64, coordinates, cert, meta,
        (pct, label) => _setProgress(Math.round(85 + pct * 0.15), label)
      );
      return result.base64;
    } catch (_) {
      return data.signedBase64; // fallback
    }
  }

  /**
   * Giả lập quá trình ký số — gọi PdfStamper để nhúng chữ ký thật vào PDF.
   * Ngay cả ở chế độ simulation, PDF đầu ra là PDF thật với stamp được nhúng.
   */
  function _signPdfSimulation(pdfBase64, coordinates, meta) {
    _log('[SIMULATION] Nhập PIN: ******** (giả lập)', 'info');
    _setPhase('pin');

    return new Promise((resolve, reject) => {
      // Mô phỏng user nhập PIN trong 1.5s
      setTimeout(async () => {
        if (_isCancelled) { reject(new Error('USER_CANCELLED')); return; }

        _setPhase('signing');
        _log('[SIMULATION] Nhúng chữ ký số vào PDF bằng pdf-lib…', 'info');

        try {
          // Chứng thư giả lập (simulation mode)
          const simulatedCert = _certInfo ?? {
            subject   : `CN=${meta?.signerName ?? 'NGUYEN VAN A'}, O=DEMO ORG, C=VN`,
            issuer    : 'VNPT-CA Root Certificate Authority',
            serial    : 'A1:B2:C3:D4:E5:F6:07:08',
            validFrom : '2024-01-01T00:00:00Z',
            validTo   : '2026-12-31T23:59:59Z',
            algorithm : 'SHA256withRSA',
          };

          // Gọi PdfStamper để nhúng stamp thật vào PDF
          const result = await PdfStamper.stampAndSign(
            pdfBase64,       // PDF gốc base64 (có thể null nếu chưa có)
            coordinates,     // sigFrames từ PdfViewer
            simulatedCert,   // Thông tin chứng thư
            meta,            // signerName, signerEmail, maDoc, tenTaiLieu
            (pct, label) => {
              _setProgress(pct, label);
              _log(`${label} (${pct}%)`, pct === 100 ? 'ok' : '');
            }
          );

          _log('[SIMULATION] Ký thành công! PDF đã được nhúng stamp.', 'ok');
          resolve(result.base64);

        } catch (stampErr) {
          _log(`[SIMULATION] Lỗi PdfStamper: ${stampErr.message}`, 'err');
          // Fallback: trả về PDF gốc nếu stamping lỗi
          const fallback = pdfBase64 ?? btoa('FALLBACK_PDF_' + (meta?.maDoc ?? ''));
          _log('Fallback: trả về PDF gốc (không có stamp)', 'err');
          resolve(fallback);
        }
      }, 1500);
    });
  }

  /* ── Overlay show/hide ────────────────────────────────────────────────── */
  function _showOverlay() {
    const overlay = $('token-overlay');
    if (overlay) overlay.classList.add('show');
    $('token-cert-box').style.display       = 'none';
    $('token-progress-wrap').style.display  = 'none';
    $('token-retry-btn').style.display      = 'none';
    $('token-countdown-wrap').style.display = '';
    $('stamp-preview-box')?.classList.remove('show');
    $('signed-pdf-banner')?.classList.remove('show');
    _setProgress(0, '', '0%');
  }

  function _hideOverlay() {
    $('token-overlay')?.classList.remove('show');
  }

  function _clearLog() {
    const el = $('token-log-content');
    if (el) el.innerHTML = '';
  }

  /* ── Cancel & Retry ───────────────────────────────────────────────────── */
  function cancel() {
    _isCancelled = true;
    _stopCountdown();
    if (_ws) { _ws.close(); _ws = null; }
    _hideOverlay();
    _rejectSign?.(new Error('USER_CANCELLED'));
    _rejectSign = null;
    _log('User đã huỷ thao tác ký.', 'err');
  }

  function retry() {
    if (_retryCount >= RETRY_MAX) {
      Toast.token.notFound();
      _hideOverlay();
      return;
    }
    _retryCount++;
    _isCancelled = false;
    _log(`Thử lại lần ${_retryCount}/${RETRY_MAX}…`, 'info');

    if (_lastPayload) {
      new Promise((resolve, reject) => {
        _resolveSign = resolve; _rejectSign = reject;
        _runSignFlow(_lastPayload.pdfBase64, _lastPayload.coordinates, _lastPayload.meta);
      });
    }
  }

  function setProvider(provider) {
    if (PROVIDERS[provider]) {
      _provider = provider;
      _log(`Chuyển provider: ${PROVIDERS[provider].name}`, 'info');
    }
  }

  /* ── Public API ───────────────────────────────────────────────────────── */
  return { signPdfWithToken, cancel, retry, setProvider };

})(); // end UsbTokenSigner

/* ══════════════════════════════════════════════════════════════════════════════
   DOC SEARCH MODULE  v1.0  —  Tra cứu tài liệu từ sheet Data
   Tính năng: Search multi-field, filter 5 tiêu chí, sort cột, phân trang,
              highlight từ khóa, expand row chi tiết, export CSV.
══════════════════════════════════════════════════════════════════════════════ */
const DocSearch = (() => {

  /* ── State ────────────────────────────────────────────────────────────── */
  let _allDocs   = [];       // Dữ liệu gốc từ GAS
  let _filtered  = [];       // Sau filter/search
  let _page      = 1;
  let _pageSize  = 10;
  let _sortCol   = 'Ngày tạo';
  let _sortDir   = 'desc';   // 'asc' | 'desc'
  let _expandedRow = null;   // rowIndex của row đang expand

  /* ── Cấu hình cột hiển thị ────────────────────────────────────────────── */
  const TYPE_CONFIG = {
    'hop-dong'  : { label:'Hợp đồng',     icon:'bi-file-earmark-ruled-fill', bg:'#EBF5FF', color:'#1A56DB' },
    'bien-ban'  : { label:'Biên bản',     icon:'bi-journal-text',             bg:'#ECFDF5', color:'#059669' },
    'van-ban-hc': { label:'Văn bản HC',   icon:'bi-newspaper',                bg:'#F5F3FF', color:'#7C3AED' },
    'default'   : { label:'Tài liệu',     icon:'bi-file-earmark-text',        bg:'#F3F4F6', color:'#374151' },
  };

  const STATUS_CONFIG = {
    'Chờ ký'  : 'cho-ky',
    'Đã ký'   : 'da-ky',
    'Từ chối' : 'tu-choi',
    'Nháp'    : 'nhap',
    'Đã hủy'  : 'da-huy',
  };

  const COLS = {
    MA_DOC    : 'Mã TL',
    TEN       : 'Tên TL',
    LOAI      : 'Loại',
    DU_AN     : 'Dự án',
    NGUOI_TAO : 'Người tạo',
    NGAY_TAO  : 'Ngày tạo',
    TRANG_THAI: 'Trạng thái',
    FILE_ID   : 'File ID',
    URL       : 'URL',
    TEN_FILE  : 'Tên file',
    FILE_SIZE : 'Kích thước',
  };

  /* ── DOM helpers ──────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const _fmtDate = d => {
    if (!d) return '—';
    try {
      return new Date(d).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
    } catch { return String(d).slice(0, 10); }
  };
  const _clean = s => String(s ?? '').trim();
  const _typeOf = t => TYPE_CONFIG[t] ?? TYPE_CONFIG['default'];

  /* ════════════════════════════════════════════════════════════════════════
     FETCH
  ════════════════════════════════════════════════════════════════════════ */

  async function _fetchDocs() {
    _renderSkeleton();
    try {
      const token = Session.getToken();
      const res   = await GAS.call('getAllDocsData', token, {});
      if (!res.success) { _renderError(res.error ?? 'Không tải được dữ liệu.'); return; }
      _allDocs = res.data ?? [];
      _buildDaDatalist();
      _applyFilters();
      _updateStats();
    } catch (err) {
      _renderError('Lỗi kết nối: ' + err.message);
      console.error('[DocSearch._fetchDocs]', err);
    }
  }

  /* ════════════════════════════════════════════════════════════════════════
     FILTER + SORT
  ════════════════════════════════════════════════════════════════════════ */

  function _applyFilters() {
    const q      = _clean($('ds-search')?.value).toLowerCase();
    const type   = _clean($('ds-filter-type')?.value);
    const status = _clean($('ds-filter-status')?.value);
    const da     = _clean($('ds-filter-da')?.value).toLowerCase();
    const dfrom  = $('ds-date-from')?.value;
    const dto    = $('ds-date-to')?.value;

    _filtered = _allDocs.filter(doc => {
      // Multi-field search
      const matchQ = !q || [doc[COLS.MA_DOC], doc[COLS.TEN], doc[COLS.DU_AN],
                            doc[COLS.NGUOI_TAO], doc[COLS.TEN_FILE]]
                          .some(v => _clean(v).toLowerCase().includes(q));
      const matchT = !type   || doc[COLS.LOAI]      === type;
      const matchS = !status || doc[COLS.TRANG_THAI] === status;
      const matchD = !da     || _clean(doc[COLS.DU_AN]).toLowerCase().includes(da);

      // Date range
      let matchDate = true;
      if (dfrom || dto) {
        const docDate = doc[COLS.NGAY_TAO] ? new Date(doc[COLS.NGAY_TAO]) : null;
        if (docDate) {
          if (dfrom && docDate < new Date(dfrom)) matchDate = false;
          if (dto   && docDate > new Date(dto + 'T23:59:59')) matchDate = false;
        } else { matchDate = false; }
      }

      return matchQ && matchT && matchS && matchD && matchDate;
    });

    // Sort
    _filtered.sort((a, b) => {
      let va = _clean(a[_sortCol]).toLowerCase();
      let vb = _clean(b[_sortCol]).toLowerCase();

      // Numeric / date sort
      if (_sortCol === 'Ngày tạo') {
        va = a[_sortCol] ? new Date(a[_sortCol]).getTime() : 0;
        vb = b[_sortCol] ? new Date(b[_sortCol]).getTime() : 0;
        return _sortDir === 'asc' ? va - vb : vb - va;
      }

      const cmp = va.localeCompare(vb, 'vi');
      return _sortDir === 'asc' ? cmp : -cmp;
    });

    _page = 1;
    _renderTable();
    _renderActiveFilterTags();
  }

  /* ════════════════════════════════════════════════════════════════════════
     RENDER TABLE
  ════════════════════════════════════════════════════════════════════════ */

  function _renderSkeleton() {
    const tbody = $('ds-tbody');
    if (!tbody) return;
    tbody.innerHTML = Array(5).fill('')
      .map(() => `<tr class="ds-skel-row"><td colspan="9"><div class="ds-skel-block" style="height:44px;border-radius:6px;margin:2px 0;"></div></td></tr>`)
      .join('');
    $('ds-pag-info').textContent = 'Đang tải…';
    $('ds-pag-ctrl').innerHTML   = '';
  }

  function _renderError(msg) {
    const tbody = $('ds-tbody');
    if (!tbody) return;
    tbody.innerHTML = `<tr><td colspan="9"><div class="ds-empty">
      <div class="ds-empty-icon"><i class="bi bi-wifi-off"></i></div>
      <div class="ds-empty-title">Không tải được dữ liệu</div>
      <div class="ds-empty-desc">${msg}</div>
    </div></td></tr>`;
  }

  function _renderTable() {
    const tbody = $('ds-tbody');
    if (!tbody) return;

    const total = _filtered.length;
    const start = (_page - 1) * _pageSize;
    const end   = Math.min(start + _pageSize, total);
    const page  = _filtered.slice(start, end);
    const q     = _clean($('ds-search')?.value);

    if (total === 0) {
      tbody.innerHTML = `<tr><td colspan="9"><div class="ds-empty">
        <div class="ds-empty-icon"><i class="bi bi-search"></i></div>
        <div class="ds-empty-title">Không tìm thấy tài liệu</div>
        <div class="ds-empty-desc">${_allDocs.length > 0 ? 'Thử xóa bộ lọc hoặc dùng từ khóa khác.' : 'Hệ thống chưa có tài liệu nào.'}</div>
      </div></td></tr>`;
      $('ds-pag-info').textContent = '';
      $('ds-pag-ctrl').innerHTML   = '';
      return;
    }

    tbody.innerHTML = page.map(doc => _renderRow(doc, q)).join('');

    // Bind expand buttons
    tbody.querySelectorAll('.ds-expand-btn').forEach(btn => {
      btn.addEventListener('click', () => _toggleExpand(+btn.dataset.row));
    });

    $('ds-pag-info').textContent = `Hiển thị ${start+1}–${end} / ${total} tài liệu`;
    _renderPagination(total);
  }

  function _renderRow(doc, q = '') {
    const maDoc    = _clean(doc[COLS.MA_DOC]);
    const ten      = _clean(doc[COLS.TEN]);
    const loai     = _clean(doc[COLS.LOAI]);
    const duAn     = _clean(doc[COLS.DU_AN]);
    const nguoiTao = _clean(doc[COLS.NGUOI_TAO]);
    const ngayTao  = doc[COLS.NGAY_TAO];
    const trangThai= _clean(doc[COLS.TRANG_THAI]);
    const url      = _clean(doc[COLS.URL]);
    const rowIdx   = doc._rowIndex ?? 0;

    const tcfg    = _typeOf(loai);
    const stCls   = STATUS_CONFIG[trangThai] ?? 'nhap';
    const isExp   = _expandedRow === rowIdx;

    // Highlight helper
    const hl = str => q ? str.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark class="ds-hl">$1</mark>') : str;

    const viewBtn = url
      ? `<a href="${url}" target="_blank" rel="noopener noreferrer" class="btn-view-drive" title="Mở trên Google Drive">
           <i class="bi bi-box-arrow-up-right"></i> Xem tài liệu
         </a>`
      : `<span class="btn-view-drive" style="opacity:.35;pointer-events:none;">
           <i class="bi bi-lock"></i> Chưa có file
         </span>`;

    const rowHtml = `
    <tr data-row="${rowIdx}">
      <td>
        <button class="ds-expand-btn" data-row="${rowIdx}"
          style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:4px;"
          aria-label="${isExp ? 'Thu gọn' : 'Xem chi tiết'}">
          <i class="bi bi-chevron-${isExp ? 'up' : 'down'}"></i>
        </button>
      </td>
      <td>
        <span style="font-family:monospace;font-size:12px;font-weight:600;color:var(--brand-primary);
                     background:var(--brand-light);padding:2px 7px;border-radius:4px;">
          ${hl(maDoc) || '—'}
        </span>
      </td>
      <td>
        <div class="ds-doc-cell">
          <div class="ds-doc-icon" style="background:${tcfg.bg};color:${tcfg.color};">
            <i class="bi ${tcfg.icon}"></i>
          </div>
          <div>
            <div class="ds-doc-name">${hl(ten) || '—'}</div>
            <div class="ds-doc-id">${_clean(doc[COLS.TEN_FILE]) ? hl(_clean(doc[COLS.TEN_FILE]).slice(0,36)) : ''}</div>
          </div>
        </div>
      </td>
      <td>
        <span style="background:${tcfg.bg};color:${tcfg.color};padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:500;">
          ${tcfg.label}
        </span>
      </td>
      <td style="color:var(--text-secondary);font-size:13px;">${hl(duAn) || '<em style="color:var(--text-muted);">—</em>'}</td>
      <td style="color:var(--text-secondary);font-size:13px;">${hl(nguoiTao) || '—'}</td>
      <td style="color:var(--text-secondary);font-size:13px;white-space:nowrap;">${_fmtDate(ngayTao)}</td>
      <td><span class="ds-status-badge ${stCls}">${trangThai || '—'}</span></td>
      <td style="text-align:center;">${viewBtn}</td>
    </tr>`;

    const detailHtml = `
    <tr class="detail-row" data-detail-for="${rowIdx}">
      <td colspan="9">
        <div class="detail-panel ${isExp ? 'show' : ''}">
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-key">Kích thước</div>
              <div class="detail-val">${_clean(doc[COLS.FILE_SIZE]) || '—'}</div>
            </div>
            <div class="detail-item">
              <div class="detail-key">File ID</div>
              <div class="detail-val" style="font-family:monospace;font-size:11px;">${_clean(doc[COLS.FILE_ID]) || '—'}</div>
            </div>
            <div class="detail-item">
              <div class="detail-key">Ngày tạo đầy đủ</div>
              <div class="detail-val">${ngayTao ? new Date(ngayTao).toLocaleString('vi-VN') : '—'}</div>
            </div>
            <div class="detail-item">
              <div class="detail-key">URL Drive</div>
              <div class="detail-val" style="max-width:260px;overflow:hidden;text-overflow:ellipsis;">
                ${url ? `<a href="${url}" target="_blank" style="color:var(--brand-primary);">${url}</a>` : '—'}
              </div>
            </div>
          </div>
        </div>
      </td>
    </tr>`;

    return rowHtml + detailHtml;
  }

  function _toggleExpand(rowIdx) {
    _expandedRow = _expandedRow === rowIdx ? null : rowIdx;
    // Re-render chỉ table body (không fetch lại)
    _renderTable();
  }

  /* ════════════════════════════════════════════════════════════════════════
     PAGINATION
  ════════════════════════════════════════════════════════════════════════ */

  function _renderPagination(total) {
    const pages = Math.ceil(total / _pageSize);
    const ctrl  = $('ds-pag-ctrl');
    if (!ctrl || pages <= 1) { if (ctrl) ctrl.innerHTML = ''; return; }

    const makeBtn = (content, p, disabled = false, active = false) =>
      `<button class="ds-pag-btn${active?' active':''}${disabled?' ':''}"
               data-p="${p}" ${disabled ? 'disabled' : ''}>
         ${content}
       </button>`;

    let html = makeBtn('<i class="bi bi-chevron-double-left"></i>', 1, _page <= 1);
    html    += makeBtn('<i class="bi bi-chevron-left"></i>', _page - 1, _page <= 1);

    // Page numbers with ellipsis
    const pageNums = _buildPageNums(pages);
    pageNums.forEach(p => {
      if (p === '…') html += `<button class="ds-pag-btn" disabled style="pointer-events:none;">…</button>`;
      else html += makeBtn(p, p, false, p === _page);
    });

    html += makeBtn('<i class="bi bi-chevron-right"></i>',        _page + 1, _page >= pages);
    html += makeBtn('<i class="bi bi-chevron-double-right"></i>', pages,     _page >= pages);

    ctrl.innerHTML = html;
    ctrl.querySelectorAll('[data-p]').forEach(btn => {
      if (!btn.disabled) btn.addEventListener('click', () => {
        _page = +btn.dataset.p;
        _renderTable();
        // Scroll table vào view
        $('ds-table-wrap')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }

  function _buildPageNums(pages) {
    if (pages <= 7) return Array.from({ length: pages }, (_, i) => i + 1);
    const nums = [1];
    if (_page > 3) nums.push('…');
    for (let p = Math.max(2, _page - 1); p <= Math.min(pages - 1, _page + 1); p++) nums.push(p);
    if (_page < pages - 2) nums.push('…');
    nums.push(pages);
    return nums;
  }

  /* ════════════════════════════════════════════════════════════════════════
     STATS + FILTER TAGS
  ════════════════════════════════════════════════════════════════════════ */

  function _updateStats() {
    $('ds-stat-total').textContent    = _allDocs.length;
    $('ds-stat-pending').textContent  = _allDocs.filter(d => d[COLS.TRANG_THAI] === 'Chờ ký').length;
    $('ds-stat-signed').textContent   = _allDocs.filter(d => d[COLS.TRANG_THAI] === 'Đã ký').length;
    $('ds-stat-rejected').textContent = _allDocs.filter(d => d[COLS.TRANG_THAI] === 'Từ chối').length;
    $('ds-stat-draft').textContent    = _allDocs.filter(d => d[COLS.TRANG_THAI] === 'Nháp').length;
  }

  function _buildDaDatalist() {
    const das  = [...new Set(_allDocs.map(d => _clean(d[COLS.DU_AN])).filter(Boolean))].sort((a,b) => a.localeCompare(b,'vi'));
    const dl   = $('ds-da-list');
    if (dl) dl.innerHTML = das.map(d => `<option value="${d}">`).join('');
  }

  function _renderActiveFilterTags() {
    const wrap   = $('ds-active-filters');
    if (!wrap) return;
    const tags   = [];

    const q      = _clean($('ds-search')?.value);
    const type   = _clean($('ds-filter-type')?.value);
    const status = _clean($('ds-filter-status')?.value);
    const da     = _clean($('ds-filter-da')?.value);
    const dfrom  = $('ds-date-from')?.value;
    const dto    = $('ds-date-to')?.value;

    if (q)      tags.push({ label:`Từ khóa: "${q}"`,  clear: () => { $('ds-search').value = ''; _applyFilters(); } });
    if (type)   tags.push({ label:`Loại: ${_typeOf(type).label}`, clear: () => { $('ds-filter-type').value = ''; _applyFilters(); } });
    if (status) tags.push({ label:`Trạng thái: ${status}`, clear: () => { $('ds-filter-status').value = ''; _applyFilters(); } });
    if (da)     tags.push({ label:`DA: "${da}"`, clear: () => { $('ds-filter-da').value = ''; _applyFilters(); } });
    if (dfrom)  tags.push({ label:`Từ: ${dfrom}`, clear: () => { $('ds-date-from').value = ''; _applyFilters(); } });
    if (dto)    tags.push({ label:`Đến: ${dto}`,  clear: () => { $('ds-date-to').value   = ''; _applyFilters(); } });

    wrap.classList.toggle('show', tags.length > 0);
    wrap.innerHTML = tags.map((t, i) => `
      <span class="ds-filter-tag" data-tag="${i}">
        ${t.label}
        <button aria-label="Xóa bộ lọc ${t.label}"><i class="bi bi-x"></i></button>
      </span>`).join('');

    wrap.querySelectorAll('.ds-filter-tag').forEach((el, i) => {
      el.querySelector('button')?.addEventListener('click', () => tags[i].clear());
    });
  }

  /* ════════════════════════════════════════════════════════════════════════
     SORT
  ════════════════════════════════════════════════════════════════════════ */

  function _handleSort(col) {
    if (_sortCol === col) {
      _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      _sortCol = col; _sortDir = 'asc';
    }

    // Update header icons
    document.querySelectorAll('#ds-table thead th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
      const icon = th.querySelector('.sort-icon');
      if (icon) icon.className = 'bi bi-arrow-down-up sort-icon';
    });

    const activeTh = document.querySelector(`#ds-table thead th[data-sort="${col}"]`);
    if (activeTh) {
      activeTh.classList.add(_sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      const icon = activeTh.querySelector('.sort-icon');
      if (icon) icon.className = `bi bi-arrow-${_sortDir === 'asc' ? 'up' : 'down'} sort-icon`;
    }

    _applyFilters();
  }

  /* ════════════════════════════════════════════════════════════════════════
     EXPORT CSV
  ════════════════════════════════════════════════════════════════════════ */

  function _exportCsv() {
    const cols = [COLS.MA_DOC, COLS.TEN, COLS.LOAI, COLS.DU_AN, COLS.NGUOI_TAO, COLS.NGAY_TAO, COLS.TRANG_THAI, COLS.TEN_FILE, COLS.FILE_SIZE, COLS.URL];
    const header = cols.map(c => `"${c}"`).join(',');
    const rows   = _filtered.map(doc =>
      cols.map(c => {
        let v = _clean(doc[c]);
        if (c === COLS.NGAY_TAO && v) v = _fmtDate(v);
        if (c === COLS.LOAI) v = _typeOf(v).label;
        return `"${v.replace(/"/g,'""')}"`;
      }).join(',')
    );
    const csv  = '\uFEFF' + [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `TrCuu_TaiLieu_${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    Toast.success('Xuất CSV thành công!');
  }

  /* ── Clear filters ────────────────────────────────────────────────────── */
  function _clearFilters() {
    ['ds-search','ds-filter-da'].forEach(id => { const el = $(id); if (el) el.value = ''; });
    ['ds-filter-type','ds-filter-status'].forEach(id => { const el = $(id); if (el) el.value = ''; });
    ['ds-date-from','ds-date-to'].forEach(id => { const el = $(id); if (el) el.value = ''; });
    _applyFilters();
  }

  /* ── Show / Hide ──────────────────────────────────────────────────────── */
  function show(presetStatus = '') {
    // Ẩn các pages khác bằng class (nhất quán với CSS pattern)
    ['page-dashboard','page-users','page-new-doc','page-pending'].forEach(id => {
      const p = document.getElementById(id);
      if (p) { p.style.display = ''; p.classList.remove('active'); }
    });
    const el = $('page-all-docs');
    if (el) { el.style.display = ''; el.classList.add('active'); }

    if (presetStatus) {
      const sel = $('ds-filter-status');
      if (sel) sel.value = presetStatus;
    }
    _fetchDocs();
  }

  function hide() {
    const el = $('page-all-docs');
    if (el) { el.style.display = ''; el.classList.remove('active'); }
  }

  /* ── Init events ──────────────────────────────────────────────────────── */
  function initEvents() {
    // Sort columns
    document.querySelectorAll('#ds-table thead th.sortable').forEach(th => {
      th.addEventListener('click', () => _handleSort(th.dataset.sort));
    });

    // Search debounce
    let _deb;
    $('ds-search')?.addEventListener('input', () => { clearTimeout(_deb); _deb = setTimeout(_applyFilters, 280); });

    // Filters
    ['ds-filter-type','ds-filter-status','ds-date-from','ds-date-to'].forEach(id =>
      $(id)?.addEventListener('change', _applyFilters)
    );
    $('ds-filter-da')?.addEventListener('input', () => { clearTimeout(_deb); _deb = setTimeout(_applyFilters, 280); });

    // Page size
    $('ds-page-size')?.addEventListener('change', function() {
      _pageSize = +this.value; _page = 1; _renderTable();
    });

    // Buttons
    $('ds-btn-refresh')?.addEventListener('click', () => _fetchDocs());
    $('ds-btn-clear-filters')?.addEventListener('click', _clearFilters);
    $('ds-btn-export')?.addEventListener('click', _exportCsv);
  }

  /* ── Public ───────────────────────────────────────────────────────────── */
  return { show, hide, initEvents };

})(); // end DocSearch

/* ══════════════════════════════════════════════════════════════════════════════
   PENDING DOCS MODULE  v1.0  —  Tài liệu cần xử lý (Chờ tôi ký)
   Hiển thị tài liệu đang đến lượt user hiện tại ký, dựa trên tracking
   trong sheet Data (cột Trạng thái + cấu hình Người ký JSON).
══════════════════════════════════════════════════════════════════════════════ */
const PendingDocs = (() => {

  /* ── State ────────────────────────────────────────────────────────────── */
  let _allDocs       = [];     // Toàn bộ tài liệu cần xử lý của user
  let _filtered      = [];     // Sau search/filter
  let _currentDoc    = null;   // Tài liệu đang mở modal ký
  let _bsModalSign   = null;   // Bootstrap modal instance
  let _signedToday   = 0;      // Counter tài liệu đã ký hôm nay (session)

  /* ── DOM helper ───────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);

  /* ── Helpers ──────────────────────────────────────────────────────────── */
  const _initials = name => {
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0] + p[p.length-1][0]).toUpperCase();
  };

  const _typeConfig = {
    'hop-dong'  : { label:'Hợp đồng',        icon:'bi-file-earmark-ruled-fill', bg:'#EBF5FF', color:'#1A56DB' },
    'bien-ban'  : { label:'Biên bản',         icon:'bi-journal-text',            bg:'#ECFDF5', color:'#059669' },
    'van-ban-hc': { label:'Văn bản HC',       icon:'bi-newspaper',               bg:'#F5F3FF', color:'#7C3AED' },
    'default'   : { label:'Tài liệu',         icon:'bi-file-earmark-text',       bg:'#F3F4F6', color:'#374151' },
  };

  const _typeOf   = t => _typeConfig[t] ?? _typeConfig['default'];
  const _today    = () => new Date().toISOString().slice(0,10);
  const _fmtDate  = d => d ? new Date(d).toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'}) : '—';

  /**
   * Tính urgency của deadline.
   * @param {string} deadline - ISO date string
   * @returns {'overdue'|'urgent'|'normal'|'none'}
   */
  function _urgency(deadline) {
    if (!deadline) return 'none';
    const diff = Math.floor((new Date(deadline) - Date.now()) / 86400000);
    if (diff < 0)  return 'overdue';
    if (diff <= 2) return 'urgent';
    return 'normal';
  }

  function _urgencyLabel(deadline) {
    if (!deadline) return null;
    const diff = Math.floor((new Date(deadline) - Date.now()) / 86400000);
    if (diff < 0)  return { cls:'overdue', text:`Quá hạn ${Math.abs(diff)} ngày` };
    if (diff === 0) return { cls:'urgent',  text:'Hết hạn hôm nay!' };
    if (diff <= 2)  return { cls:'urgent',  text:`Còn ${diff} ngày` };
    return { cls:'normal', text:`Còn ${diff} ngày` };
  }

  /* ══════════════════════════════════════════════════════════════════════
     FETCH DATA FROM GAS
  ════════════════════════════════════════════════════════════════════ */

  /**
   * Load danh sách tài liệu cần ký của user hiện tại.
   * Gọi GAS getPendingDocsForUser(token).
   */
  async function _fetchDocs() {
    _renderSkeleton();
    try {
      const token = Session.getToken();
      const res   = await GAS.call('getPendingDocsForUser', token);

      if (!res.success) {
        _renderError(res.error ?? 'Không thể tải danh sách tài liệu.');
        return;
      }

      _allDocs = res.data ?? [];
      _applyFilters();
      _updateStats();

      // Cập nhật badge sidebar
      const badge = document.querySelector('#sidebar .nav-link[data-page="pending"] .nav-badge');
      if (badge) badge.textContent = _allDocs.length;

    } catch (err) {
      _renderError('Lỗi kết nối: ' + err.message);
      console.error('[PendingDocs._fetchDocs]', err);
    }
  }

  /* ── Filter + sort ────────────────────────────────────────────────────── */
  function _applyFilters() {
    const q    = ($('pending-search')?.value ?? '').trim().toLowerCase();
    const type = $('pending-filter-type')?.value ?? '';
    const sort = $('pending-sort')?.value ?? 'deadline-asc';

    _filtered = _allDocs.filter(doc => {
      const matchQ = !q || [doc.maDoc, doc.tenTaiLieu, doc.tenDuAn, doc.nguoiTao]
        .some(v => (v ?? '').toLowerCase().includes(q));
      const matchT = !type || doc.loaiTaiLieu === type;
      return matchQ && matchT;
    });

    _filtered.sort((a, b) => {
      if (sort === 'deadline-asc') {
        const da = a.deadline ? new Date(a.deadline) : new Date('9999');
        const db = b.deadline ? new Date(b.deadline) : new Date('9999');
        return da - db;
      }
      if (sort === 'date-desc') return new Date(b.ngayTao) - new Date(a.ngayTao);
      if (sort === 'name-asc')  return (a.tenTaiLieu||'').localeCompare(b.tenTaiLieu||'', 'vi');
      return 0;
    });

    _renderList();
  }

  /* ── Stats ────────────────────────────────────────────────────────────── */
  function _updateStats() {
    $('ps-overdue').textContent     = _allDocs.filter(d => _urgency(d.deadline) === 'overdue').length;
    $('ps-urgent').textContent      = _allDocs.filter(d => _urgency(d.deadline) === 'urgent').length;
    $('ps-pending').textContent     = _allDocs.length;
    $('ps-signed-today').textContent = _signedToday;

    // Page desc
    const user = Session.getUser();
    const name = user?.['Họ tên'] || 'bạn';
    $('pending-page-desc').innerHTML =
      `Xin chào <strong>${name.split(' ').pop()}</strong> — có <strong>${_allDocs.length}</strong> tài liệu đang chờ chữ ký của bạn.`;
  }

  /* ── Render skeleton ──────────────────────────────────────────────────── */
  function _renderSkeleton() {
    const wrap = $('pending-list-wrap');
    if (!wrap) return;
    wrap.innerHTML = `<div class="pending-skel">${Array(3).fill('<div class="pending-skel-item"></div>').join('')}</div>`;
  }

  function _renderError(msg) {
    const wrap = $('pending-list-wrap');
    if (wrap) wrap.innerHTML = `
      <div class="pending-empty">
        <div class="pending-empty-icon" style="background:#FEF2F2;color:#DC2626;">
          <i class="bi bi-wifi-off"></i>
        </div>
        <div class="pending-empty-title">Không thể tải dữ liệu</div>
        <div class="pending-empty-desc">${msg}</div>
      </div>`;
  }

  /* ── Render danh sách tài liệu ────────────────────────────────────────── */
  function _renderList() {
    const wrap = $('pending-list-wrap');
    if (!wrap) return;

    if (_filtered.length === 0) {
      wrap.innerHTML = `
        <div class="pending-empty">
          <div class="pending-empty-icon"><i class="bi bi-inbox-fill"></i></div>
          <div class="pending-empty-title">Không có tài liệu nào!</div>
          <div class="pending-empty-desc">
            ${_allDocs.length > 0
              ? 'Không tìm thấy tài liệu phù hợp với bộ lọc. Hãy thử tìm kiếm khác.'
              : 'Tuyệt vời! Hiện tại không có tài liệu nào đang chờ chữ ký của bạn.'}
          </div>
        </div>`;
      return;
    }

    wrap.innerHTML = `<div class="d-flex flex-column gap-3">${_filtered.map(_renderDocCard).join('')}</div>`;

    // Bind sign buttons
    wrap.querySelectorAll('.btn-do-sign').forEach(btn => {
      btn.addEventListener('click', () => _openSignModal(btn.dataset.docId));
    });

    // Bind view buttons
    wrap.querySelectorAll('.btn-view-doc').forEach(btn => {
      btn.addEventListener('click', () => _viewDoc(btn.dataset.docId));
    });
  }

  /**
   * Render một card tài liệu.
   * @param {Object} doc - Document object từ GAS
   */
  function _renderDocCard(doc) {
    const tcfg     = _typeOf(doc.loaiTaiLieu);
    const urgency  = _urgency(doc.deadline);
    const dlLabel  = _urgencyLabel(doc.deadline);
    const user     = Session.getUser();
    const userMaNV = user?.['Mã NV'] ?? '';

    // Parse signerConfig để xây dựng progress steps
    let signerSteps = [];
    let myStepIdx   = -1;
    try {
      if (doc.signerConfig) {
        const cfg = typeof doc.signerConfig === 'string' ? JSON.parse(doc.signerConfig) : doc.signerConfig;
        if (cfg.mode === 'multi' && Array.isArray(cfg.steps)) {
          signerSteps = cfg.steps;
          myStepIdx   = cfg.steps.findIndex(s => s.maNV === userMaNV);
        } else if (cfg.mode === 'single' && cfg.single) {
          signerSteps = [{ ...cfg.single, buoc: 1 }];
          myStepIdx   = cfg.single.maNV === userMaNV ? 0 : -1;
        }
      }
    } catch (_) {}

    // Xác định bước nào đã ký (completedSteps là số bước đã xong)
    const completedSteps = doc.completedSteps ?? 0;

    const stepsHTML = signerSteps.map((step, i) => {
      const isDone    = i < completedSteps;
      const isCurrent = i === completedSteps;
      const isWaiting = i > completedSteps;
      const cls = isDone ? 'done' : isCurrent ? 'current' : 'waiting';
      const name = step.hoTen || step.maNV || `Bước ${i+1}`;
      const arrowHTML = i < signerSteps.length - 1 ? '<i class="dic-step-arrow bi bi-arrow-right"></i>' : '';
      return `
        <div class="dic-step ${cls}">
          <div class="dic-step-dot"></div>
          ${isDone ? '<i class="bi bi-check" style="font-size:10px;"></i>' : `${i+1}.`}
          ${name.length > 14 ? name.slice(0,12)+'…' : name}
        </div>${arrowHTML}`;
    }).join('');

    const deadlineHTML = dlLabel
      ? `<span class="dic-deadline ${dlLabel.cls}"><i class="bi bi-calendar-event"></i>${dlLabel.text}</span>`
      : '';

    const cardBorderClass = urgency === 'overdue' ? 'urgent' : urgency === 'urgent' ? 'normal' : 'info';

    return `
    <div class="doc-item-card ${cardBorderClass}" data-doc-id="${doc.maDoc}">
      <div class="dic-body">

        <!-- Type icon -->
        <div class="dic-type-icon" style="background:${tcfg.bg};color:${tcfg.color};">
          <i class="bi ${tcfg.icon}"></i>
        </div>

        <!-- Info -->
        <div>
          <div class="dic-title">${doc.tenTaiLieu || '(Chưa đặt tên)'}</div>
          <div class="dic-meta">
            <span class="dic-meta-item"><i class="bi bi-person"></i>${doc.nguoiTao || '—'}</span>
            <span class="dic-meta-item"><i class="bi bi-briefcase"></i>${doc.tenDuAn || 'Không có dự án'}</span>
            <span class="dic-meta-item"><i class="bi bi-calendar3"></i>Tạo ${_fmtDate(doc.ngayTao)}</span>
            ${deadlineHTML}
          </div>

          <!-- Signer progress -->
          ${signerSteps.length > 0 ? `
          <div class="dic-progress">
            <span style="font-size:11.5px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-right:4px;">Luồng ký:</span>
            ${stepsHTML}
          </div>` : ''}

          <!-- Tags -->
          <div class="dic-tags">
            <span class="dic-tag" style="background:${tcfg.bg};color:${tcfg.color};">${tcfg.label}</span>
            ${myStepIdx >= 0 ? `<span class="dic-tag" style="background:#DCFCE7;color:#065F46;">Đến lượt bạn (Bước ${myStepIdx+1})</span>` : ''}
            ${doc.sigFrames && JSON.parse(typeof doc.sigFrames === 'string' ? doc.sigFrames : JSON.stringify(doc.sigFrames)).length > 0
              ? `<span class="dic-tag" style="background:#EEF2FF;color:#3730A3;"><i class="bi bi-geo-alt me-1"></i>Vị trí ký đã xác định</span>`
              : ''}
          </div>
        </div>

        <!-- Actions -->
        <div class="dic-actions">
          <button class="btn-do-sign" data-doc-id="${doc.maDoc}" aria-label="Ký tài liệu ${doc.tenTaiLieu}">
            <div class="sign-spinner"></div>
            <span class="sign-txt"><i class="bi bi-pen-fill"></i> Thực hiện ký</span>
          </button>
          <button class="btn-doc-action btn-view-doc" data-doc-id="${doc.maDoc}">
            <i class="bi bi-eye"></i> Xem tài liệu
          </button>
          <button class="btn-doc-action reject" data-doc-id="${doc.maDoc}" onclick="PendingDocs._confirmReject('${doc.maDoc}')">
            <i class="bi bi-x-circle"></i> Từ chối
          </button>
        </div>

      </div><!-- /.dic-body -->

      <!-- Footer -->
      <div class="dic-footer">
        <span class="dic-footer-item"><i class="bi bi-hash"></i><span class="dic-id">${doc.maDoc}</span></span>
        <span class="dic-footer-item"><i class="bi bi-hdd"></i>${doc.tenFile || '—'}</span>
        ${doc.driveUrl ? `<a href="${doc.driveUrl}" target="_blank" rel="noopener" class="dic-footer-item" style="color:var(--brand-primary);text-decoration:none;">
          <i class="bi bi-box-arrow-up-right"></i> Mở trên Drive
        </a>` : ''}
        <span class="dic-footer-item ms-auto"><i class="bi bi-clock"></i>Cập nhật ${_fmtDate(doc.ngayCapNhat || doc.ngayTao)}</span>
      </div>
    </div>`;
  }

  /* ══════════════════════════════════════════════════════════════════════
     SIGN MODAL + USB TOKEN INTEGRATION
  ════════════════════════════════════════════════════════════════════ */

  function _openSignModal(docId) {
    const doc = _allDocs.find(d => d.maDoc === docId);
    if (!doc) return;
    _currentDoc = doc;

    const user = Session.getUser();
    const tcfg = _typeOf(doc.loaiTaiLieu);

    // Populate doc info
    $('sc-doc-name').textContent      = doc.tenTaiLieu || '—';
    $('sc-doc-id').textContent        = doc.maDoc;
    $('sc-doc-type').textContent      = tcfg.label;
    $('sc-signer-name').textContent   = user?.['Họ tên'] || '—';
    $('sc-signer-info').textContent   = `${user?.['Chức vụ']||''} · ${user?.['Phòng ban']||''} · ${user?.['Email']||''}`;

    // Reset state
    $('sign-pin-input') && ($('sign-pin-input').value = '');
    $('err-sign-pin').style.display = 'none';
    $('sign-modal-alert').className  = 'alert d-none';

    // Default: USB method selected
    _selectSignMethod('usb');

    _bsModalSign?.show();
  }

  /** Chuyển đổi giao diện theo phương thức ký đã chọn */
  function _selectSignMethod(method) {
    const methods = ['usb', 'pin', 'otp'];
    methods.forEach(m => {
      const card  = $(`card-${m}`);
      const radio = $(`method-${m}`);
      if (card) {
        const isActive = m === method;
        card.style.border    = isActive ? '2px solid var(--brand-primary)' : '2px solid var(--card-border)';
        card.style.background = isActive ? 'var(--brand-light)' : '#fff';
        const icon  = card.querySelector('i');
        const title = card.querySelector('div:nth-child(2)');
        if (icon)  icon.style.color  = isActive ? 'var(--brand-primary)' : 'var(--text-secondary)';
        if (title) title.style.color = isActive ? 'var(--brand-primary)' : 'var(--text-secondary)';
        if (radio) radio.checked = isActive;
      }
    });

    // Show/hide panels
    $('usb-panel').style.display = method === 'usb' ? '' : 'none';
    $('pin-panel').style.display = method === 'pin' ? '' : 'none';
    $('otp-panel').style.display = method === 'otp' ? '' : 'none';

    // Update button label
    const labels = {
      usb : '<i class="bi bi-usb-drive-fill me-2"></i>Thực hiện ký bằng USB Token',
      pin : '<i class="bi bi-pen-fill me-2"></i>Xác nhận ký tài liệu',
      otp : '<i class="bi bi-shield-check me-2"></i>Xác nhận bằng OTP',
    };
    $('btn-final-sign-txt').innerHTML = labels[method] || labels.usb;
    $('btn-final-sign').disabled      = method === 'pin'; // PIN cần nhập trước
  }

  /**
   * Dispatcher: điều hướng đến đúng luồng ký theo phương thức được chọn.
   */
  async function _executeSign() {
    if (!_currentDoc) return;

    const method = document.querySelector('input[name="sign-method"]:checked')?.value ?? 'usb';

    if (method === 'usb') {
      await _executeSignByToken();
    } else if (method === 'pin') {
      await _executeSignByPin();
    } else if (method === 'otp') {
      await _executeSignByOtp();
    }
  }

  /** Ký bằng mã PIN nội bộ (flow cũ, giữ nguyên) */
  async function _executeSignByPin() {
    const pin = ($('sign-pin-input')?.value ?? '').trim();
    if (pin !== '1234') {
      $('err-sign-pin').style.display = 'flex';
      $('sign-pin-input').focus();
      return;
    }

    const finalBtn = $('btn-final-sign');
    finalBtn.disabled = true;
    finalBtn.classList.add('loading');

    try {
      const token = Session.getToken();
      const res   = await GAS.call('signDocument', token, {
        maDoc     : _currentDoc.maDoc,
        ghiChuKy  : 'Ký qua mã PIN nội bộ',
        ngayKy    : new Date().toISOString(),
        phuongThuc: 'pin',
      });
      _handleSignResult(res);
    } catch (err) {
      _showSignError(err.message);
    } finally {
      finalBtn.classList.remove('loading');
      finalBtn.disabled = false;
    }
  }

  /** Ký bằng OTP Email (stub) */
  async function _executeSignByOtp() {
    Toast.error('Chức năng OTP đang trong giai đoạn phát triển.');
  }

  /**
   * ══ LUỒNG KÝ BẰNG USB TOKEN ══
   * Điều phối toàn bộ quy trình:
   *   1. Đóng modal → hiện token overlay
   *   2. Kết nối Middleware (WebSocket → HTTP fallback)
   *   3. Đọc chứng thư số từ token
   *   4. Lấy PDF base64 từ Drive
   *   5. Gửi yêu cầu ký đến Middleware
   *   6. Nhận PDF đã ký (base64) → upload lại Drive qua GAS
   *   7. Cập nhật trạng thái tài liệu trên sheet Data
   */
  async function _executeSignByToken() {
    _bsModalSign?.hide();

    const doc  = _currentDoc;
    const user = Session.getUser();

    // Lấy sigFrames từ tài liệu
    let coordinates = [];
    try {
      const raw = doc.sigFrames;
      coordinates = Array.isArray(raw) ? raw : JSON.parse(raw || '[]');
    } catch (_) { coordinates = []; }

    try {
      const signedBase64 = await UsbTokenSigner.signPdfWithToken(
        null,           // pdfBase64: null → Middleware sẽ tự lấy qua fileId
        coordinates,
        {
          fileId       : doc.fileId,
          driveUrl     : doc.driveUrl,
          maDoc        : doc.maDoc,
          tenTaiLieu   : doc.tenTaiLieu,
          signerName   : user?.['Họ tên']    ?? '',
          signerEmail  : user?.['Email']      ?? '',
          signerMaNV   : user?.['Mã NV']      ?? '',
        }
      );

      // Nếu đến đây → ký thành công → cập nhật GAS
      const token = Session.getToken();
      const res   = await GAS.call('signDocument', token, {
        maDoc        : doc.maDoc,
        ghiChuKy     : 'Ký bằng USB Token (chữ ký số)',
        ngayKy       : new Date().toISOString(),
        phuongThuc   : 'usb_token',
        signedPdfB64 : signedBase64,  // PDF đã nhúng chữ ký số
      });

      _handleSignResult(res);

    } catch (err) {
      if (err.message === 'USER_CANCELLED') {
        Toast.token.pinCancelled();
        console.info('[PendingDocs] User huỷ ký USB Token.');
      } else {
        Toast.sign.failed(err.message);
      }
    }
  }

  /** Xử lý kết quả ký chung cho mọi phương thức */
  function _handleSignResult(res) {
    if (res.success) {
      _signedToday++;
      _allDocs   = _allDocs.filter(d => d.maDoc !== _currentDoc.maDoc);
      _applyFilters();
      _updateStats();
      Toast.sign.success(_currentDoc.tenTaiLieu ?? '');

      // Lưu PDF đã ký lên Drive (không block UI — fire-and-continue)
      const savedDoc = _currentDoc;
      _currentDoc = null;

      SaveToDrive.saveSignedPdfToDrive({
        maDoc        : savedDoc.maDoc,
        tenTaiLieu   : savedDoc.tenTaiLieu,
        signerName   : Session.getUser()?.['Họ tên']  ?? '',
        signerEmail  : Session.getUser()?.['Email']    ?? '',
        ngayKy       : new Date().toISOString(),
        phuongThuc   : document.querySelector('input[name="sign-method"]:checked')?.value ?? 'unknown',
        certSerial   : '', // Điền từ UsbTokenSigner._certInfo nếu có
        certIssuer   : '',
        tempFileId   : savedDoc.fileId ?? '',
      }).catch(err => {
        if (err?.message !== 'NO_SIGNED_PDF') { console.error('[PendingDocs._handleSignResult] SaveToDrive lỗi:', err.message); }
      });

    } else {
      _showSignError(res.error ?? 'Ký thất bại. Vui lòng thử lại.');
    }
  }

  function _showSignError(msg) {
    const alertEl = $('sign-modal-alert');
    alertEl.className = 'alert alert-danger d-flex align-items-center gap-2 mb-3';
    alertEl.innerHTML = `<i class="bi bi-exclamation-circle-fill"></i>${msg}`;
    // Re-show modal if it was hidden
    _bsModalSign?.show();
  }

  /** Xem tài liệu trên Drive */
  function _viewDoc(docId) {
    const doc = _allDocs.find(d => d.maDoc === docId);
    if (doc?.driveUrl) {
      window.open(doc.driveUrl, '_blank', 'noopener,noreferrer');
    } else if (doc?.fileUrl) {
      window.open(doc.fileUrl, '_blank', 'noopener,noreferrer');
    } else {
      Toast.error('Không tìm thấy đường dẫn tài liệu.');
    }
  }

  /** Từ chối ký — xác nhận và gọi GAS */
  function _confirmReject(docId) {
    const doc = _allDocs.find(d => d.maDoc === docId);
    if (!doc) return;
    const reason = window.prompt(
      `Từ chối ký tài liệu "${doc.tenTaiLieu}".\n\nVui lòng nhập lý do từ chối:`
    );
    if (reason === null) return; // User cancelled
    _rejectDoc(docId, reason.trim() || 'Không có lý do.');
  }

  async function _rejectDoc(docId, reason) {
    try {
      const token = Session.getToken();
      const res   = await GAS.call('rejectDocument', token, { maDoc: docId, lyDo: reason });
      if (res.success) {
        _allDocs = _allDocs.filter(d => d.maDoc !== docId);
        _applyFilters();
        _updateStats();
        Toast.success('Đã từ chối tài liệu.');
      } else {
        Toast.error(res.error ?? 'Từ chối thất bại.');
      }
    } catch (err) {
      Toast.network.error(err.message);
    }
  }

  /* ── Show / Hide ──────────────────────────────────────────────────────── */
  function show() {
    // Ẩn các pages khác bằng class (nhất quán với CSS pattern)
    ['page-dashboard','page-users','page-new-doc','page-all-docs'].forEach(id => {
      const p = document.getElementById(id);
      if (p) { p.style.display = ''; p.classList.remove('active'); }
    });
    const el = $('page-pending');
    if (el) { el.style.display = ''; el.classList.add('active'); }
    _fetchDocs();
  }

  function hide() {
    const el = $('page-pending');
    if (el) { el.style.display = ''; el.classList.remove('active'); }
    $('sign-success-overlay')?.classList.remove('show');
  }

  /* ── Init events ──────────────────────────────────────────────────────── */
  function initEvents() {
    // Bootstrap modal
    const modalEl = document.getElementById('modalSign');
    if (modalEl) _bsModalSign = new bootstrap.Modal(modalEl);

    // Method selector tabs
    ['usb', 'pin', 'otp'].forEach(m => {
      const radio = document.getElementById(`method-${m}`);
      const card  = document.getElementById(`card-${m}`);
      if (card) card.addEventListener('click', () => _selectSignMethod(m));
      if (radio) radio.addEventListener('change', () => _selectSignMethod(m));
    });

    // PIN input → enable button
    $('sign-pin-input')?.addEventListener('input', function() {
      const valid = /^\d{4}$/.test(this.value.trim());
      const method = document.querySelector('input[name="sign-method"]:checked')?.value;
      if (method === 'pin') $('btn-final-sign').disabled = !valid;
      if (valid) $('err-sign-pin').style.display = 'none';
    });

    $('sign-pin-input')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); _executeSign(); }
    });

    // Final sign button
    $('btn-final-sign')?.addEventListener('click', _executeSign);

    // Refresh button
    $('btn-refresh-pending')?.addEventListener('click', () => _fetchDocs());

    // Search & filters (debounced)
    let _debounce;
    $('pending-search')?.addEventListener('input', () => {
      clearTimeout(_debounce);
      _debounce = setTimeout(_applyFilters, 280);
    });
    $('pending-filter-type')?.addEventListener('change', _applyFilters);
    $('pending-sort')?.addEventListener('change', _applyFilters);

    // Success overlay close
    $('sign-success-close')?.addEventListener('click', () => {
      $('sign-success-overlay').classList.remove('show');
    });

    // UsbTokenSigner overlay events (cancel button)
    $('token-cancel-btn')?.addEventListener('click', () => UsbTokenSigner.cancel());
    $('token-retry-btn')?.addEventListener('click',  () => UsbTokenSigner.retry());
    $('token-debug-toggle')?.addEventListener('click', () => {
      const log = $('token-log-wrap');
      const btn = $('token-debug-toggle');
      const show = log?.classList.toggle('show');
      btn.textContent = show ? 'Ẩn nhật ký kỹ thuật' : 'Xem nhật ký kỹ thuật';
    });

    // Provider tabs in overlay
    document.querySelectorAll('.token-provider-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.token-provider-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        UsbTokenSigner.setProvider(tab.dataset.provider);
      });
    });
  }

  /* ── Public API ───────────────────────────────────────────────────────── */
  return {
    show, hide, initEvents,
    // Exposed for onclick in rendered HTML
    _confirmReject,
  };

})(); // end PendingDocs

// Expose _confirmReject globally for onclick in rendered HTML
window.PendingDocs = PendingDocs;

/* ══════════════════════════════════════════════════════════════════════════════
   BOOTSTRAP — Khởi tạo ứng dụng
   Bọc trong DOMContentLoaded để chắc chắn DOM sẵn sàng.
   Bọc trong try-catch toàn cục: nếu bất kỳ module nào crash,
   hiện ngay màn hình login thay vì màn trắng.
══════════════════════════════════════════════════════════════════════════════ */
(function bootstrap() {

  function _run() {
    // Đảm bảo login hiện ngay khi DOM sẵn sàng (failsafe đầu tiên)
    try {
      var _l = document.getElementById('app-login');
      var _d = document.getElementById('app-dashboard');
      if (_l && (!_l.style.display || _l.style.display === 'none')) {
        _l.style.display = 'flex';
      }
      if (_d && !_d.style.display) _d.style.display = 'none';
    } catch (_) {}

    try {
      /* Form đăng nhập — optional chaining để không crash nếu element thiếu */
      document.getElementById('login-form')?.addEventListener('submit', e => Auth.handleLogin(e));

      /* ── Toggle hiển thị/ẩn mật khẩu login ── */
      const togglePwdBtn = document.getElementById('toggle-pwd');
      if (togglePwdBtn) {
        togglePwdBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          const inp  = document.getElementById('login-password');
          const icon = document.getElementById('toggle-pwd-icon');
          if (!inp || !icon) {
            console.warn('[toggle-pwd] Không tìm thấy input hoặc icon!');
            return;
          }
          const isHidden = inp.type === 'password';
          inp.type       = isHidden ? 'text' : 'password';
          icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
          this.setAttribute('aria-label', isHidden ? 'Ẩn mật khẩu' : 'Hiện mật khẩu');
          inp.focus();
        });
      }

      /* Xóa lỗi khi gõ lại */
      ['login-email', 'login-password'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', () => {
          try { UI.setFieldError(id, ''); UI.clearAlert(); } catch (_) {}
        });
      });

      /* Đăng xuất */
      document.getElementById('btn-logout')?.addEventListener('click', e => Auth.handleLogout(e));

      /* Dashboard events */
      _safeInit('Dash',                () => Dash.init());

      /* Module events */
      _safeInit('UserManager',         () => UserManager.initEvents());
      _safeInit('NewDocModule',        () => NewDocModule.initEvents());
      _safeInit('PendingDocs',         () => PendingDocs.initEvents());
      _safeInit('SaveToDrive',         () => SaveToDrive.initEvents());
      _safeInit('DocSearch',           () => DocSearch.initEvents());

      /* Nút "Về trang chủ" trên màn hình access-denied */
      document.getElementById('denied-go-home')?.addEventListener('click', () => {
        try {
          PermissionEngine._hideAccessDenied();
          const homeLink = document.querySelector('#sidebar .nav-link[data-page="dashboard"]');
          if (homeLink) homeLink.click();
        } catch (_) {}
      });

      // [FIX] Báo cho anti-blank-screen guard: main script đã khởi tạo OK
      window.__eSignMainOK = true;

      /* Khởi động auth flow — async, không block render */
      if (typeof Auth !== 'undefined' && Auth.init) {
        Auth.init().catch(err => {
          console.error('[Bootstrap] Auth.init lỗi:', err && err.message);
          _emergencyShowLogin();
        });
      } else {
        console.error('[Bootstrap] Auth module không tồn tại!');
        _emergencyShowLogin();
      }

    } catch (bootstrapErr) {
      console.error('[Bootstrap] Lỗi khởi tạo:', bootstrapErr && bootstrapErr.message,
                    bootstrapErr && bootstrapErr.stack);
      _emergencyShowLogin();
    }
  }

  /** Khởi tạo module an toàn — lỗi 1 module không block toàn app */
  function _safeInit(name, fn) {
    try {
      fn();
    } catch (e) {
      console.error(`[Bootstrap] ${name}.initEvents() lỗi:`, e.message);
    }
  }

  /* Chạy ngay nếu DOM đã sẵn sàng, hoặc chờ DOMContentLoaded */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _run);
  } else {
    _run();
  }

})();

</script>
